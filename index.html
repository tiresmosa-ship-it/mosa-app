/* =====================================================================
   COMPARACION DE NEUMATICOS (auditoria vs sistema)
   Por cada posicion auditada busca el neumatico que el sistema tiene
   registrado en ese equipo/posicion y compara numero_fuego / marca /
   medida. numero_fuego siempre se compara (si el sistema no tiene nada en
   esa posicion, es un neumatico no registrado). marca/medida solo se
   comparan cuando el sistema tiene un valor cargado, para no generar ruido
   con los neumaticos viejos que todavia tienen marca/medida en null.
===================================================================== */
function normStr(v) { return (v == null ? "" : String(v)).trim().toLowerCase(); }
const CAMPO_LABELS = { numero_fuego: "N° de fuego", marca: "marca", medida: "medida" };
async function compararNeumaticosAuditoria(clienteId, equipoId, posData) {
  const { data: neus, error } = await supabase.from("neumaticos")
    .select("numero_fuego, marca, medida, posicion_actual")
    .eq("cliente_id", clienteId).eq("equipo_actual", equipoId).eq("activo", true);
  if (error) throw error;
  const porPos = {};
  (neus || []).forEach(n => { if (n.posicion_actual != null) porPos[n.posicion_actual] = n; });
  const discrepancias = [];
  Object.values(posData).forEach(d => {
    if (!d.numero_fuego) return;
    const sis = porPos[d.posicion] || {};
    const campos = [
      { campo: "numero_fuego", sistema: sis.numero_fuego, mecanico: d.numero_fuego, siempre: true },
      { campo: "marca", sistema: sis.marca, mecanico: d.marca, siempre: false },
      { campo: "medida", sistema: sis.medida, mecanico: d.medida, siempre: false }
    ];
    campos.forEach(c => {
      const s = normStr(c.sistema), m = normStr(c.mecanico);
      if (!m) return;                    // el mecanico no cargo ese campo
      if (!c.siempre && !s) return;      // marca/medida: no comparar si el sistema no tiene dato
      if (s !== m) {
        discrepancias.push({
          posicion: d.posicion, campo: c.campo,
          valor_sistema: c.sistema == null ? null : String(c.sistema),
          valor_mecanico: String(c.mecanico),
          aprobada: false, aprobada_por: null, justificacion: null
        });
      }
    });
  });
  return discrepancias;
}

/* =====================================================================
   GUARDADO DE AUDITORIA (encabezado + posiciones + receta)
===================================================================== */
async function construirYGuardarAuditoria({ user, clienteId, equipo, cfg, posData, axleCfg, km, checklist, recsInfo, discrepanciasNeumaticos, recetaEstado }) {
  const numero_auditoria = await siguienteNumeroAuditoria(clienteId, cfg).catch(() => String(Date.now()).slice(-6));
  const sistemaTotal = checklist.filter(c => !c.extra).length;
  const cumplidas = checklist.filter(c => !c.extra && c.done).length;
  const pct = sistemaTotal ? Math.round((cumplidas / sistemaTotal) * 100) : 100;
  const flags = {};
  recsInfo.recs.forEach(r => { if (r.key) flags[r.key] = checklist.find(c => c.id === r.id) ? true : false; });

  const alertasGeneradas = [];
  const posiciones = Object.values(posData).map(d => {
    if (d.status !== "ok") {
      alertasGeneradas.push({
        id: uuid(), cliente_id: clienteId, equipo_id: equipo.id_equipo, mecanico_id: user.id,
        tipo: (d.motivos || []).some(m => m.startsWith("mm")) ? (d.status === "alerta" ? "mm_critico" : "mm_bajo") : (d.status === "alerta" ? "psi_bajo" : "psi_alto"),
        severidad: d.status === "alerta" ? "rojo" : "amarillo", titulo: `Posición P${d.posicion} en ${statusLabel(d.status).toLowerCase()}`,
        descripcion: (d.motivos || []).join("; "), posicion: d.posicion, numero_fuego: d.numero_fuego,
        leida_mecanico: false, leida_admin: false, leida_superadmin: false
      });
    }
    const mmVals = [d.mm_borde_izq, d.mm_centro, d.mm_borde_der].map(v => parseFloat(v)).filter(v => !isNaN(v));
    const promedioMM = mmVals.length ? Math.round((mmVals.reduce((a, b) => a + b, 0) / mmVals.length) * 100) / 100 : null;
    return {
      id: uuid(), posicion: d.posicion, numero_fuego: d.numero_fuego,
      milimetros: promedioMM, psi: d.psi ? parseInt(d.psi, 10) : null,
      mm_borde_izq: d.mm_borde_izq !== "" ? parseFloat(d.mm_borde_izq) : null,
      mm_centro: d.mm_centro !== "" ? parseFloat(d.mm_centro) : null,
      mm_borde_der: d.mm_borde_der !== "" ? parseFloat(d.mm_borde_der) : null
    };
  });

  // Recomendaciones reales (se excluye el placeholder "Todo en orden").
  const realRecs = recsInfo.recs.filter(r => r.key);
  const recomendacionesJSON = realRecs.map(r => ({ id: r.id, key: r.key, texto: r.texto, done: false }));
  const tareasExtraJSON = checklist.filter(c => c.extra).map(c => ({ texto: c.texto, done: c.done }));
  const totalTareas = realRecs.length;

  // Alerta amarilla por cada rotacion recomendada (desgaste desparejo entre
  // posiciones de un mismo eje/grupo). El mecanico la ve en su pantalla de Alertas.
  realRecs.filter(r => r.key.startsWith("rec_rotar_")).forEach(r => {
    alertasGeneradas.push({
      id: uuid(), cliente_id: clienteId, equipo_id: equipo.id_equipo, mecanico_id: user.id,
      tipo: "rotacion_recomendada", severidad: "amarillo", titulo: "Rotación recomendada",
      descripcion: r.texto, posicion: null, numero_fuego: null,
      leida_mecanico: false, leida_admin: false, leida_superadmin: false
    });
  });
  const recetaId = uuid();
  const cab = {
    id_auditoria: uuid(), equipo_id: equipo.id_equipo, bultero_id: user.id, cliente_id: clienteId,
    fecha: todayISO(), kilometraje: parseInt(km, 10) || equipo.kilometros, numero_auditoria,
    posiciones,
    receta: {
      id: recetaId, cliente_id: clienteId,
      rec_calibrar_psi: !!flags.rec_calibrar_psi, rec_cambiar_neumaticos: !!flags.rec_cambiar_neumaticos,
      rec_rotar_delanteros: !!flags.rec_rotar_delanteros, rec_rotar_traccionales: !!flags.rec_rotar_traccionales,
      rec_rotar_eje_libre: !!flags.rec_rotar_eje_libre, rec_rotar_semi_e1: !!flags.rec_rotar_semi_e1,
      rec_rotar_semi_e2: !!flags.rec_rotar_semi_e2, rec_rotar_semi_e3: !!flags.rec_rotar_semi_e3,
      // posiciones_alerta agrupa recomendaciones + discrepancias + tareas extra (spec).
      posiciones_alerta: {
        recomendaciones: recomendacionesJSON,
        discrepancias_neumaticos: discrepanciasNeumaticos || [],
        tareas_extra: tareasExtraJSON
      },
      total_tareas: totalTareas, tareas_cumplidas: 0, tareas_pendientes: totalTareas,
      seguio_receta: pct === 100, pct_receta_seguida: pct,
      tareas_extra: tareasExtraJSON,
      discrepancias_neumaticos: discrepanciasNeumaticos || [],
      estado: recetaEstado || "pendiente",
      observaciones_mecanico: null
    }
  };

  // Una alerta por cada discrepancia de neumatico detectada (informativa para
  // el mecanico, pendiente de aprobacion del administrador).
  (discrepanciasNeumaticos || []).forEach(dn => {
    alertasGeneradas.push({
      id: uuid(), cliente_id: clienteId, equipo_id: equipo.id_equipo, mecanico_id: user.id,
      tipo: "neumatico_no_registrado", severidad: "rojo",
      titulo: `Neumático no coincide en P${dn.posicion}`,
      descripcion: `${CAMPO_LABELS[dn.campo] || dn.campo}: sistema ${dn.valor_sistema == null ? "sin registro" : dn.valor_sistema} · mecánico ${dn.valor_mecanico}`,
      posicion: dn.posicion, numero_fuego: dn.valor_mecanico,
      leida_mecanico: true, leida_admin: false, leida_superadmin: false
    });
  });

  pushQueue({ id: uuid(), tipo: "auditoria", clienteId, ts: Date.now(), data: cab });
  alertasGeneradas.forEach(a => pushQueue({ id: uuid(), tipo: "alerta", clienteId, ts: Date.now(), data: a }));
  syncQueue();
  return { alertas: alertasGeneradas.length, recetaId, auditoriaId: cab.id_auditoria };
}

async function buscarInstructivoPendiente(equipoId) {
  // Instructivo de una auditoria previa que sigue pendiente o parcial.
  const { data, error } = await supabase.from("auditorias_receta")
    .select("id,auditoria_id,estado,total_tareas,tareas_cumplidas,tareas_pendientes,posiciones_alerta,tareas_extra,auditorias!inner(equipo_id,fecha)")
    .eq("auditorias.equipo_id", equipoId).in("estado", ["pendiente", "parcial"]);
  if (error) throw error;
  if (!data || !data.length) return null;
  data.sort((a, b) => ((b.auditorias && b.auditorias.fecha) || "").localeCompare((a.auditorias && a.auditorias.fecha) || ""));
  return data[0];
}

async function construirPosDataDesdeEquipo(equipoId) {
  const { data, error } = await supabase.from("neumaticos").select("*").eq("equipo_actual", equipoId).eq("activo", true);
  if (error || !data) return {};
  const map = {};
  data.forEach(n => {
    if (!n.posicion_actual) return;
    map[n.posicion_actual] = { posicion: n.posicion_actual, numero_fuego: n.numero_fuego, marca: n.marca, medida: n.medida, psi: null, status: "ok", minMM: null };
  });
  return map;
}

/* =====================================================================
   ARBOL DE DECISION DEL MECANICO (al loguear)
===================================================================== */
function horasDesdeHoraCierre(fecha, horaCierre) {
  if (!horaCierre) return Infinity;
  const then = new Date(fecha + "T" + horaCierre);
  return (Date.now() - then.getTime()) / 3600000;
}
async function evaluarEstadoMecanico(user) {
  const hoy = todayISO();
  const { data: pendientes } = await supabase.from("cierre_dia").select("*")
    .eq("mecanico_id", user.id).lt("fecha", hoy).eq("cerrado", false)
    .order("fecha", { ascending: false }).limit(1);
  if (pendientes && pendientes.length) return { estado: "jornada_pendiente", jornada: pendientes[0] };

  const { data: hoyCierres } = await supabase.from("cierre_dia").select("*")
    .eq("mecanico_id", user.id).eq("fecha", hoy).eq("cerrado", true)
    .order("creado_en", { ascending: false }).limit(1);
  if (hoyCierres && hoyCierres.length) {
    const c = hoyCierres[0];
    if (horasDesdeHoraCierre(hoy, c.hora_cierre) < 8) return { estado: "jornada_cerrada_hoy" };
  }

  const { data: checks } = await supabase.from("check_diario").select("*")
    .eq("bultero_id", user.id).eq("fecha", hoy).eq("completado", true)
    .order("creado_en", { ascending: false }).limit(1);
  if (checks && checks.length) return { estado: "menu_principal", clienteId: checks[0].empresa_id || checks[0].cliente_id };
  return { estado: "bienvenida" };
}
async function contarNeumaticosPorBodega(clienteId, bodega) {
  const { count } = await supabase.from("neumaticos").select("id_neumatico", { count: "exact", head: true }).eq("cliente_id", clienteId).eq("bodega", bodega);
  return count || 0;
}

/* =====================================================================
   RESUMEN Y CIERRE DE JORNADA (compartido entre el cierre normal del dia
   y el cierre de una jornada anterior olvidada)
===================================================================== */
async function construirResumenJornada(mecanicoId, clienteId, fecha) {
  const [{ data: auditorias }, { data: cambios }, { data: intervenciones }, { data: cierreActual }] = await Promise.all([
    supabase.from("auditorias").select("id_auditoria,equipo_id,creado_en,numero_auditoria").eq("bultero_id", mecanicoId).eq("fecha", fecha),
    supabase.from("cambios_neumaticos").select("id_cambio,equipo_id,creado_en,numero_cambio").eq("bultero_id", mecanicoId).eq("fecha", fecha),
    supabase.from("intervenciones").select("id,tipo,equipo_id,creado_en").eq("mecanico_id", mecanicoId).eq("fecha", fecha),
    supabase.from("cierre_dia").select("id,hora_inicio").eq("mecanico_id", mecanicoId).eq("fecha", fecha).maybeSingle()
  ]);
  const auds = auditorias || [], cams = cambios || [], intervs = intervenciones || [];

  const equipoIds = [...new Set([...auds.map(a => a.equipo_id), ...cams.map(c => c.equipo_id)])].filter(Boolean);
  const equiposMap = {};
  if (equipoIds.length) {
    const { data: eqs } = await supabase.from("equipos").select("id_equipo,patente,numero_interno").in("id_equipo", equipoIds);
    (eqs || []).forEach(e => { equiposMap[e.id_equipo] = e.numero_interno ? `${e.numero_interno} · ${e.patente}` : e.patente; });
  }

  const regulaciones_psi = intervs.filter(i => i.tipo === "regulacion_psi").length;
  const retorqueos = intervs.filter(i => i.tipo === "retorqueo").length;
  const reparaciones = intervs.filter(i => i.tipo === "reparacion").length;

  // Rotaciones: cambio_detalle tipo='sale' sin motivo_salida (las salidas por
  // transito/reparacion/baja siempre tienen motivo_salida; solo las rotaciones no).
  let rotaciones = 0;
  const cambioIds = cams.map(c => c.id_cambio);
  if (cambioIds.length) {
    const { data: cd } = await supabase.from("cambio_detalle").select("id").in("cambio_id", cambioIds).eq("tipo", "sale").is("motivo_salida", null);
    rotaciones = (cd || []).length;
  }

  // pct_receta_promedio + estado de instructivo por equipo, via auditorias_receta del dia.
  let pct_receta_promedio = null;
  const auditoriaIds = auds.map(a => a.id_auditoria);
  let instructivos = [];
  if (auditoriaIds.length) {
    const { data: recetas } = await supabase.from("auditorias_receta").select("auditoria_id,estado,pct_receta_seguida").in("auditoria_id", auditoriaIds);
    const vals = (recetas || []).map(r => r.pct_receta_seguida).filter(v => v != null);
    if (vals.length) pct_receta_promedio = Math.round(vals.reduce((a, b) => a + b, 0) / vals.length);
    instructivos = (recetas || []).map(r => {
      const a = auds.find(x => x.id_auditoria === r.auditoria_id);
      return { equipo: (a && equiposMap[a.equipo_id]) || "-", estado: r.estado, pct: r.pct_receta_seguida };
    });
  }

  const [stock_nuevo, stock_transito, stock_recauchado, stock_nfu] = await Promise.all([
    contarNeumaticosPorBodega(clienteId, "nuevo"), contarNeumaticosPorBodega(clienteId, "transito"),
    contarNeumaticosPorBodega(clienteId, "recauchado"), contarNeumaticosPorBodega(clienteId, "nfu")
  ]);

  const conteos = { auditorias_realizadas: auds.length, cambios_realizados: cams.length, regulaciones_psi, retorqueos, rotaciones, reparaciones, pct_receta_promedio };
  const stock = { stock_nuevo, stock_transito, stock_recauchado, stock_nfu };
  const detalle = {
    hora_inicio: cierreActual ? cierreActual.hora_inicio : null,
    auditorias: auds.map(a => ({ equipo: equiposMap[a.equipo_id] || "-", numero: a.numero_auditoria, hora: (a.creado_en || "").slice(11, 19) })),
    cambios: cams.map(c => ({ equipo: equiposMap[c.equipo_id] || "-", numero: c.numero_cambio, hora: (c.creado_en || "").slice(11, 19) })),
    instructivos,
    intervenciones: { regulaciones_psi, retorqueos, reparaciones, rotaciones },
    stock
  };
  return { conteos, stock, detalle, cierreId: cierreActual ? cierreActual.id : null };
}

async function cerrarJornadaConResumen({ user, clienteId, fecha, horaCierre, motivoSinCierre }) {
  const { conteos, stock, detalle, cierreId } = await construirResumenJornada(user.id, clienteId, fecha);
  const update = { cerrado: true, hora_cierre: horaCierre, motivo_sin_cierre: motivoSinCierre || null, ...conteos, ...stock };
  if (cierreId) {
    await supabase.from("cierre_dia").update(update).eq("id", cierreId);
  } else {
    await supabase.from("cierre_dia").insert({ id: uuid(), cliente_id: clienteId, mecanico_id: user.id, fecha, hora_inicio: null, ...update });
  }
  await insertAlerta({
    id: uuid(), cliente_id: clienteId, equipo_id: null, mecanico_id: user.id,
    tipo: "cierre_dia", severidad: "info",
    titulo: `Cierre de jornada — ${user.nombre} — ${fecha}`,
    descripcion: JSON.stringify({ hora_inicio: detalle.hora_inicio, hora_cierre: horaCierre, ...detalle }),
    leida_mecanico: true, leida_admin: false, leida_superadmin: false
  });
  return { conteos, stock, detalle };
}

async function resumenJornada(mecanicoId, fecha) {
  const [{ data: aud }, { data: cam }, { data: interv }] = await Promise.all([
    supabase.from("auditorias").select("id_auditoria").eq("bultero_id", mecanicoId).eq("fecha", fecha),
    supabase.from("cambios_neumaticos").select("id_cambio").eq("bultero_id", mecanicoId).eq("fecha", fecha),
    supabase.from("intervenciones").select("id").eq("mecanico_id", mecanicoId).eq("fecha", fecha)
  ]);
  return { auditorias: (aud || []).length, cambios: (cam || []).length, intervenciones: (interv || []).length };
}
async function ultimaActividadDelDia(mecanicoId, fecha) {
  const tablas = [
    { t: "auditorias", campo: "bultero_id" },
    { t: "cambios_neumaticos", campo: "bultero_id" },
    { t: "intervenciones", campo: "mecanico_id" },
    { t: "check_diario", campo: "bultero_id" }
  ];
  let ultima = null;
  for (const { t, campo } of tablas) {
    const { data } = await supabase.from(t).select("creado_en").eq(campo, mecanicoId).eq("fecha", fecha).order("creado_en", { ascending: false }).limit(1);
    if (data && data[0] && data[0].creado_en) {
      const ts = new Date(data[0].creado_en);
      if (!ultima || ts > ultima) ultima = ts;
    }
  }
  return ultima;
}

function MecanicoGate({ user }) {
  const [state, setState] = useState({ status: "loading" });

  async function cargar() {
    setState({ status: "loading" });
    try {
      const res = await evaluarEstadoMecanico(user);
      if (res.estado === "jornada_pendiente") {
        const resumen = await resumenJornada(user.id, res.jornada.fecha);
        setState({ status: "jornada_pendiente", jornada: res.jornada, resumen });
      } else if (res.estado === "jornada_cerrada_hoy") {
        setState({ status: "jornada_cerrada_hoy" });
      } else if (res.estado === "menu_principal") {
        setTurno({ clienteId: res.clienteId, fecha: todayISO(), checkDone: true });
        setState({ status: "ready" });
      } else {
        localStorage.removeItem(LS.turno);
        setState({ status: "ready" });
      }
    } catch (e) {
      console.error("No se pudo evaluar el estado del mecánico", e);
      setState({ status: "ready" });
    }
  }

  useEffect(() => { cargar(); }, []);

  async function cerrarJornadaAnterior() {
    setState(s => ({ ...s, cerrando: true }));
    const ultima = await ultimaActividadDelDia(user.id, state.jornada.fecha);
    const horaCierre = ultima ? ultima.toTimeString().slice(0, 8) : "23:59:59";
    try {
      await cerrarJornadaConResumen({ user, clienteId: state.jornada.cliente_id, fecha: state.jornada.fecha, horaCierre, motivoSinCierre: "olvido_cierre" });
    } catch (e) { console.error("No se pudo cerrar la jornada anterior", e); }
    await cargar();
  }

  if (state.status === "loading") {
    return <div className="min-h-screen flex items-center justify-center"><span className="spinner" /></div>;
  }

  if (state.status === "jornada_pendiente") {
    const r = state.resumen;
    return (
      <div className="min-h-screen flex flex-col px-6 pt-16 safe-top">
        <h1 className="text-[24px] font-extrabold leading-tight mb-2">Tenés una jornada del {formatDateLong(state.jornada.fecha)} sin cerrar</h1>
        <p className="text-[14px] text-sub mb-6">Cerrala antes de seguir. Este es el resumen de ese día:</p>
        <div className="grid grid-cols-3 gap-3 mb-6">
          {[["Auditorías", r.auditorias], ["Cambios", r.cambios], ["Intervenciones", r.intervenciones]].map(([l, v]) => (
            <div key={l} className="bg-[#F9FAFB] rounded-[18px] p-4 text-center">
              <p className="text-[22px] font-extrabold">{v}</p>
              <p className="text-[11px] font-semibold text-muted mt-1">{l}</p>
            </div>
          ))}
        </div>
        <Button className="w-full" disabled={state.cerrando} onClick={cerrarJornadaAnterior}>
          {state.cerrando ? <span className="spinner" /> : "Cerrar jornada anterior"}
        </Button>
      </div>
    );
  }

  if (state.status === "jornada_cerrada_hoy") {
    return (
      <div className="min-h-screen flex flex-col items-center justify-center px-8 text-center">
        <p className="text-[20px] font-extrabold mb-2">Ya cerraste tu jornada de hoy</p>
        <p className="text-[14px] text-sub">Contactá a tu supervisor si necesitás continuar.</p>
      </div>
    );
  }

  return <MecanicoApp user={user} />;
}

/* =====================================================================
   APP DEL MECANICO
===================================================================== */
function MecanicoApp({ user }) {
  const [clienteId, setClienteId] = useState(null);
  const [empresaConfirmada, setEmpresaConfirmada] = useState(false);
  const [checkDone, setCheckDone] = useState(false);
  const [cfg, setCfg] = useState(DEFAULT_CFG);
  const [tab, setTab] = useState("inicio");
  const [flow, setFlow] = useState(null);
  const [pushToast, toastNode] = useToasts();
  const alertasNoLeidas = useAlertasNoLeidas(clienteId, user.id);
  // Bloqueo tras cerrar jornada: solo se levanta con un login nuevo (MecanicoGate
  // reevalua desde la DB). En esta misma sesion, solo queda accesible Alertas.
  const [jornadaCerrada, setJornadaCerrada] = useState(() => {
    const t = getTurno();
    return localStorage.getItem("jornada_cerrada_hoy") === "true" && !!t && t.fecha === todayISO();
  });

  useEffect(() => {
    const turno = getTurno();
    if (turno && turno.fecha === todayISO()) {
      setClienteId(turno.clienteId); setEmpresaConfirmada(true); setCheckDone(!!turno.checkDone);
    }
  }, []);
  useEffect(() => { if (clienteId) db.fetchConfig(clienteId).then(setCfg).catch(() => setCfg(getCache(LS.cfg(clienteId), DEFAULT_CFG))); }, [clienteId]);

  if (!empresaConfirmada) {
    return <SeleccionEmpresa user={user} onConfirm={(cid) => { setClienteId(cid); setEmpresaConfirmada(true); setTurno({ clienteId: cid, fecha: todayISO(), checkDone: false }); }} />;
  }
  if (!checkDone) {
    return <CheckDiario user={user} clienteId={clienteId} onDone={() => setCheckDone(true)} />;
  }

  let body;
  if (jornadaCerrada && tab !== "alertas") {
    body = (
      <div className="min-h-screen flex flex-col items-center justify-center px-8 text-center">
        <div className="w-14 h-14 rounded-2xl bg-[#DCFCE7] flex items-center justify-center mb-5"><Icon.check width="26" height="26" className="text-[#15803D]" /></div>
        <p className="text-[22px] font-extrabold mb-2">¡Jornada cerrada!</p>
        <p className="text-[15px] text-sub">Hasta mañana, {user.nombre}</p>
      </div>
    );
  } else if (flow && flow.stage === "accion") {
    body = (
      <>
        <SeleccionEquipo clienteId={clienteId} onPick={(eq) => setFlow({ stage: "accion", equipo: eq })} />
        <AccionEquipo equipo={flow.equipo} onClose={() => setFlow(null)}
          onAuditoria={() => setFlow({ stage: "auditoria", equipo: flow.equipo })}
          onCambio={async () => {
            const pd = await construirPosDataDesdeEquipo(flow.equipo.id_equipo);
            let pend = null;
            try { pend = await buscarInstructivoPendiente(flow.equipo.id_equipo); } catch (e) { console.error("No se pudo buscar instructivo pendiente", e); }
            setFlow({ stage: "cambio", equipo: flow.equipo, axleCfg: axleConfigFor(flow.equipo), posData: pd, checklist: [], pendiente: pend });
          }} />
      </>
    );
  } else if (flow && flow.stage === "auditoria") {
    body = (
      <AuditoriaForm user={user} clienteId={clienteId} equipo={flow.equipo} cfg={cfg}
        onCancel={() => setFlow(null)}
        onGenerarInstructivo={async (posData, axleCfg, km, startedAt) => {
          const recsInfo = generarRecomendaciones(posData, axleCfg, flow.equipo.tipo, cfg);
          const checklist = recsInfo.recs.map(r => ({ id: r.id, texto: r.texto, done: false, extra: false }));
          let discrepanciasNeumaticos = [];
          try { discrepanciasNeumaticos = await compararNeumaticosAuditoria(clienteId, flow.equipo.id_equipo, posData); }
          catch (e) { console.error("No se pudo comparar neumáticos contra el sistema", e); }
          setFlow({ stage: "instructivo", equipo: flow.equipo, posData, axleCfg, km, recsInfo, checklist, discrepanciasNeumaticos });
        }} />
    );
  } else if (flow && flow.stage === "instructivo") {
    body = (
      <Instructivo equipo={flow.equipo} axleCfg={flow.axleCfg} posData={flow.posData} recsInfo={flow.recsInfo}
        checklist={flow.checklist} setChecklist={(fn) => setFlow(f => ({ ...f, checklist: typeof fn === "function" ? fn(f.checklist) : fn }))}
        discrepancias={flow.discrepanciasNeumaticos}
        onContinuar={async () => {
          const res = await construirYGuardarAuditoria({ user, clienteId, equipo: flow.equipo, cfg, posData: flow.posData, axleCfg: flow.axleCfg, km: flow.km, checklist: flow.checklist, recsInfo: flow.recsInfo, discrepanciasNeumaticos: flow.discrepanciasNeumaticos, recetaEstado: "en_proceso" });
          const n = res.alertas;
          pushToast(n > 0 ? `✓ Auditoría guardada · ${n} alerta${n !== 1 ? "s" : ""} generada${n !== 1 ? "s" : ""}` : "✓ Auditoría guardada");
          setFlow({ stage: "cambio", equipo: flow.equipo, axleCfg: flow.axleCfg, posData: flow.posData, checklist: flow.checklist, kmInicial: flow.km, recetaIdInicial: res.recetaId });
        }}
        onCerrar={async () => {
          const res = await construirYGuardarAuditoria({ user, clienteId, equipo: flow.equipo, cfg, posData: flow.posData, axleCfg: flow.axleCfg, km: flow.km, checklist: flow.checklist, recsInfo: flow.recsInfo, discrepanciasNeumaticos: flow.discrepanciasNeumaticos, recetaEstado: "pendiente" });
          const n = res.alertas;
          pushToast(n > 0 ? `✓ Auditoría guardada · ${n} alerta${n !== 1 ? "s" : ""} generada${n !== 1 ? "s" : ""}` : "✓ Auditoría guardada");
          setFlow(null);
        }} />
    );
  } else if (flow && flow.stage === "cambio") {
    body = (
      <CambioForm user={user} clienteId={clienteId} equipo={flow.equipo} cfg={cfg} axleCfg={flow.axleCfg}
        posDataInicial={flow.posData} checklistInicial={flow.checklist} kmInicial={flow.kmInicial}
        recetaIdInicial={flow.recetaIdInicial} pendiente={flow.pendiente}
        onCancel={() => setFlow(null)} onFinish={() => setFlow(null)} />
    );
  } else if (tab === "cierre") {
    body = <CierreDelDia user={user} clienteId={clienteId} onCerrado={() => setJornadaCerrada(true)} />;
  } else if (tab === "alertas") {
    body = <AlertasScreen user={user} clienteId={clienteId} />;
  } else if (tab === "perfil") {
    body = <PerfilScreen user={user} />;
  } else {
    body = <SeleccionEquipo clienteId={clienteId} onPick={(eq) => setFlow({ stage: "accion", equipo: eq })} />;
  }

  const showBottomNav = !flow || flow.stage === "accion";

  return (
    <div>
      <div className="fixed top-2 left-0 right-0 z-40"><OfflineBadge /></div>
      {toastNode}
      {body}
      {showBottomNav && <BottomNav view={tab} setView={(t) => { setTab(t); setFlow(null); }} disabledExcept={jornadaCerrada ? "alertas" : null} alertasNoLeidas={alertasNoLeidas} />}
    </div>
  );
}

function PerfilScreen({ user }) {
  const [confirming, setConfirming] = useState(false);
  return (
    <div className="min-h-screen pb-24 px-5 pt-14 safe-top">
      <h1 className="text-[30px] font-extrabold mb-6">Perfil</h1>
      <Card className="mb-6">
        <div className="flex items-center gap-3">
          <div className="w-12 h-12 rounded-full bg-[#F3F4F6] flex items-center justify-center"><Icon.user width="22" height="22" /></div>
          <div>
            <p className="font-bold text-[16px]">{user.nombre} {user.apellido || ""}</p>
            <p className="text-[12.5px] text-muted">Usuario: {user.usuario} · Rol: {user.rol}</p>
          </div>
        </div>
      </Card>
      <Button variant="danger" className="w-full" onClick={() => setConfirming(true)}>Cerrar sesión</Button>
      {confirming && (
        <Confirm title="Cerrar sesión" desc="¿Seguro que querés cerrar tu sesión?"
          onCancel={() => setConfirming(false)}
          onConfirm={() => { clearSession(); location.reload(); }} />
      )}
    </div>
  );
}

/* =====================================================================
   DASHBOARDS ADMIN / SUPERADMIN / CLIENTE (placeholder de esta primera etapa)
   Cada rol va directo a su propio dashboard, sin pasar por el árbol de
   decisión del mecánico.
===================================================================== */

  return <RolDashboard user={user} onLogout={onLogout} panelLabel="Panel de Cliente"
    descripcion="La vista de solo lectura de tus equipos, neumáticos y auditorías llega en la siguiente etapa del proyecto." />;
}

/* =====================================================================
   APP RAIZ
===================================================================== */
function App() {
  const [user, setUser] = useState(() => getSession());
  const [checking, setChecking] = useState(!!getSession());

  useEffect(() => {
    const cached = getSession();
    if (!cached) { setChecking(false); return; }
    db.fetchUsuario(cached.id).then(fresh => {
      if (!fresh || !fresh.activo) { clearSession(); setUser(null); }
      else { setSession(fresh); setUser(fresh); }
    }).catch(() => { /* sin conexión: seguir con la sesión cacheada */ }).finally(() => setChecking(false));
  }, []);

  function handleLogin(u) { setSession(u); setUser(u); }
  function handleLogout() { clearSession(); setUser(null); }

  if (checking) return <div className="min-h-screen flex items-center justify-center"><span className="spinner" /></div>;
  if (!user) return <Login onLogin={handleLogin} />;
  if (user.rol === "mecanico") return <MecanicoGate user={user} key={user.id} />;
  if (user.rol === "admin") return <AdminApp user={user} onLogout={handleLogout} />;
  if (user.rol === "superadmin") return <SuperAdminApp user={user} onLogout={handleLogout} />;
  return <ClienteApp user={user} onLogout={handleLogout} />;
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);

if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => { navigator.serviceWorker.register("./sw.js").catch(e => console.error("SW registration failed", e)); });
}
</script>
