/* =====================================================================
   MOSA TIRES — kit de UI compartido (JSX). Cargado con Babel en modo
   clásico (sin módulos) antes del script propio de cada página, así que
   todo lo declarado acá (Icon, Button, Card, Modal, BottomNav, hooks...)
   queda disponible como global. Depende de React (CDN) y de
   js/supabase.js (LS, getQueue, db) ya cargados antes que este archivo.
===================================================================== */
const { useState, useEffect, useCallback, createContext, useContext } = React;

/* =====================================================================
   CONTEXTO GLOBAL
===================================================================== */
const AppCtx = createContext(null);
function useApp() { return useContext(AppCtx); }
function useOnline() {
  const [online, setOnline] = useState(navigator.onLine);
  useEffect(() => {
    const on = () => setOnline(true), off = () => setOnline(false);
    window.addEventListener("online", on); window.addEventListener("offline", off);
    return () => { window.removeEventListener("online", on); window.removeEventListener("offline", off); };
  }, []);
  return online;
}
function useQueueCount() {
  const [count, setCount] = useState(getQueue().length);
  useEffect(() => {
    const upd = () => setCount(getQueue().length);
    window.addEventListener("mosa-queue-changed", upd);
    const t = setInterval(upd, 3000);
    return () => { window.removeEventListener("mosa-queue-changed", upd); clearInterval(t); };
  }, []);
  return count;
}
function useAlertasNoLeidas(clienteId, mecanicoId) {
  const [count, setCount] = useState(0);
  const queuePending = useQueueCount();
  useEffect(() => {
    if (!clienteId || !mecanicoId) return;
    let cancel = false;
    const cargar = () => db.fetchAlertas(clienteId, mecanicoId).then(as => { if (!cancel) setCount(as.filter(a => !a.leida_mecanico).length); }).catch(() => {});
    cargar();
    window.addEventListener("mosa-alertas-changed", cargar);
    const t = setInterval(cargar, 15000);
    return () => { cancel = true; window.removeEventListener("mosa-alertas-changed", cargar); clearInterval(t); };
  }, [clienteId, mecanicoId, queuePending]);
  return count;
}

  eye: (p) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"/><circle cx="12" cy="12" r="3"/></svg>,

/* =====================================================================
   UI BASICOS
===================================================================== */
function Button({ variant = "primary", className = "", children, ...props }) {
  const base = "h-14 px-5 rounded-2xl font-bold text-[15px] transition active:scale-[0.98] disabled:opacity-50 disabled:active:scale-100 flex items-center justify-center gap-2";
  const variants = {
    primary: "bg-ink text-white",
    ghost: "bg-transparent text-ink border border-bdstrong",
    danger: "bg-[#FEE2E2] text-[#B91C1C]",
    subtle: "bg-[#F3F4F6] text-ink"
  };
  return <button className={cx(base, variants[variant], className)} {...props}>{children}</button>;
}
function Field({ label, required, children, hint }) {
  return (
    <label className="block">
      <span className="block text-[13px] font-semibold text-[#374151] mb-1.5">{label}{required && <span className="text-red-500"> *</span>}</span>
      {children}
      {hint && <span className="block text-xs text-muted mt-1">{hint}</span>}
    </label>
  );
}
function TextInput({ className = "", alert, warn, ...props }) {
  return <input className={cx("w-full h-[52px] px-4 rounded-2xl border bg-[#F3F4F6] border-[#E5E7EB] focus:outline-none focus:ring-2 focus:ring-ink/20 placeholder:text-muted", alert && "field-alert", warn && !alert && "field-warn", className)} {...props} />;
}
function Select({ className = "", children, ...props }) {
  return <select className={cx("w-full h-[52px] px-4 rounded-2xl border bg-[#F3F4F6] border-[#E5E7EB] focus:outline-none focus:ring-2 focus:ring-ink/20", className)} {...props}>{children}</select>;
}
function MarcaSelect({ value, onChange }) {
  const isOtra = value && !MARCAS_NEUMATICOS.slice(0, -1).includes(value);
  const [otra, setOtra] = useState(isOtra ? value : "");
  return (
    <div>
      <Select value={isOtra ? "Otra" : value} onChange={e => { if (e.target.value === "Otra") { onChange(otra); } else { onChange(e.target.value); } }}>
        <option value="">Seleccionar</option>
        {MARCAS_NEUMATICOS.map(m => <option key={m} value={m}>{m}</option>)}
      </Select>
      {isOtra && (
        <TextInput className="mt-2" placeholder="Escribí la marca" value={otra}
          onChange={e => { setOtra(e.target.value); onChange(e.target.value); }} />
      )}
    </div>
  );
}
function TextArea({ className = "", ...props }) {
  return <textarea className={cx("w-full min-h-[90px] px-4 py-3 rounded-2xl border bg-[#F3F4F6] border-[#E5E7EB] focus:outline-none focus:ring-2 focus:ring-ink/20", className)} {...props} />;
}
function Card({ className = "", children }) {
  return <div className={cx("bg-white rounded-card shadow-card border border-bd p-5", className)}>{children}</div>;
}
function Badge({ children, color = "gray" }) {
  const colors = {
    gray: "bg-[#F3F4F6] text-[#374151]", green: "bg-[#DCFCE7] text-[#15803D]",
    red: "bg-[#FEE2E2] text-[#B91C1C]", amber: "bg-[#FEF3C7] text-[#92400E]", black: "bg-ink text-white"
  };
  return <span className={cx("px-3 py-1 rounded-full text-[12px] font-bold", colors[color])}>{children}</span>;
}
function Modal({ title, onClose, children, wide, footer }) {
  return (
    <div className="fixed inset-0 z-50 flex items-end sm:items-center justify-center bg-black/40 p-0 sm:p-4" onClick={(e) => { if (e.target === e.currentTarget && onClose) onClose(); }}>
      <div className={cx("bg-white w-full sm:rounded-card rounded-t-[24px] max-h-[92vh] overflow-y-auto", wide ? "sm:max-w-2xl" : "sm:max-w-md")}>
        <div className="sticky top-0 bg-white border-b border-bd px-5 py-4 flex items-center justify-between z-10">
          <h3 className="text-lg font-extrabold">{title}</h3>
          {onClose && <button onClick={onClose} className="w-9 h-9 rounded-full hover:bg-[#F3F4F6] flex items-center justify-center text-sub"><Icon.close width="18" height="18"/></button>}
        </div>
        <div className="p-5">{children}</div>
        {footer && <div className="sticky bottom-0 bg-white border-t border-bd p-4">{footer}</div>}
      </div>
    </div>
  );
}
function Toast({ msg, onDone }) {
  useEffect(() => { const t = setTimeout(onDone, 2000); return () => clearTimeout(t); }, []);
  return (
    <div className="fixed top-4 left-1/2 -translate-x-1/2 z-[80] px-4 py-3 rounded-2xl shadow-lg text-sm font-semibold flex items-center gap-3" style={{ background: "#DCFCE7", color: "#15803D" }}>
      <span>{msg}</span>
      <button onClick={onDone} className="opacity-60">✕</button>
    </div>
  );
}
function useToasts() {
  const [toasts, setToasts] = useState([]);
  const push = useCallback((msg) => setToasts(t => [...t, { id: uuid(), msg }]), []);
  const remove = (id) => setToasts(t => t.filter(x => x.id !== id));
  const node = <div>{toasts.map(t => <Toast key={t.id} msg={t.msg} onDone={() => remove(t.id)} />)}</div>;
  return [push, node];
}
function Confirm({ title, desc, onConfirm, onCancel }) {
  return (
    <Modal title={title} onClose={onCancel}>
      <p className="text-[14px] text-[#374151] mb-5">{desc}</p>
      <div className="flex gap-3">
        <Button variant="subtle" className="flex-1" onClick={onCancel}>Cancelar</Button>
        <Button className="flex-1" onClick={onConfirm}>Confirmar</Button>
      </div>
    </Modal>
  );
}
function OfflineBadge() {
  const online = useOnline();
  const pending = useQueueCount();
  if (online && pending === 0) return null;
  return (
    <div className="px-4">
      {!online && <div className="mb-2 rounded-xl bg-[#FEE2E2] text-[#B91C1C] text-xs font-bold px-3 py-2 text-center">Sin conexión</div>}
      {pending > 0 && <div className="mb-2 rounded-xl bg-[#FEF3C7] text-[#92400E] text-xs font-bold px-3 py-2 text-center">{pending} registro{pending !== 1 ? "s" : ""} pendiente{pending !== 1 ? "s" : ""} de sincronizar</div>}
    </div>
  );
}

/* =====================================================================
   NAV
===================================================================== */
function BottomNav({ view, setView, disabledExcept, alertasNoLeidas }) {
  const items = [
    { id: "inicio", label: "Inicio", icon: Icon.home },
    { id: "cierre", label: "Cierre", icon: Icon.clipboard },
    { id: "alertas", label: "Alertas", icon: Icon.bell },
    { id: "perfil", label: "Perfil", icon: Icon.user }
  ];
  return (
    <div className="fixed bottom-0 left-0 right-0 bg-white border-t border-bd safe-bottom z-30">
      <div className="flex">
        {items.map(it => {
          const active = view === it.id;
          const disabled = disabledExcept && !disabledExcept.includes(it.id);
          return (
            <button key={it.id} disabled={disabled} onClick={() => setView(it.id)} className={cx("relative flex-1 flex flex-col items-center gap-1 py-2.5", disabled && "opacity-30")}>
              <span className="relative">
                <it.icon width="24" height="24" className={active ? "text-ink" : "text-[#B0B3B8]"} />
                {it.id === "alertas" && alertasNoLeidas > 0 && (
                  <span className="absolute -top-1 -right-2.5 min-w-[16px] h-4 px-1 rounded-full bg-[#EF4444] text-white text-[10px] font-bold flex items-center justify-center">{alertasNoLeidas > 99 ? "99+" : alertasNoLeidas}</span>
                )}
              </span>
              <span className={cx("text-[10.5px] font-semibold", active ? "text-ink" : "text-[#B0B3B8]")}>{it.label}</span>
            </button>
          );
        })}
      </div>
    </div>
  );
}

/* =====================================================================
   PANTALLA 1 - LOGIN
===================================================================== */
function Login({ onLogin }) {
  const [usuario, setUsuario] = useState("");
  const [password, setPassword] = useState("");
  const [showPw, setShowPw] = useState(false);
  const [error, setError] = useState("");
  const [loading, setLoading] = useState(false);

  async function submit(e) {
    e.preventDefault();
    if (!usuario || !password) { setError("Completa usuario y contraseña"); return; }
    setLoading(true); setError("");
    try {
      const hash = await sha256Hex(password);
      const user = await db.login(usuario.trim(), hash);
      if (!user) { setError("Usuario o contraseña incorrectos"); setLoading(false); return; }
      onLogin(user);
    } catch (err) {
      setError("No se pudo conectar. Intenta de nuevo.");
      setLoading(false);
    }
  }

  return (
    <div className="min-h-screen flex flex-col px-6 pt-16 safe-top">
      <div className="w-14 h-14 rounded-2xl bg-ink flex items-center justify-center mb-6">
        <Icon.gauge width="28" height="28" className="text-white" />
      </div>
      <h1 className="text-[34px] font-extrabold tracking-tight leading-none">MOSA TIRES</h1>
      <p className="text-[15px] font-medium text-sub mt-2 mb-10">Gestión de neumáticos de flota</p>

      <form onSubmit={submit} className="space-y-4">
        <Field label="Usuario">
          <TextInput placeholder="Ingresa tu usuario" value={usuario} onChange={e => setUsuario(e.target.value)} autoCapitalize="none" />
        </Field>
        <Field label="Contraseña">
          <div className="relative">
            <TextInput type={showPw ? "text" : "password"} placeholder="Ingresa tu contraseña" value={password} onChange={e => setPassword(e.target.value)} />
            <button type="button" onClick={() => setShowPw(v => !v)} className="absolute right-4 top-1/2 -translate-y-1/2 text-muted">
              <Icon.eye width="20" height="20" />
            </button>
          </div>
        </Field>
        {error && <div className="text-[13px] font-semibold text-[#B91C1C] bg-[#FEE2E2] rounded-xl px-3 py-2">{error}</div>}
        <Button type="submit" className="w-full mt-2" disabled={loading}>
          {loading ? <span className="spinner" /> : "Iniciar sesión"}
        </Button>
      </form>

      <div className="flex-1" />
      <p className="text-[12px] text-[#B0B3B8] text-center pb-8">MOSA TIRES v1.0 · Soporte técnico</p>
    </div>
  );
}

/* =====================================================================
   ARBOL DE DECISION DEL MECANICO (al loguear)
   Solo las pantallas de bloqueo (jornada anterior sin cerrar, jornada de
   hoy ya cerrada) viven acá. Una vez resuelto que el mecánico puede
   trabajar, se redirige a mecanico.html (que maneja empresa/check diario
   y todo el resto del flujo).
===================================================================== */
function MecanicoGate({ user }) {
  const [state, setState] = useState({ status: "loading" });

  async function cargar() {
    setState({ status: "loading" });
    try {
      const res = await evaluarEstadoMecanico(user);
      if (res.estado === "jornada_pendiente") {
        const resumen = await resumenJornada(user.id, res.jornada.fecha);
        setState({ status: "jornada_pendiente", jornada: res.jornada, resumen });
      } else if (res.estado === "jornada_cerrada_hoy") {
        setState({ status: "jornada_cerrada_hoy" });
      } else if (res.estado === "menu_principal") {
        setTurno({ clienteId: res.clienteId, fecha: todayISO(), checkDone: true });
        setState({ status: "ready" });
      } else {
        localStorage.removeItem(LS.turno);
        setState({ status: "ready" });
      }
    } catch (e) {
      console.error("No se pudo evaluar el estado del mecánico", e);
      setState({ status: "ready" });
    }
  }

  useEffect(() => { cargar(); }, []);

  useEffect(() => {
    if (state.status === "ready") location.replace("mecanico.html");
  }, [state.status]);

  // Mientras esta bloqueado por "jornada cerrada hoy", sondea si el Admin ya
  // aprobo un desbloqueo; si es asi, vuelve a evaluar el arbol de decision
  // (evaluarEstadoMecanico ya ignora el turno viejo una vez que el Admin creo uno nuevo).
  useEffect(() => {
    if (state.status !== "jornada_cerrada_hoy") return;
    const t = setInterval(async () => {
      try {
        const aprobado = await buscarDesbloqueoAprobado(user.id);
        if (aprobado) { await marcarAlertaLeidaMecanico(aprobado.id); await cargar(); }
      } catch (e) { /* sin conexion, se reintenta en el proximo tick */ }
    }, 8000);
    return () => clearInterval(t);
  }, [state.status]);

  async function pedirDesbloqueo() {
    setState(s => ({ ...s, solicitando: true }));
    try {
      await solicitarDesbloqueo(user);
      setState(s => ({ ...s, solicitando: false, solicitado: true }));
    } catch (e) {
      console.error("No se pudo solicitar el desbloqueo", e);
      setState(s => ({ ...s, solicitando: false }));
    }
  }

  async function cerrarJornadaAnterior() {
    setState(s => ({ ...s, cerrando: true }));
    const ultima = await ultimaActividadDelDia(user.id, state.jornada.fecha);
    const horaCierre = ultima ? ultima.toTimeString().slice(0, 8) : "23:59:59";
    try {
      await cerrarJornadaConResumen({ user, clienteId: state.jornada.cliente_id, fecha: state.jornada.fecha, horaCierre, motivoSinCierre: "olvido_cierre" });
    } catch (e) { console.error("No se pudo cerrar la jornada anterior", e); }
    await cargar();
  }

  if (state.status === "loading" || state.status === "ready") {
    return <div className="min-h-screen flex items-center justify-center"><span className="spinner" /></div>;
  }

  if (state.status === "jornada_pendiente") {
    const r = state.resumen;
    return (
      <div className="min-h-screen flex flex-col px-6 pt-16 safe-top">
        <h1 className="text-[24px] font-extrabold leading-tight mb-2">Tenés una jornada del {formatDateLong(state.jornada.fecha)} sin cerrar</h1>
        <p className="text-[14px] text-sub mb-6">Cerrala antes de seguir. Este es el resumen de ese día:</p>
        <div className="grid grid-cols-3 gap-3 mb-6">
          {[["Auditorías", r.auditorias], ["Cambios", r.cambios], ["Intervenciones", r.intervenciones]].map(([l, v]) => (
            <div key={l} className="bg-[#F9FAFB] rounded-[18px] p-4 text-center">
              <p className="text-[22px] font-extrabold">{v}</p>
              <p className="text-[11px] font-semibold text-muted mt-1">{l}</p>
            </div>
          ))}
        </div>
        <Button className="w-full" disabled={state.cerrando} onClick={cerrarJornadaAnterior}>
          {state.cerrando ? <span className="spinner" /> : "Cerrar jornada anterior"}
        </Button>
      </div>
    );
  }

  if (state.status === "jornada_cerrada_hoy") {
    return (
      <div className="min-h-screen flex flex-col items-center justify-center px-8 text-center">
        <p className="text-[20px] font-extrabold mb-2">Ya cerraste tu jornada de hoy</p>
        <p className="text-[14px] text-sub mb-6">
          {state.solicitado
            ? "Se le avisó al administrador. Esta pantalla se actualiza sola apenas te desbloquee."
            : "Si cerraste por error o necesitás cambiar de empresa, pedile a tu administrador que te desbloquee."}
        </p>
        {!state.solicitado && (
          <Button className="w-full mb-3" disabled={state.solicitando} onClick={pedirDesbloqueo}>
            {state.solicitando ? <span className="spinner" /> : "Solicitar desbloqueo al administrador"}
          </Button>
        )}
        <Button variant="ghost" onClick={() => { clearSession(); location.reload(); }}>Iniciar sesión</Button>
      </div>
    );
  }

  return null;
}

/* =====================================================================
   APP RAIZ
   Login + ruteo por rol. Cada rol no-mecánico tiene su propio archivo
   (admin.html / superadmin.html / cliente.html / cliente-operativo.html
   según subtipo); el mecánico pasa por
   MecanicoGate y termina en mecanico.html.
===================================================================== */
function App() {
  const [user, setUser] = useState(() => getSession());
  const [checking, setChecking] = useState(!!getSession());

  useEffect(() => {
    const cached = getSession();
    if (!cached) { setChecking(false); return; }
    db.fetchUsuario(cached.id).then(fresh => {
      if (!fresh || !fresh.activo) { clearSession(); setUser(null); }
      else { setSession(fresh); setUser(fresh); }
    }).catch(() => { /* sin conexión: seguir con la sesión cacheada */ }).finally(() => setChecking(false));
  }, []);

  useEffect(() => {
    if (!user) return;
    if (user.rol === "admin") location.replace("admin.html");
    else if (user.rol === "superadmin") location.replace("superadmin.html");
    else if (user.rol === "cliente" && user.subtipo === "operativo") location.replace("cliente-operativo.html");
    else if (user.rol === "cliente" && user.subtipo === "dueno") location.replace("cliente-gerencia.html");
    else if (user.rol === "cliente") location.replace("cliente.html");
  }, [user]);

  function handleLogin(u) { setSession(u); setUser(u); }

  if (checking) return <div className="min-h-screen flex items-center justify-center"><span className="spinner" /></div>;
  if (!user) return <Login onLogin={handleLogin} />;
  if (user.rol === "mecanico") return <MecanicoGate user={user} key={user.id} />;
  // admin / superadmin / cliente: redirigiendo a su archivo (ver efecto arriba).
  return <div className="min-h-screen flex items-center justify-center"><span className="spinner" /></div>;
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);

if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => { navigator.serviceWorker.register("./sw.js").catch(e => console.error("SW registration failed", e)); });
}
</script>
</body>
</html>
