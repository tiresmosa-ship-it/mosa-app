/* =====================================================================
   UTILIDADES
===================================================================== */
function cx(...xs) { return xs.filter(Boolean).join(" "); }
function pad2(n) { n = String(n); return n.length < 2 ? "0" + n : n; }
function todayISO() {
  const d = new Date();
  return d.getFullYear() + "-" + pad2(d.getMonth() + 1) + "-" + pad2(d.getDate());
}
function nowHM() { const d = new Date(); return pad2(d.getHours()) + ":" + pad2(d.getMinutes()) + ":" + pad2(d.getSeconds()); }
function formatDateLong(iso) {
  const dias = ["Domingo","Lunes","Martes","Miércoles","Jueves","Viernes","Sábado"];
  const meses = ["enero","febrero","marzo","abril","mayo","junio","julio","agosto","septiembre","octubre","noviembre","diciembre"];
  const d = iso ? new Date(iso + "T00:00:00") : new Date();
  return `${dias[d.getDay()]}, ${d.getDate()} de ${meses[d.getMonth()]}`;
}
function isoWeek(date) {
  const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
  const dayNum = d.getUTCDay() || 7;
  d.setUTCDate(d.getUTCDate() + 4 - dayNum);
  const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
  return Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
}
function uuid() {
  if (crypto.randomUUID) return crypto.randomUUID();
  return "xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx".replace(/[xy]/g, c => {
    const r = Math.random() * 16 | 0, v = c === "x" ? r : (r & 0x3 | 0x8);
    return v.toString(16);
  });
}
async function sha256Hex(text) {
  const enc = new TextEncoder().encode(text);
  const buf = await crypto.subtle.digest("SHA-256", enc);
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, "0")).join("");
}
function generarFuegoLaPortada(numeroInterno, posicion, fecha) {
  const d = fecha ? new Date(fecha + "T00:00:00") : new Date();
  const semana = pad2(isoWeek(d));
  const anio = pad2(d.getFullYear() % 100);
  return `${numeroInterno || "0"}${semana}${anio}${posicion}`;
}

function getSession() { try { return JSON.parse(localStorage.getItem(LS.session) || "null"); } catch (e) { return null; } }

function pushQueue(item) { const q = getQueue(); q.push(item); setQueue(q); }
function removeFromQueue(id) { setQueue(getQueue().filter(x => x.id !== id)); }

function getCache(key, fallback) { try { return JSON.parse(localStorage.getItem(key) || "null") || fallback; } catch (e) { return fallback; } }

async function siguienteNumeroAuditoria(clienteId, cfg) {
  const { data, error } = await supabase.from("auditorias").select("numero_auditoria").eq("cliente_id", clienteId);
  const inicio = parseInt(cfg.numero_auditoria_inicio || 1, 10);
  let maxExistente = null;
  if (!error && data) {
    data.forEach(r => {
      const n = parseInt(r.numero_auditoria, 10);
      if (!isNaN(n) && (maxExistente === null || n > maxExistente)) maxExistente = n;
    });
  }
  const base = maxExistente === null ? inicio : maxExistente + 1;
  const pendientes = getQueue().filter(q => q.clienteId === clienteId && q.tipo === "auditoria").length;
  return String(base + pendientes);
}
async function siguienteNumeroCambio(clienteId, cfg) {
  const { data, error } = await supabase.from("cambios_neumaticos").select("numero_cambio").order("numero_cambio", { ascending: false }).limit(1);
  let base = parseInt(cfg.numero_cambio_inicio || 1, 10);
  if (!error && data && data[0] && !isNaN(parseInt(data[0].numero_cambio, 10))) base = Math.max(base, parseInt(data[0].numero_cambio, 10) + 1);
  const pendientes = getQueue().filter(q => q.clienteId === clienteId && q.tipo === "cambio").length;
  return String(base + pendientes);
}

/* =====================================================================
   ESTADO DE NEUMATICO (alertas en tiempo real)
===================================================================== */
function evaluarPosicion(axleCfg, cfg, pos, tipoEquipo, data) {
  const tipo = posType(axleCfg, pos); // D | M | auxilio
  const mm = [data.mm_borde_izq, data.mm_centro, data.mm_borde_der].map(v => parseFloat(v)).filter(v => !isNaN(v));
  const minMM = mm.length ? Math.min(...mm) : null;
  const esSemi = tipoEquipo === "SEMI";
  const mmMin = tipo === "auxilio" ? cfg.mm_minimo_auxilio : (esSemi ? cfg.mm_minimo_semi : cfg.mm_minimo_tracto);
  const mmAmarillo = esSemi ? cfg.mm_amarillo_semi : cfg.mm_amarillo_tracto;
  const psiObjetivo = tipo === "D" ? cfg.psi_delantero : tipo === "auxilio" ? (esSemi ? cfg.psi_auxilio_semi : cfg.psi_auxilio_tracto) : cfg.psi_traccion;
  const tol = psiObjetivo * (cfg.psi_tolerancia_pct / 100);
  const psi = parseFloat(data.psi);

  let status = "ok";
  let motivos = [];
  if (minMM != null) {
    if (minMM < mmMin) { status = "alerta"; motivos.push(`mm ${minMM} bajo mínimo ${mmMin}`); }
    else if (minMM < mmAmarillo && status !== "alerta") { status = "atencion"; motivos.push(`mm ${minMM} cerca del mínimo`); }
  }
  if (!isNaN(psi)) {
    if (Math.abs(psi - psiObjetivo) > tol * 2) { status = "alerta"; motivos.push(`psi ${psi} muy fuera de rango`); }
    else if (Math.abs(psi - psiObjetivo) > tol && status !== "alerta") { status = "atencion"; motivos.push(`psi ${psi} fuera de tolerancia`); }
  }
  return { status, motivos, minMM, psiObjetivo, mmMin, mmAmarillo };
}

/* =====================================================================
   MOTOR DE SINCRONIZACION OFFLINE
===================================================================== */
let syncing = false;
async function syncQueue(onProgress) {
  if (syncing || !navigator.onLine) return;
  syncing = true;
  try {
    let queue = getQueue().slice().sort((a, b) => a.ts - b.ts);
    for (const item of queue) {
      try {
        await enviarItem(item);
        removeFromQueue(item.id);
        if (onProgress) onProgress(item);
      } catch (e) {
        console.error("Error sincronizando", item, e);
        break;
      }
    }
  } finally { syncing = false; }
}
async function enviarItem(item) {
  switch (item.tipo) {
    case "novedad": return enviarNovedad(item.data);
    case "auditoria": return enviarAuditoria(item.data);
    case "cambio": return enviarCambio(item.data);
    case "cierre": return enviarCierre(item.data);
    case "alerta": return enviarAlerta(item.data);
    default: throw new Error("tipo desconocido " + item.tipo);
  }
}
async function enviarAlerta(data) {
  const { error } = await supabase.from("alertas").insert(data);
  if (error) throw error;
}
async function enviarNovedad(data) {
  const { checklist, ...cab } = data;
  const { error: e1 } = await supabase.from("check_diario").insert(cab);
  if (e1) throw e1;
  const rows = checklist.map(c => ({ id: uuid(), novedad_id: cab.id, herramienta: c.herramienta, cantidad: c.cantidad }));
  if (rows.length) { const { error: e2 } = await supabase.from("check_diario_herramientas").insert(rows); if (e2) throw e2; }
}
async function asegurarNeumatico(clienteId, numeroFuego, equipoId, posicion, extra) {
  const { data: existente } = await supabase.from("neumaticos").select("id_neumatico").eq("cliente_id", clienteId).eq("numero_fuego", numeroFuego).maybeSingle();
  if (existente) return;
  await supabase.from("neumaticos").insert({
    id_neumatico: uuid(), numero_fuego: numeroFuego, cliente_id: clienteId,
    marca: (extra && extra.marca) || null, medida: (extra && extra.medida) || null,
    estado_actual: "nuevo", bodega: null, equipo_actual: equipoId, posicion_actual: posicion,
    fecha_ingreso: todayISO(), activo: true
  });
}
async function enviarAuditoria(data) {
  const { posiciones, receta, cliente_id, ...rest } = data;
  const cab = { ...rest, cliente_id };
  const { error: e1 } = await supabase.from("auditorias").insert(cab);
  if (e1) throw e1;
  for (const p of posiciones) {
    if (p.numero_fuego) await asegurarNeumatico(cliente_id, p.numero_fuego, cab.equipo_id, p.posicion, p);
  }
  const rows = posiciones.filter(p => p.numero_fuego).map(p => ({
    id: p.id, posicion: p.posicion, numero_fuego: p.numero_fuego,
    milimetros: p.milimetros, psi: p.psi, mm_borde_izq: p.mm_borde_izq, mm_centro: p.mm_centro, mm_borde_der: p.mm_borde_der,
    auditoria_id: cab.id_auditoria
  }));
  if (rows.length) { const { error: e2 } = await supabase.from("auditoria_posiciones").insert(rows); if (e2) throw e2; }
  if (receta) { const { error: e3 } = await supabase.from("auditorias_receta").insert({ ...receta, auditoria_id: cab.id_auditoria, cliente_id }); if (e3) throw e3; }
  await supabase.from("equipos").update({ kilometros: cab.kilometraje }).eq("id_equipo", cab.equipo_id);
}
async function insertMovimientoBodega(clienteId, mecanicoId, tipo, origen, numeroFuego) {
  const { error } = await supabase.from("movimientos_bodega").insert({
    id: uuid(), cliente_id: clienteId, mecanico_id: mecanicoId, fecha: todayISO(),
    categoria: "neumatico", tipo, origen, numero_fuego: numeroFuego
  });
  if (error) console.error("No se pudo registrar movimiento de bodega", error);
}
async function enviarCambio(data) {
  const { sale, entra, rotaciones, intervenciones, alertas, recetaUpdate, cliente_id, ...cab } = data;
  const mecanicoId = cab.bultero_id;
  const { error: e1 } = await supabase.from("cambios_neumaticos").insert(cab);
  if (e1) throw e1;
  const detalle = [];
  // SALIDAS: cambio_detalle (tipo='sale', motivo_salida), neumaticos (bodega/estado),
  // movimientos_bodega (tipo='salida', origen segun motivo).
  for (const s of sale) {
    await asegurarNeumatico(cliente_id, s.numero_fuego, null, null, s);
    detalle.push({ id: uuid(), cambio_id: cab.id_cambio, tipo: "sale", numero_fuego: s.numero_fuego, posicion: s.posicion || null, milimetros: s.milimetros || null, psi: s.psi || null, estado: null, motivo_salida: s.motivo_salida || s.motivo || null });
    await actualizarNeumaticoSale(cliente_id, s);
    await insertMovimientoBodega(cliente_id, mecanicoId, "salida", s.origen_mov || s.motivo || "salida", s.numero_fuego);
  }
  // ENTRADAS (montaje): cambio_detalle (tipo='entra', estado=tipo original),
  // neumaticos (equipo/posicion, estado_actual='en_uso'), movimientos_bodega
  // (tipo='entrada', origen='montaje').
  for (const en of entra) {
    await asegurarNeumatico(cliente_id, en.numero_fuego, cab.equipo_id, en.posicion, en);
    detalle.push({ id: uuid(), cambio_id: cab.id_cambio, tipo: "entra", numero_fuego: en.numero_fuego, posicion: en.posicion || null, milimetros: en.milimetros || null, psi: en.psi || null, estado: en.estado || null, motivo_salida: null });
    await actualizarNeumaticoEntra(cliente_id, cab.equipo_id, en);
    await insertMovimientoBodega(cliente_id, mecanicoId, "entrada", "montaje", en.numero_fuego);
  }
  // ROTACIONES: 4 filas de cambio_detalle (sale A / entra A / sale B / entra B),
  // se intercambia posicion_actual entre A y B. El inventario NO cambia y no se
  // registran movimientos_bodega.
  for (const r of (rotaciones || [])) {
    const a = r.a, b = r.b;
    detalle.push({ id: uuid(), cambio_id: cab.id_cambio, tipo: "sale", numero_fuego: a.numero_fuego, posicion: r.origen, milimetros: a.mm || null, psi: a.psi || null, estado: null, motivo_salida: "rotacion" });
    detalle.push({ id: uuid(), cambio_id: cab.id_cambio, tipo: "entra", numero_fuego: a.numero_fuego, posicion: r.destino, milimetros: a.mm || null, psi: a.psi || null, estado: null, motivo_salida: "rotacion" });
    if (b) {
      detalle.push({ id: uuid(), cambio_id: cab.id_cambio, tipo: "sale", numero_fuego: b.numero_fuego, posicion: r.destino, milimetros: b.mm || null, psi: b.psi || null, estado: null, motivo_salida: "rotacion" });
      detalle.push({ id: uuid(), cambio_id: cab.id_cambio, tipo: "entra", numero_fuego: b.numero_fuego, posicion: r.origen, milimetros: b.mm || null, psi: b.psi || null, estado: null, motivo_salida: "rotacion" });
      // Swap seguro (evita choque si hay indice unico por equipo/posicion):
      // A -> null, B -> origen, A -> destino.
      await supabase.from("neumaticos").update({ posicion_actual: null }).eq("cliente_id", cliente_id).eq("numero_fuego", a.numero_fuego).eq("equipo_actual", cab.equipo_id);
      await supabase.from("neumaticos").update({ posicion_actual: r.origen }).eq("cliente_id", cliente_id).eq("numero_fuego", b.numero_fuego).eq("equipo_actual", cab.equipo_id);
      await supabase.from("neumaticos").update({ posicion_actual: r.destino }).eq("cliente_id", cliente_id).eq("numero_fuego", a.numero_fuego).eq("equipo_actual", cab.equipo_id);
    } else {
      await supabase.from("neumaticos").update({ posicion_actual: r.destino }).eq("cliente_id", cliente_id).eq("numero_fuego", a.numero_fuego).eq("equipo_actual", cab.equipo_id);
    }
  }
  if (detalle.length) { const { error: e2 } = await supabase.from("cambio_detalle").insert(detalle); if (e2) throw e2; }
  if (intervenciones && intervenciones.length) {
    const { error: e3 } = await supabase.from("intervenciones").insert(intervenciones); if (e3) throw e3;
    // Regulacion de PSI: actualizar neumaticos.psi_actual (no se toca auditoria_posiciones).
    for (const iv of intervenciones) {
      if (iv.tipo === "regulacion_psi" && iv.psi_nuevo != null && iv.numero_fuego) {
        await supabase.from("neumaticos").update({ psi_actual: iv.psi_nuevo }).eq("cliente_id", cliente_id).eq("numero_fuego", iv.numero_fuego);
      }
    }
  }
  await supabase.from("equipos").update({ kilometros: cab.kilometraje }).eq("id_equipo", cab.equipo_id);
  // Cierre del instructivo asociado: parcial (quedan tareas) o completado.
  if (recetaUpdate && recetaUpdate.id) {
    const { error: e4 } = await supabase.from("auditorias_receta").update({
      estado: recetaUpdate.estado, tareas_cumplidas: recetaUpdate.tareas_cumplidas, tareas_pendientes: recetaUpdate.tareas_pendientes
    }).eq("id", recetaUpdate.id);
    if (e4) console.error("No se pudo actualizar el estado del instructivo", e4);
  }
  for (const a of (alertas || [])) await insertAlerta(a);
}
async function enviarCierre(data) {

  });
}

async function actualizarNeumaticoSale(clienteId, s) {
  // destino = motivo de salida: transito | reparacion | baja.
  // bodega = destino (baja/transito/reparacion), estado_actual valido del CHECK.
  const destino = s.motivo;
  const bodega = destino === "baja" ? "baja" : destino; // 'baja' | 'transito' | 'reparacion'
  const estado = destino === "baja" ? "baja" : "transito";
  const { data: existente } = await supabase.from("neumaticos").select("*").eq("cliente_id", clienteId).eq("numero_fuego", s.numero_fuego).maybeSingle();
  if (existente) {
    const { error } = await supabase.from("neumaticos").update({ estado_actual: estado, bodega, equipo_actual: null, posicion_actual: null }).eq("id_neumatico", existente.id_neumatico);
    if (error) throw error;
  } else {
    const { error } = await supabase.from("neumaticos").insert({ id_neumatico: uuid(), numero_fuego: s.numero_fuego, cliente_id: clienteId, estado_actual: estado, bodega, equipo_actual: null, posicion_actual: null, fecha_ingreso: todayISO(), activo: true });
    if (error) throw error;
  }
}
async function actualizarNeumaticoEntra(clienteId, equipoId, en) {
  // Montaje: el neumatico queda montado en el equipo -> estado_actual='en_uso',
  // bodega=NULL (spec hoja de cambio). El tipo original (nuevo/transito/
  // recauchado) queda registrado en cambio_detalle.estado.
  const { data: existente } = await supabase.from("neumaticos").select("*").eq("cliente_id", clienteId).eq("numero_fuego", en.numero_fuego).maybeSingle();
  if (existente) {
    const { error } = await supabase.from("neumaticos").update({ estado_actual: "en_uso", bodega: null, equipo_actual: equipoId, posicion_actual: en.posicion || null }).eq("id_neumatico", existente.id_neumatico);
    if (error) throw error;
  } else {
    const { error } = await supabase.from("neumaticos").insert({
      id_neumatico: uuid(), numero_fuego: en.numero_fuego, cliente_id: clienteId,
      marca: en.marca || null, medida: en.medida || null, estado_actual: "en_uso", bodega: null,
      equipo_actual: equipoId, posicion_actual: en.posicion || null, fecha_ingreso: todayISO(), activo: true
    });
    if (error) throw error;
  }
}

const AppCtx = createContext(null);
function useApp() { return useContext(AppCtx); }
function useOnline() {
  const [online, setOnline] = useState(navigator.onLine);
  useEffect(() => {
    const on = () => setOnline(true), off = () => setOnline(false);
    window.addEventListener("online", on); window.addEventListener("offline", off);
    return () => { window.removeEventListener("online", on); window.removeEventListener("offline", off); };
  }, []);
  return online;
}
function useQueueCount() {
  const [count, setCount] = useState(getQueue().length);
  useEffect(() => {
    const upd = () => setCount(getQueue().length);
    window.addEventListener("mosa-queue-changed", upd);
    const t = setInterval(upd, 3000);
    return () => { window.removeEventListener("mosa-queue-changed", upd); clearInterval(t); };
  }, []);
  return count;
}
function useAlertasNoLeidas(clienteId, mecanicoId) {
  const [count, setCount] = useState(0);
  const queuePending = useQueueCount();
  useEffect(() => {
    if (!clienteId || !mecanicoId) return;
    let cancel = false;
    const cargar = () => db.fetchAlertas(clienteId, mecanicoId).then(as => { if (!cancel) setCount(as.filter(a => !a.leida_mecanico).length); }).catch(() => {});
    cargar();
    window.addEventListener("mosa-alertas-changed", cargar);
    const t = setInterval(cargar, 15000);
    return () => { cancel = true; window.removeEventListener("mosa-alertas-changed", cargar); clearInterval(t); };
  }, [clienteId, mecanicoId, queuePending]);
  return count;
}

function Login({ onLogin }) {
  const [usuario, setUsuario] = useState("");
  const [password, setPassword] = useState("");
  const [showPw, setShowPw] = useState(false);
  const [error, setError] = useState("");
  const [loading, setLoading] = useState(false);

  async function submit(e) {
    e.preventDefault();
    if (!usuario || !password) { setError("Completa usuario y contraseña"); return; }
    setLoading(true); setError("");
    try {
      const hash = await sha256Hex(password);
      const user = await db.login(usuario.trim(), hash);
      if (!user) { setError("Usuario o contraseña incorrectos"); setLoading(false); return; }
      onLogin(user);
    } catch (err) {
      setError("No se pudo conectar. Intenta de nuevo.");
      setLoading(false);
    }
  }

  return (
    <div className="min-h-screen flex flex-col px-6 pt-16 safe-top">
      <div className="w-14 h-14 rounded-2xl bg-ink flex items-center justify-center mb-6">
        <Icon.gauge width="28" height="28" className="text-white" />
      </div>
      <h1 className="text-[34px] font-extrabold tracking-tight leading-none">MOSA TIRES</h1>
      <p className="text-[15px] font-medium text-sub mt-2 mb-10">Gestión de neumáticos de flota</p>

      <form onSubmit={submit} className="space-y-4">
        <Field label="Usuario">
          <TextInput placeholder="Ingresa tu usuario" value={usuario} onChange={e => setUsuario(e.target.value)} autoCapitalize="none" />
        </Field>
        <Field label="Contraseña">
          <div className="relative">
            <TextInput type={showPw ? "text" : "password"} placeholder="Ingresa tu contraseña" value={password} onChange={e => setPassword(e.target.value)} />
            <button type="button" onClick={() => setShowPw(v => !v)} className="absolute right-4 top-1/2 -translate-y-1/2 text-muted">
              <Icon.eye width="20" height="20" />
            </button>
          </div>
        </Field>
        {error && <div className="text-[13px] font-semibold text-[#B91C1C] bg-[#FEE2E2] rounded-xl px-3 py-2">{error}</div>}
        <Button type="submit" className="w-full mt-2" disabled={loading}>
          {loading ? <span className="spinner" /> : "Iniciar sesión"}
        </Button>
      </form>

      <div className="flex-1" />
      <p className="text-[12px] text-[#B0B3B8] text-center pb-8">MOSA TIRES v1.0 · Soporte técnico</p>
    </div>
  );
}

      <Card className="mb-4">
        <div className="flex items-center gap-3">
          <div className="w-12 h-12 rounded-2xl bg-[#F3F4F6] flex items-center justify-center"><Icon.truck width="24" height="24" /></div>
          <div>
            <p className="font-extrabold text-[16px]">{cliente ? cliente.nombre : "Cargando..."}</p>
            <p className="text-[12.5px] text-muted">Empresa asignada</p>
          </div>
        </div>
      </Card>
      <div className="flex-1" />
      <Button className="w-full mb-8" disabled={!cliente} onClick={confirmar}>Confirmar empresa</Button>
    </div>
  );
}

===================================================================== */
const DIRECCIONAL_FIELDS = [
  { key: "nuevos", label: "Nuevos" }, { key: "transito", label: "Tránsito" },
  { key: "reparar", label: "Por reparar" }, { key: "recauchados", label: "Recauchados" }
];
const TRACCIONAL_FIELDS = [
  { key: "tra_nuevos", label: "Nuevos" }, { key: "tra_transito", label: "Tránsito" },
  { key: "tra_reparar", label: "Por reparar" }, { key: "tra_recauchados", label: "Recauchados" }
];
const LIBRE_FIELDS = [
  { key: "libre_nuevos", label: "Nuevos" }, { key: "libre_transito", label: "Tránsito" },
  { key: "libre_reparar", label: "Por reparar" }, { key: "libre_recauchados", label: "Recauchados" }
];
const PATIO_FIELDS = [
  { key: "llantas_am_aluminio", label: "Americana aluminio" }, { key: "llantas_am_fierro", label: "Americana fierro" },
  { key: "llantas_eu_aluminio", label: "Europea aluminio" }, { key: "llantas_eu_fierro", label: "Europea fierro" }
];
const ALL_STOCK_FIELDS = [...DIRECCIONAL_FIELDS, ...TRACCIONAL_FIELDS, ...LIBRE_FIELDS, ...PATIO_FIELDS];

function Stepper({ value, onChange }) {
  const [editing, setEditing] = useState(false);
  const [tmp, setTmp] = useState(String(value));
  if (editing) {
    return (
      <input autoFocus inputMode="numeric" pattern="[0-9]*" value={tmp}
        onChange={e => setTmp(e.target.value.replace(/[^0-9]/g, ""))}
        onBlur={() => { setEditing(false); onChange(Math.max(0, parseInt(tmp || "0", 10))); }}
        onKeyDown={e => { if (e.key === "Enter") e.target.blur(); }}
        className="w-14 h-9 text-center rounded-lg border border-bdstrong font-bold" />
    );
  }
  return (
    <div className="flex items-center gap-2">
      <button type="button" disabled={value === 0} onClick={() => onChange(Math.max(0, value - 1))} className="w-9 h-9 rounded-lg bg-[#F3F4F6] font-bold text-lg disabled:opacity-40">−</button>
      <button type="button" onClick={() => { setTmp(String(value)); setEditing(true); }} className="w-10 text-center font-bold">{value}</button>
      <button type="button" onClick={() => onChange(value + 1)} className="w-9 h-9 rounded-lg bg-[#F3F4F6] font-bold text-lg">+</button>
    </div>
  );
}

async function compararInventarioNeumaticos(clienteId, checkTotales) {
  const { data: neus } = await supabase.from("neumaticos").select("bodega").eq("cliente_id", clienteId).eq("activo", true);
  const sistema = { nuevo: 0, transito: 0, recauchado: 0 };
  (neus || []).forEach(n => { if (sistema[n.bodega] !== undefined) sistema[n.bodega]++; });
  const labels = { nuevo: "Neumáticos nuevos", transito: "Neumáticos en tránsito", recauchado: "Neumáticos recauchados" };
  const diffs = [];
  for (const bucket of ["nuevo", "transito", "recauchado"]) {
    if (checkTotales[bucket] !== sistema[bucket]) diffs.push({ bucket, label: labels[bucket], sistema: sistema[bucket], fisico: checkTotales[bucket] });
  }
  return diffs;
}
async function registrarDiscrepancias(clienteId, mecanicoId, fecha, diffs) {
  const rows = diffs.map(d => ({
    id: uuid(), origen: "check_diario", tipo_item: "neumatico", item_detalle: d.label,
    valor_sistema: d.sistema, valor_fisico: d.fisico, diferencia: d.fisico - d.sistema,
    cliente_id: clienteId, mecanico_id: mecanicoId, fecha
  }));
  if (rows.length) await supabase.from("discrepancias_inventario").insert(rows);
  await supabase.from("alertas").insert({
    id: uuid(), cliente_id: clienteId, equipo_id: null, mecanico_id: mecanicoId,
    tipo: "discrepancia_inventario", severidad: "rojo", titulo: "Discrepancia en el check diario",
    descripcion: diffs.map(d => `${d.label}: sistema ${d.sistema} · contado ${d.fisico}`).join(" · "),
    leida_mecanico: true, leida_admin: false, leida_superadmin: false
  });
  return rows.map(r => r.id);
}
async function guardarObservacionDiscrepancia(ids, texto) {
  if (!ids.length || !texto.trim()) return;
  await supabase.from("discrepancias_inventario").update({ observacion_mecanico: texto.trim() }).in("id", ids);
}
async function marcarInicioJornada(clienteId, mecanicoId, fecha, horaInicio) {
  const { data: existente } = await supabase.from("cierre_dia").select("id").eq("mecanico_id", mecanicoId).eq("fecha", fecha).maybeSingle();
  if (existente) {
    await supabase.from("cierre_dia").update({ hora_inicio: horaInicio }).eq("id", existente.id);
  } else {
    await supabase.from("cierre_dia").insert({
      id: uuid(), cliente_id: clienteId, mecanico_id: mecanicoId, fecha, hora_inicio: horaInicio,
      auditorias_realizadas: 0, cambios_realizados: 0, regulaciones_psi: 0, retorqueos: 0, rotaciones: 0, reparaciones: 0, cerrado: false
    });
  }
}

function CheckDiario({ user, clienteId, onDone }) {
  const [stock, setStock] = useState(() => Object.fromEntries(ALL_STOCK_FIELDS.map(f => [f.key, { value: 0, touched: false }])));
  const [tools, setTools] = useState(() => Object.fromEntries(TOOLS_CHECKLIST.map(t => [t, { checked: false, cantidad: 0 }])));
  const [saving, setSaving] = useState(false);
  const [discrepancias, setDiscrepancias] = useState(null); // null = no evaluado, [] = sin diferencias, [...] = con diferencias
  const [observacion, setObservacion] = useState("");
  const [pushToast, toastNode] = useToasts();

  const toolsFilled = TOOLS_CHECKLIST.filter(t => tools[t].checked).length;
  const stockFilled = ALL_STOCK_FIELDS.filter(f => stock[f.key].touched).length;
  const totalItems = TOOLS_CHECKLIST.length + ALL_STOCK_FIELDS.length;
  const progress = Math.round(((toolsFilled + stockFilled) / totalItems) * 100);
  const complete = toolsFilled === TOOLS_CHECKLIST.length && stockFilled === ALL_STOCK_FIELDS.length;

  function setStockVal(key, v) { setStock(s => ({ ...s, [key]: { value: v, touched: true } })); }
  function setToolQty(t, v) { setTools(s => ({ ...s, [t]: { checked: true, cantidad: v } })); }
  function toggleTool(t) { setTools(s => ({ ...s, [t]: { ...s[t], checked: !s[t].checked } })); }

  function renderSeccion(titulo, fields) {
    return (
      <>
        <p className="font-bold text-[15px] mb-2">{titulo}</p>
        <Card className="mb-4 space-y-3">
          {fields.map(f => (
            <div key={f.key} className="flex items-center justify-between">
              <span className={cx("text-[14px] font-semibold", stock[f.key].touched ? "text-[#1F2937]" : "text-[#92400E]")}>{f.label}</span>
              <Stepper value={stock[f.key].value} onChange={v => setStockVal(f.key, v)} />
            </div>
          ))}
        </Card>
      </>
    );
  }

  async function continuar() {
    setSaving(true);
    const id = uuid();
    const horaInicio = nowHM();
    const totales = {
      nuevo: stock.nuevos.value + stock.tra_nuevos.value + stock.libre_nuevos.value,
      transito: stock.transito.value + stock.tra_transito.value + stock.libre_transito.value,
      recauchado: stock.recauchados.value + stock.tra_recauchados.value + stock.libre_recauchados.value
    };
    const data = {
      id, cliente_id: clienteId, empresa_id: clienteId, bultero_id: user.id, fecha: todayISO(), hora_inicio: horaInicio,
      numero_hoja: uuid().slice(0, 8), completado: true,
      nuevos: stock.nuevos.value, transito: stock.transito.value, reparar: stock.reparar.value, recauchados: stock.recauchados.value,
      tra_nuevos: stock.tra_nuevos.value, tra_transito: stock.tra_transito.value, tra_reparar: stock.tra_reparar.value, tra_recauchados: stock.tra_recauchados.value,
      llantas_am_aluminio: stock.llantas_am_aluminio.value, llantas_am_fierro: stock.llantas_am_fierro.value,
      llantas_eu_aluminio: stock.llantas_eu_aluminio.value, llantas_eu_fierro: stock.llantas_eu_fierro.value,
      neu_dir_nuevo: stock.nuevos.value, neu_dir_transito: stock.transito.value, neu_dir_reparar: stock.reparar.value, neu_dir_recauchado: stock.recauchados.value,
      neu_trac_nuevo: stock.tra_nuevos.value, neu_trac_transito: stock.tra_transito.value, neu_trac_reparar: stock.tra_reparar.value, neu_trac_recauchado: stock.tra_recauchados.value,
      neu_libre_nuevo: stock.libre_nuevos.value, neu_libre_transito: stock.libre_transito.value, neu_libre_reparar: stock.libre_reparar.value, neu_libre_recauchado: stock.libre_recauchados.value,
      checklist: TOOLS_CHECKLIST.map(t => ({ herramienta: t, cantidad: tools[t].cantidad }))
    };
    pushQueue({ id: uuid(), tipo: "novedad", clienteId, ts: Date.now(), data });
    syncQueue();
    setTurno({ clienteId, fecha: todayISO(), checkDone: true });
    localStorage.setItem("check_completado_hoy", "true");

    try {
      await marcarInicioJornada(clienteId, user.id, todayISO(), horaInicio);
      const diffs = await compararInventarioNeumaticos(clienteId, totales);
      if (diffs.length) {
        const ids = await registrarDiscrepancias(clienteId, user.id, todayISO(), diffs);
        setDiscrepancias({ diffs, ids });
        setSaving(false);
        return;
      }
    } catch (e) { console.error("No se pudo comparar el inventario", e); }

    pushToast("✓ Check diario completado");
    setSaving(false);
    setTimeout(onDone, 700);
  }

  if (discrepancias) {
    return (
      <div className="min-h-screen flex flex-col px-6 pt-16 safe-top">
        {toastNode}
        <div className="w-14 h-14 rounded-2xl bg-[#FEE2E2] flex items-center justify-center mb-5 text-2xl">⚠</div>
        <h1 className="text-[22px] font-extrabold leading-tight mb-2">Tu conteo difiere del inventario registrado</h1>
        <p className="text-[13.5px] text-sub mb-5">Podés seguir trabajando igual. Se le enviará una alerta a tu supervisor.</p>
        <div className="space-y-2 mb-5">
          {discrepancias.diffs.map(d => (
            <div key={d.bucket} className="bg-[#FEF3C7] rounded-2xl px-4 py-3">
              <p className="font-bold text-[14px] text-[#92400E]">{d.label}</p>
              <p className="text-[12.5px] text-[#92400E]">Sistema: {d.sistema} · Contado: {d.fisico}</p>
            </div>
          ))}
        </div>
        <Field label="Observación (opcional)">
          <TextArea placeholder="Contanos si sabés por qué difiere..." value={observacion} onChange={e => setObservacion(e.target.value)} />
        </Field>
        <div className="flex-1" />
        <Button className="w-full mt-5 mb-8" onClick={() => { guardarObservacionDiscrepancia(discrepancias.ids, observacion).catch(() => {}); onDone(); }}>Entendido, continuar</Button>
      </div>
    );
  }

  return (
    <div className="min-h-screen pb-28 px-5 safe-top">
      {toastNode}
      <div className="sticky top-0 z-30 bg-white px-5 pt-14 pb-3">
        <p className="text-[14px] text-muted mb-1">{formatDateLong()}</p>
        <h1 className="text-[30px] font-extrabold leading-none">Hola, {user.nombre}</h1>
        <p className="text-[14px] text-sub mt-2 mb-4">Para iniciar tenés que completar el check del día</p>
        <div className="bg-[#F9FAFB] rounded-[20px] p-5">
          <div className="flex items-center justify-between mb-2">
            <span className="font-bold text-[16px]">Progreso del check</span>
            <span className="text-[13px] font-bold">{toolsFilled + stockFilled}/{totalItems}</span>
          </div>
          <div className="h-2 rounded-full bg-[#E5E7EB] overflow-hidden">
            <div className="h-full bg-ink transition-all" style={{ width: progress + "%" }} />
          </div>
        </div>
      </div>

      <div className="px-0 pt-4">
        <p className="font-extrabold text-[17px] mb-3">Conteo de neumáticos</p>
        {renderSeccion("Direccionales", DIRECCIONAL_FIELDS)}
        {renderSeccion("Traccionales", TRACCIONAL_FIELDS)}
        {renderSeccion("Ejes libres", LIBRE_FIELDS)}
        {renderSeccion("Llantas en patio", PATIO_FIELDS)}

        <p className="font-bold text-[15px] mb-2">Checklist de herramientas</p>
        <p className="text-[12.5px] text-muted mb-3">Marcá el check para confirmar que revisaste la herramienta, aunque tengas 0.</p>
        <div className="space-y-2 mb-6">
          {TOOLS_CHECKLIST.map(t => (
            <div key={t} className={cx("bg-white rounded-2xl border shadow-card px-4 py-3 flex items-center gap-3", tools[t].checked ? "border-bd" : "border-[#F59E0B]")}>
              <button type="button" onClick={() => toggleTool(t)} className={cx("w-7 h-7 rounded-lg flex items-center justify-center shrink-0 border", tools[t].checked ? "bg-ink border-ink" : "bg-white border-[#D1D5DB]")}>
                {tools[t].checked && <Icon.check width="15" height="15" className="text-white" />}
              </button>
              <span className="text-[14px] font-semibold text-[#1F2937] flex-1">{t}</span>
              <Stepper value={tools[t].cantidad} onChange={v => setToolQty(t, v)} />
            </div>
          ))}
        </div>
      </div>

      <div className="fixed bottom-0 left-0 right-0 bg-white border-t border-bd p-4 safe-bottom">
        <Button className="w-full" disabled={!complete || saving} onClick={continuar}>
          {saving ? <span className="spinner" /> : "Confirmar check diario"}
        </Button>
        {!complete && <p className="text-center text-[12px] text-muted mt-2">Completá el conteo de neumáticos y confirmá las {TOOLS_CHECKLIST.length} herramientas</p>}
      </div>
    </div>
  );
}

   PANTALLA 3 - SELECCION DE EQUIPO
===================================================================== */
function statusColor(s) { return s === "alerta" ? "red" : s === "atencion" ? "amber" : "green"; }
function statusLabel(s) { return s === "alerta" ? "Con alertas" : s === "atencion" ? "Atención" : "Al día"; }

function SeleccionEquipo({ clienteId, onPick }) {
  const [equipos, setEquipos] = useState(() => getCache(LS.equipos(clienteId), []));
  const [alertasByEquipo, setAlertasByEquipo] = useState({});
  const [auditadosHoy, setAuditadosHoy] = useState({});
  const [filter, setFilter] = useState("todos");
  const [search, setSearch] = useState("");
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    let cancel = false;
    (async () => {
      try {
        const eqs = await db.fetchEquipos(clienteId);
        if (cancel) return;
        setEquipos(eqs);
        const alertas = await db.fetchAlertas(clienteId);
        const map = {};
        alertas.filter(a => !a.leida_mecanico && a.equipo_id).forEach(a => { map[a.equipo_id] = map[a.equipo_id] === "alerta" ? "alerta" : (a.severidad === "rojo" ? "alerta" : "atencion"); });
        setAlertasByEquipo(map);
        const hoy = await db.fetchAuditoriasHoy(clienteId);
        const hm = {}; hoy.forEach(h => hm[h.equipo_id] = true);
        setAuditadosHoy(hm);
      } catch (e) { console.error(e); } finally { if (!cancel) setLoading(false); }
    })();
    return () => { cancel = true; };
  }, [clienteId]);

  const filtered = equipos.filter(eq => {
    if (filter === "alertas" && !alertasByEquipo[eq.id_equipo]) return false;
    if (filter === "hoy" && !auditadosHoy[eq.id_equipo]) return false;
    if (search) {
      const s = search.toLowerCase();
      if (!(eq.patente || "").toLowerCase().includes(s) && !(eq.numero_interno || "").toLowerCase().includes(s)) return false;
    }
    return true;
  });

  return (
    <div className="min-h-screen pb-24 px-5 pt-14 safe-top">
      <div className="flex items-center justify-between mb-4">
        <h1 className="text-[30px] font-extrabold">Equipos</h1>
        <div className="w-10 h-10 rounded-full bg-[#F3F4F6] flex items-center justify-center"><Icon.search width="18" height="18" /></div>
      </div>
      <TextInput placeholder="Buscar por patente o número interno" value={search} onChange={e => setSearch(e.target.value)} className="mb-4" />
      <div className="flex gap-2 mb-5 overflow-x-auto">
        {[["todos", "Todos"], ["alertas", "Con alertas"], ["hoy", "Auditados hoy"]].map(([k, l]) => (
          <button key={k} onClick={() => setFilter(k)} className={cx("px-4 py-2 rounded-full text-[13px] font-bold whitespace-nowrap", filter === k ? "bg-ink text-white" : "bg-[#F3F4F6] text-[#374151]")}>{l}</button>
        ))}
      </div>
      {loading && <div className="flex justify-center py-10"><span className="spinner" /></div>}
      <div className="space-y-3">
        {filtered.map(eq => {
          const st = alertasByEquipo[eq.id_equipo] || "ok";
          return (
            <button key={eq.id_equipo} onClick={() => onPick(eq)} className="w-full text-left bg-white rounded-[20px] border border-bd shadow-card p-4 flex items-center gap-3">
              <div className="w-[52px] h-[52px] rounded-2xl bg-[#F3F4F6] flex items-center justify-center shrink-0"><Icon.truck width="26" height="26" /></div>
              <div className="flex-1 min-w-0">
                <p className="font-bold text-[15.5px] truncate">{eq.numero_interno ? `${eq.numero_interno} · ` : ""}{eq.patente}</p>
                <p className="text-[12.5px] text-muted truncate">{eq.tipo === "SEMI" ? "Semirremolque" : `Tracto ${eq.configuracion_ejes || ""}`} · {eq.modelo || ""}</p>
              </div>
              <Badge color={statusColor(st)}>{statusLabel(st)}</Badge>
            </button>
          );
        })}
        {!loading && filtered.length === 0 && <p className="text-center text-muted py-10 text-sm">No hay equipos que coincidan.</p>}
      </div>
    </div>
  );
}

function AccionEquipo({ equipo, onClose, onAuditoria, onCambio }) {
  return (
    <Modal title={`${equipo.numero_interno || ""} · ${equipo.patente}`} onClose={onClose}>
      <div className="space-y-3">
        <Button className="w-full" onClick={onAuditoria}><Icon.audit width="20" height="20" /> Auditoría</Button>
        <Button variant="subtle" className="w-full" onClick={onCambio}><Icon.swap width="20" height="20" /> Hoja de cambio</Button>
      </div>
    </Modal>
  );
}

   MAPA DE NEUMATICOS (compartido entre Auditoria / Instructivo / Cambio)
===================================================================== */
function TireCircle({ pos, filled, status, mm, psi, fuego, selected, onTap, dragHandlers }) {
  const styles = {
    empty: "border-2 border-dashed border-[#D1D5DB] bg-[#F9FAFB] text-muted",
    ok: "border-2 border-[#D1D5DB] bg-white text-ink",
    atencion: "border-2 border-[#F59E0B] bg-[#FEF3C7] text-[#92400E]",
    alerta: "border-2 border-[#EF4444] bg-[#FEE2E2] text-[#B91C1C]"
  };
  const key = !filled ? "empty" : (status || "ok");
  return (
    <button type="button" data-pos={pos} onClick={onTap} {...dragHandlers}
      style={dragHandlers ? { touchAction: "none" } : undefined}
      className={cx("w-[54px] h-[54px] rounded-full flex flex-col items-center justify-center shrink-0 shadow-sm transition",
        styles[key], selected && "ring-2 ring-ink anim-blink")}>
      <span className="text-[9.5px] font-bold opacity-70 leading-none">P{pos}</span>
      {filled ? (
        <>
          <span className="text-[13px] font-extrabold leading-none mt-0.5">{mm != null ? mm : "—"}</span>
          <span className="text-[8.5px] font-semibold opacity-70 leading-none">{psi ? psi + "psi" : ""}</span>
        </>
      ) : <span className="text-[11px] font-bold text-[#D1D5DB] mt-0.5">— —</span>}
    </button>
  );
}

function AxleMap({ cfg, posData, selectedPos, onTap, getDragHandlers }) {
  return (
    <div className="space-y-6">
      {cfg.rows.map(row => (
        <div key={row.label} className={cx("relative", row.type === "auxilio" && "mt-4 pt-4 border-t border-dashed border-bdstrong")}>
          <div className="flex items-center gap-3">
            <span className="text-[12px] font-bold text-muted w-6 shrink-0">{row.label}</span>
            <div className="flex-1 relative flex items-center justify-around">
              <div className="absolute left-0 right-0 h-[1.5px] bg-[#E5E7EB]" />
              {row.positions.map(p => {
                const d = posData[p] || {};
                return (
                  <div key={p} className="relative z-10">
                    <TireCircle pos={p} filled={!!d.numero_fuego} status={d.status} mm={d.minMM} psi={d.psi} fuego={d.numero_fuego}
                      selected={selectedPos === p} onTap={() => onTap(p)}
                      dragHandlers={getDragHandlers ? getDragHandlers(p) : undefined} />
                  </div>
                );
              })}
            </div>
          </div>
        </div>
      ))}
    </div>
  );
}

function GhostTire({ x, y }) {
  return (
    <div className="fixed z-[90] pointer-events-none rounded-full w-[54px] h-[54px] -translate-x-1/2 -translate-y-1/2 shadow-lg flex items-center justify-center"
      style={{ left: x, top: y, background: "#111", border: "3px solid #333" }}>
      <div className="w-7 h-7 rounded-full border-2 border-[#666]" />
    </div>
  );
}

===================================================================== */
function KmModal({ kmActual, km, setKm, onContinue }) {
  const kmNum = parseInt(km, 10);
  const invalid = km !== "" && !isNaN(kmNum) && kmActual && kmNum < kmActual;

/* =====================================================================
   GENERADOR DE RECOMENDACIONES (receta)
===================================================================== */
function generarRecomendaciones(posData, axleCfg, equipoTipo, cfg) {
  const recs = [];
  const posicionesAlerta = [];
  Object.values(posData).forEach(d => {
    if (d.status === "alerta" || d.status === "atencion") posicionesAlerta.push({ posicion: d.posicion, status: d.status, motivos: d.motivos });
  });

  const conPsiFuera = Object.values(posData).filter(d => (d.motivos || []).some(m => m.startsWith("psi"))).sort((a, b) => a.posicion - b.posicion);
  conPsiFuera.forEach(d => recs.push({ id: "psi_" + d.posicion, key: "rec_calibrar_psi", texto: `Calibrar presión de aire en P${d.posicion} (actual ${d.psi} psi)` }));

  const criticos = Object.values(posData).filter(d => d.status === "alerta" && (d.motivos || []).some(m => m.startsWith("mm"))).sort((a, b) => a.posicion - b.posicion);
  criticos.forEach(d => recs.push({ id: "cambiar_" + d.posicion, key: "rec_cambiar_neumaticos", texto: `Cambiar neumático en P${d.posicion} (${d.minMM} mm)` }));

  axleCfg.groups.forEach((grupo, i) => {
    const mms = grupo.map(p => posData[p] && posData[p].minMM).filter(v => v != null);
    if (mms.length < 2) return;
    const max = Math.max(...mms), min = Math.min(...mms);
    if (max > 0 && ((max - min) / max) * 100 >= cfg.mm_rotacion_pct) {
      const row = axleCfg.rows[i];
      const label = row ? row.label : `Eje ${i + 1}`;
      if (row && row.type === "D") recs.push({ id: "rot_" + i, key: "rec_rotar_delanteros", texto: `Rotar neumáticos delanteros (desgaste desparejo, eje ${label})` });
      else recs.push({ id: "rot_" + i, key: equipoTipo === "SEMI" ? `rec_rotar_semi_e${i + 1}` : "rec_rotar_traccionales", texto: `Rotar neumáticos del eje ${label} (desgaste desparejo)` });
    }
  });

  if (!recs.length) recs.push({ id: "ok", key: null, texto: "Todo en orden, sin tareas pendientes" });
  return { recs, posicionesAlerta };
}

function Instructivo({ equipo, axleCfg, posData, recsInfo, checklist, setChecklist, discrepancias, onContinuar, onCerrar }) {
  const [nuevaTarea, setNuevaTarea] = useState("");
  const sistemaTotal = checklist.filter(c => !c.extra).length;
  const cumplidas = checklist.filter(c => !c.extra && c.done).length;
  const extra = checklist.filter(c => c.extra).length;
  const pct = sistemaTotal ? Math.round((cumplidas / sistemaTotal) * 100) : 100;

  function toggle(id) { setChecklist(cs => cs.map(c => c.id === id ? { ...c, done: !c.done } : c)); }
  function agregar() {
    if (!nuevaTarea.trim()) return;
    setChecklist(cs => [...cs, { id: uuid(), texto: nuevaTarea.trim(), done: false, extra: true }]);
    setNuevaTarea("");
  }

          ))}
        </div>
      </Card>

      <div className="flex items-center justify-between mb-2">
        <p className="font-bold text-[15px]">Recomendaciones</p>
        <span className="text-[12.5px] font-bold text-muted">{pct}% cumplido</span>
      </div>
      <div className="space-y-2 mb-3">
        {checklist.map(c => (
          <button key={c.id} onClick={() => toggle(c.id)} className="w-full text-left bg-white rounded-2xl border border-bd shadow-card px-4 py-3 flex items-center gap-3">
            <span className={cx("w-6 h-6 rounded-lg flex items-center justify-center shrink-0", c.done ? "bg-ink" : "bg-white border border-[#D1D5DB]")}>
              {c.done && <Icon.check width="14" height="14" className="text-white" />}
            </span>
            <span className={cx("text-[14px] font-semibold flex-1", c.done && "strike")}>{c.texto}</span>
            {c.extra && <Icon.pencil width="15" height="15" className="text-muted shrink-0" />}
          </button>
        ))}
      </div>
      <div className="flex gap-2 mb-6">
        <TextInput placeholder="Agregar tarea personalizada" value={nuevaTarea} onChange={e => setNuevaTarea(e.target.value)} onKeyDown={e => { if (e.key === "Enter") agregar(); }} />
        <Button variant="subtle" onClick={agregar}>+ Agregar</Button>
      </div>

      <p className="text-[12.5px] text-muted mb-6">Recomendadas: {sistemaTotal} · Cumplidas: {cumplidas} · Extra agregadas: {extra}</p>

      {discrepancias && discrepancias.length > 0 && (
        <div className="bg-[#FEE2E2] rounded-2xl p-4 mb-6">
          <p className="font-extrabold text-[15px] text-[#B91C1C] mb-3">⚠ Neumáticos que no coinciden</p>
          <div className="space-y-2">
            {discrepancias.map((d, i) => (
              <div key={i} className="bg-white rounded-xl px-3 py-2 border border-[#FCA5A5]">
                <p className="text-[13px] font-semibold text-[#7F1D1D]">
                  Posición {d.posicion}: {CAMPO_LABELS[d.campo] || d.campo} registrado {d.valor_sistema == null ? "sin registro" : d.valor_sistema}, mecánico encontró {d.valor_mecanico}
                </p>

            ))}
          </div>
          <p className="text-[12px] text-[#92400E] mt-3 font-semibold">Pendiente de aprobación por administrador</p>
        </div>
      )}

      <div className="space-y-3">
        <Button className="w-full" onClick={() => onContinuar({ pct, cumplidas, sistemaTotal, extra })}>Continuar a hoja de cambio</Button>
        <Button variant="ghost" className="w-full" onClick={() => onCerrar({ pct, cumplidas, sistemaTotal, extra })}>Cerrar sin cambios</Button>
      </div>
    </div>
  );

   vacía monta (o abre el buscador si es tránsito); soltar un neumático

async function fetchNeumaticosBodega(clienteId, bodega) {
  const { data, error } = await supabase.from("neumaticos").select("*").eq("cliente_id", clienteId).eq("bodega", bodega).eq("activo", true).limit(200);
  if (error) throw error;
  return data || [];
}

async function subirFotoCheckpoint(clienteId, pos, file) {
  const path = `${clienteId}/${Date.now()}_p${pos}_${file.name}`;
  const { error } = await supabase.storage.from("checkpoints").upload(path, file, { upsert: true });
  if (error) throw error;
  const { data } = supabase.storage.from("checkpoints").getPublicUrl(path);
  return data.publicUrl;
}

  function registrarIntervencion(tipo, pos, extra) {

  function ejecutarSalida(pos, motivo) {

    setPosData(s => { const n = { ...s }; delete n[pos]; return n; });
    pushToast("✓ Baja registrada");
    setBajaSel(null); setInfoPos(null);
  }

  function montarNeumatico(pos, data, tipo) {
    setPosData(s => ({ ...s, [pos]: { ...data, posicion: pos, status: "ok", minMM: data.mm ? parseFloat(data.mm) : null } }));
    entra.current.push({ numero_fuego: data.numero_fuego, posicion: pos, milimetros: data.mm ? parseFloat(data.mm) : null, psi: data.psi ? parseInt(data.psi, 10) : null, estado: tipo });

    pushToast("✓ Montaje registrado");
    setMontaje(null);
  }

  function confirmarRotacion(origen, destino) {
    const grupo = axleCfg.groups.find(g => g.includes(origen));
    if (!grupo || !grupo.includes(destino)) {
      if (navigator.vibrate) navigator.vibrate(150);
      pushToast("✕ Movimiento no permitido entre esos ejes");
      return;
    }
    const destFuego = posData[destino] ? posData[destino].numero_fuego : null;
    setConfirmDlg({
      title: "Confirmar rotación",
      desc: destFuego ? `¿Intercambiar el neumático de P${origen} con el de P${destino}?` : `¿Mover el neumático de P${origen} a la posición P${destino}?`,
      onConfirm: () => {
        const a = posData[origen], b = posData[destino];
        // Registrar la rotacion para persistirla (4 filas de cambio_detalle si es
        // intercambio, 2 si es mover a posicion vacia). No cambia inventario.
        rotaciones.current.push({
          origen, destino,
          a: { numero_fuego: a.numero_fuego, mm: a.minMM != null ? a.minMM : null, psi: a.psi || null },
          b: b ? { numero_fuego: b.numero_fuego, mm: b.minMM != null ? b.minMM : null, psi: b.psi || null } : null
        });
        setPosData(s => {
          const next = { ...s };
          const na = next[origen], nb = next[destino];
          if (nb) next[origen] = { ...nb, posicion: origen }; else delete next[origen];
          next[destino] = { ...na, posicion: destino };
          return next;
        });
        pushToast("✓ Rotación registrada");
        setConfirmDlg(null);
      }
    });
  }

  function resolverDrop(clientX, clientY) {
    const el = document.elementFromPoint(clientX, clientY);
    const salidaEl = el && el.closest("[data-salida]");
    if (salidaEl) return { salida: salidaEl.getAttribute("data-salida") };
    const posEl = el && el.closest("[data-pos]");
    return posEl ? { pos: parseInt(posEl.getAttribute("data-pos"), 10) } : null;
  }

  function onPointerDownTire(pos, e) {
    if (!posData[pos]) return;
    dragRef.current = { sub: "rotate", payload: pos, startX: e.clientX, startY: e.clientY, moved: false };
    try { e.currentTarget.setPointerCapture(e.pointerId); } catch (err) {}
  }
  function onPointerDownEntrada(tipo, e) {
    dragRef.current = { sub: "mount", payload: tipo, startX: e.clientX, startY: e.clientY, moved: false };
    try { e.currentTarget.setPointerCapture(e.pointerId); } catch (err) {}
  }
  function onDragMove(e) {
    const d = dragRef.current;
    if (!d) return;
    const dx = e.clientX - d.startX, dy = e.clientY - d.startY;
    if (!d.moved && Math.hypot(dx, dy) > 10) d.moved = true;
    if (d.moved) {
      e.preventDefault();
      setGhost({ x: e.clientX, y: e.clientY });
      if (e.clientY < 90) window.scrollBy(0, -14);
      else if (e.clientY > window.innerHeight - 90) window.scrollBy(0, 14);
    }
  }
  function onDragEnd(e) {
    const d = dragRef.current;
    dragRef.current = null;
    setGhost(null);
    if (!d) return;
    if (!d.moved) {
      if (d.sub === "rotate") setInfoPos(d.payload);
      else pushToast("Arrastrá este botón hasta una posición vacía del mapa");
      return;
    }
    const dest = resolverDrop(e.clientX, e.clientY);
    if (d.sub === "mount") {
      if (dest && dest.pos != null && !posData[dest.pos]) setMontaje({ tipo: d.payload, pos: dest.pos });
      else pushToast("Soltá sobre una posición vacía del mapa");
    } else if (d.sub === "rotate") {
      if (!dest) return;
      if (dest.salida) { ejecutarSalida(d.payload, dest.salida); return; }
      if (dest.pos == null || dest.pos === d.payload) return;
      confirmarRotacion(d.payload, dest.pos);
    }
  }

  function agregarTarea() {
    if (!nuevaTarea.trim()) return;
    setChecklist(cs => [...cs, { id: uuid(), texto: nuevaTarea.trim(), done: false, extra: true }]);
    setNuevaTarea("");
  }

  async function finalizar() {
    setSaving(true);
    const numero_cambio = await siguienteNumeroCambio(clienteId, cfg).catch(() => String(Date.now()).slice(-6));
    const sistemaTotal = checklist.filter(c => !c.extra).length;
    const cumplidas = checklist.filter(c => !c.extra && c.done).length;
    const pendientesTareas = sistemaTotal - cumplidas;
    // Cierre del instructivo: parcial si quedan tareas, completado si no. Sin alerta.
    const recetaUpdate = recetaId.current ? {
      id: recetaId.current, estado: pendientesTareas > 0 ? "parcial" : "completado",
      tareas_cumplidas: cumplidas, tareas_pendientes: pendientesTareas
    } : null;
    const cab = {
      id_cambio: uuid(), equipo_id: equipo.id_equipo, bultero_id: user.id, cliente_id: clienteId,
      fecha: todayISO(), kilometraje: parseInt(km, 10) || equipo.kilometros,
      hora_ingreso: new Date(startedAt.current).toTimeString().slice(0, 8), hora_salida: nowHM(),
      psi_regulados: intervenciones.current.some(i => i.tipo === "regulacion_psi"),
      ruedas_torqueadas: intervenciones.current.filter(i => i.tipo === "retorqueo" || i.tipo === "checkpoint").length,
      observaciones: `Instructivo seguido: ${sistemaTotal ? Math.round((cumplidas / sistemaTotal) * 100) : 100}%`,
      numero_cambio,
      sale: sale.current, entra: entra.current, rotaciones: rotaciones.current, intervenciones: intervenciones.current,
      recetaUpdate
    };
    pushQueue({ id: uuid(), tipo: "cambio", clienteId, ts: Date.now(), data: cab });
    syncQueue();
    setSaving(false);
    onFinish();
  }

  // Instructivo pendiente: elegir usar el existente (carga el checklist) o abrir limpia.
  if (pendienteDlg) {
    return (
      <InstructivoPendienteModal pendiente={pendienteDlg}
        onUsar={async () => {
          const pa = pendienteDlg.posiciones_alerta || {};
          const recs = Array.isArray(pa.recomendaciones) ? pa.recomendaciones : [];
          const extras = Array.isArray(pa.tareas_extra) ? pa.tareas_extra : (Array.isArray(pendienteDlg.tareas_extra) ? pendienteDlg.tareas_extra : []);
          const cl = [
            ...recs.map(r => ({ id: r.id || uuid(), texto: r.texto, done: !!r.done, extra: false })),
            ...extras.map(t => ({ id: uuid(), texto: t.texto, done: !!t.done, extra: true }))
          ];
          setChecklist(cl);
          recetaId.current = pendienteDlg.id;
          try { await supabase.from("auditorias_receta").update({ estado: "en_proceso" }).eq("id", pendienteDlg.id); } catch (e) { console.error(e); }
          setPendienteDlg(null);
        }}
        onLimpia={async () => {
          try { await supabase.from("auditorias_receta").update({ estado: "sin_cambio" }).eq("id", pendienteDlg.id); } catch (e) { console.error(e); }
          recetaId.current = null;
          setPendienteDlg(null);
        }} />
    );
  }

  if (!kmSet) {
    return <KmModal kmActual={equipo.kilometros} km={km} setKm={setKm} onContinue={async () => {
      // Entrada directa (sin venir de auditoria): persistir los km en el equipo.
      try { await supabase.from("equipos").update({ kilometros: parseInt(km, 10) }).eq("id_equipo", equipo.id_equipo); } catch (e) { console.error(e); }
      setKmSet(true);
    }} />;
  }

  return (
    <div className="min-h-screen pb-[260px] px-5 pt-14 safe-top">
      {toastNode}
      {ghost && <GhostTire x={ghost.x} y={ghost.y} />}
      <div className="flex items-center gap-3 mb-4">
        <button onClick={onCancel} className="w-9 h-9 rounded-full bg-[#F3F4F6] flex items-center justify-center"><Icon.back width="18" height="18" /></button>
        <div>
          <h1 className="text-[20px] font-extrabold">Hoja de cambio · {equipo.patente}</h1>
          <p className="text-[12.5px] text-muted">Tocá un neumático para verlo, o arrastralo para rotarlo o sacarlo</p>
        </div>
      </div>

      <Card className="mb-4">
        <AxleMap cfg={axleCfg} posData={posData} selectedPos={null} onTap={() => {}}
          getDragHandlers={(p) => posData[p] ? { onPointerDown: (e) => onPointerDownTire(p, e), onPointerMove: onDragMove, onPointerUp: onDragEnd, onPointerCancel: onDragEnd } : undefined} />
      </Card>

      <p className="font-bold text-[15px] mb-2">Instructivo</p>
      <div className="space-y-2 mb-3">
        {checklist.map(c => (
          <button key={c.id} onClick={() => setChecklist(cs => cs.map(x => x.id === c.id ? { ...x, done: !x.done } : x))} className="w-full text-left bg-white rounded-2xl border border-bd shadow-card px-4 py-3 flex items-center gap-3">
            <span className={cx("w-6 h-6 rounded-lg flex items-center justify-center shrink-0", c.done ? "bg-ink" : "bg-white border border-[#D1D5DB]")}>
              {c.done && <Icon.check width="14" height="14" className="text-white" />}
            </span>
            <span className={cx("text-[14px] font-semibold flex-1", c.done && "strike")}>{c.texto}</span>
            {c.extra && <Icon.pencil width="15" height="15" className="text-muted shrink-0" />}
          </button>
        ))}
      </div>
      <div className="flex gap-2 mb-6">
        <TextInput placeholder="Agregar tarea personalizada" value={nuevaTarea} onChange={e => setNuevaTarea(e.target.value)} onKeyDown={e => { if (e.key === "Enter") agregarTarea(); }} />
        <Button variant="subtle" onClick={agregarTarea}>+ Agregar</Button>
      </div>

      <div className="fixed bottom-0 left-0 right-0 bg-white border-t border-bd p-4 safe-bottom space-y-3">
        <Button className="w-full" disabled={saving} onClick={finalizar}>{saving ? <span className="spinner" /> : "Finalizar hoja de cambio"}</Button>
        <div>
          <p className="text-[11.5px] font-bold text-muted tracking-wide uppercase mb-1.5">Entrada · arrastrá al mapa</p>
          <div className="grid grid-cols-3 gap-2">
            <button onPointerDown={(e) => onPointerDownEntrada("nuevo", e)} onPointerMove={onDragMove} onPointerUp={onDragEnd} onPointerCancel={onDragEnd}
              style={{ touchAction: "none" }} className="h-12 rounded-2xl text-[13.5px] font-bold bg-ink text-white">Nuevo</button>
            <button onPointerDown={(e) => onPointerDownEntrada("transito", e)} onPointerMove={onDragMove} onPointerUp={onDragEnd} onPointerCancel={onDragEnd}
              style={{ touchAction: "none" }} className="h-12 rounded-2xl text-[13.5px] font-bold bg-[#F3F4F6]">Tránsito</button>
            <button onPointerDown={(e) => onPointerDownEntrada("recauchado", e)} onPointerMove={onDragMove} onPointerUp={onDragEnd} onPointerCancel={onDragEnd}
              style={{ touchAction: "none" }} className="h-12 rounded-2xl text-[13.5px] font-bold bg-[#F3F4F6]">Recauchado</button>
          </div>
        </div>
        <div>
          <p className="text-[11.5px] font-bold text-muted tracking-wide uppercase mb-1.5">Salida · arrastrá el neumático acá</p>
          <div className="grid grid-cols-3 gap-2">
            <div data-salida="transito" className="h-12 rounded-2xl text-[13.5px] font-bold bg-[#F3F4F6] flex items-center justify-center">Tránsito</div>
            <div data-salida="reparacion" className="h-12 rounded-2xl text-[13.5px] font-bold bg-[#F3F4F6] flex items-center justify-center">Reparación</div>
            <div data-salida="baja" className="h-12 rounded-2xl text-[13.5px] font-bold bg-[#FEE2E2] text-[#B91C1C] flex items-center justify-center gap-1"><Icon.trash width="14" height="14" />Baja</div>
          </div>
        </div>
      </div>

      {infoPos != null && posData[infoPos] && (
        <TireInfoModal pos={infoPos} data={posData[infoPos]} cfg={cfg} equipo={equipo}
          onClose={() => setInfoPos(null)}
          onRegularPsi={(nuevoPsi) => {
            setConfirmDlg({
              title: "Confirmar regulación de PSI",
              desc: `Ajustar P${infoPos} (${posData[infoPos].numero_fuego}) a ${nuevoPsi} psi.`,
              onConfirm: () => {
                const ahora = new Date().toISOString();
                setPosData(s => ({ ...s, [infoPos]: { ...s[infoPos], psi: nuevoPsi } }));
                registrarIntervencion("regulacion_psi", infoPos, { psi_nuevo: parseInt(nuevoPsi, 10), timestamp_inicio: ahora, timestamp_fin: ahora });
                const ev = evaluarPosicion(axleCfg, cfg, infoPos, equipo.tipo, { ...posData[infoPos], psi: nuevoPsi });
                if (ev.status !== "ok") pushQueue({ id: uuid(), tipo: "alerta", clienteId, ts: Date.now(), data: { id: uuid(), cliente_id: clienteId, equipo_id: equipo.id_equipo, mecanico_id: user.id, tipo: parseInt(nuevoPsi, 10) < ev.psiObjetivo ? "psi_bajo" : "psi_alto", severidad: ev.status === "alerta" ? "rojo" : "amarillo", titulo: "PSI fuera de rango tras regulación", descripcion: `P${infoPos} quedó en ${nuevoPsi} psi (objetivo ${ev.psiObjetivo})`, posicion: infoPos, numero_fuego: posData[infoPos].numero_fuego, leida_mecanico: false, leida_admin: false, leida_superadmin: false } });
                pushToast("✓ Regulación guardada");
                setConfirmDlg(null); setInfoPos(null);
              }
            });
          }}
          onRetorqueo={() => {
            setConfirmDlg({
              title: "Confirmar retorqueo",
              desc: `¿Registrar retorqueo en P${infoPos} (${posData[infoPos].numero_fuego})? Se confirma que se tomó la foto de checkpoint.`,
              onConfirm: () => { registrarIntervencion("retorqueo", infoPos, {}); pushToast("✓ Retorqueo registrado"); setConfirmDlg(null); setInfoPos(null); }
            });
          }}
          onReparacion={() => {
            setConfirmDlg({
              title: "Confirmar reparación",
              desc: `¿Registrar una reparación en P${infoPos} (${posData[infoPos].numero_fuego})?`,
              onConfirm: () => { registrarIntervencion("reparacion", infoPos, {}); pushToast("✓ Reparación registrada"); setConfirmDlg(null); setInfoPos(null); }
            });
          }}
        />
      )}

      {montaje && (
        <MontajeModal tipo={montaje.tipo} pos={montaje.pos} equipo={equipo} clienteId={clienteId}
          onClose={() => setMontaje(null)}
          onConfirm={(data) => setConfirmDlg({
            title: "Confirmar montaje",
            desc: `¿Montar el neumático ${data.numero_fuego} en la posición P${montaje.pos}?`,
            onConfirm: () => { montarNeumatico(montaje.pos, data, montaje.tipo); setConfirmDlg(null); }
          })}
        />
      )}

      {bajaSel && posData[bajaSel.pos] && (
        <BajaModal pos={bajaSel.pos} fuego={posData[bajaSel.pos].numero_fuego}
          onClose={() => setBajaSel(null)}
          onConfirm={(reason) => confirmarBaja(bajaSel.pos, reason)} />
      )}

      {confirmDlg && <Confirm title={confirmDlg.title} desc={confirmDlg.desc} onConfirm={confirmDlg.onConfirm} onCancel={() => setConfirmDlg(null)} />}
    </div>
  );
}

  const [psiField, setPsiField] = useState(String(data.psi || ""));
  const [showPsi, setShowPsi] = useState(false);
  return (
    <Modal title={`Posición P${pos}`} onClose={onClose}>
      <div className="mb-4">
        <p className="text-[22px] font-extrabold leading-none">{data.numero_fuego}</p>
        <p className="text-[13px] text-muted mt-1">{data.marca || "Sin marca"} · {data.medida || "-"}</p>
        <div className="flex gap-4 mt-3">
          <div><p className="text-[11px] text-muted font-semibold">PSI actual</p><p className="font-extrabold text-[16px]">{data.psi || "-"}</p></div>
          <div><p className="text-[11px] text-muted font-semibold">MM</p><p className="font-extrabold text-[16px]">{data.minMM != null ? data.minMM : "-"}</p></div>
          <div><p className="text-[11px] text-muted font-semibold">Estado</p><Badge color={statusColor(data.status)}>{statusLabel(data.status)}</Badge></div>
        </div>
      </div>
      {showPsi ? (
        <div className="space-y-3 mb-2">
          <Field label="Nuevo valor de PSI" required><TextInput type="number" inputMode="numeric" value={psiField} onChange={e => setPsiField(e.target.value)} /></Field>
          <Button className="w-full" disabled={!psiField} onClick={() => onRegularPsi(parseInt(psiField, 10))}>Guardar regulación</Button>
        </div>
      ) : (
        <div className="grid grid-cols-1 gap-2">
          <Button variant="subtle" onClick={() => setShowPsi(true)}><Icon.gauge width="18" height="18" /> Regulación PSI</Button>
          <Button variant="subtle" onClick={onRetorqueo}><Icon.wrench width="18" height="18" /> Retorqueo</Button>
          <Button variant="subtle" onClick={onReparacion}><Icon.bandage width="18" height="18" /> Reparación</Button>
          <p className="text-[11.5px] text-muted text-center mt-2">Para rotarlo o sacarlo, cerrá esta ventana y arrastralo desde el mapa hasta otra posición o hasta Salida.</p>
        </div>
      )}
    </Modal>
  );
}

function MontajeModal({ tipo, pos, equipo, clienteId, onClose, onConfirm }) {
  const sugerido = tipo === "nuevo" ? generarFuegoLaPortada(equipo.numero_interno, pos, todayISO()) : "";
  const [fuego, setFuego] = useState(sugerido);
  const [marca, setMarca] = useState("");
  const [medida, setMedida] = useState("");
  const [psi, setPsi] = useState("");
  const [mm, setMm] = useState("");
  const [torqueado, setTorqueado] = useState(false);
  const [fotoUrl, setFotoUrl] = useState(null);
  const [fotoNombre, setFotoNombre] = useState("");
  const [subiendoFoto, setSubiendoFoto] = useState(false);
  const [fotoError, setFotoError] = useState("");
  const [search, setSearch] = useState("");
  const [buscando, setBuscando] = useState(tipo === "transito");
  const [opciones, setOpciones] = useState([]);

  useEffect(() => {
    if (tipo === "transito") fetchNeumaticosBodega(clienteId, "transito").then(setOpciones).catch(() => setOpciones([]));
  }, [tipo]);

  const filtradas = opciones.filter(o => {
    if (!search) return true;
    const s = search.toLowerCase();
    return (o.numero_fuego || "").toLowerCase().includes(s) || (o.marca || "").toLowerCase().includes(s) || (o.modelo || "").toLowerCase().includes(s);
  });

  async function onFotoChange(e) {
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    setFotoNombre(file.name); setSubiendoFoto(true); setFotoError(""); setFotoUrl(null);
    try {
      const url = await subirFotoCheckpoint(clienteId, pos, file);
      setFotoUrl(url);
    } catch (err) {
      setFotoError("No se pudo subir la foto. Verificá que exista el bucket público 'checkpoints' en Supabase Storage.");
    } finally {
      setSubiendoFoto(false);
    }
  }

  if (tipo === "transito" && buscando) {
    return (
      <Modal title="Montar desde tránsito" onClose={onClose}>
        <TextInput placeholder="Buscar por N° fuego, marca o modelo" value={search} onChange={e => setSearch(e.target.value)} className="mb-3" />
        <div className="space-y-2 max-h-72 overflow-y-auto">
          {filtradas.map(o => (
            <button key={o.id_neumatico} onClick={() => { setFuego(o.numero_fuego); setMarca(o.marca || ""); setMedida(o.medida || ""); setBuscando(false); }}
              className="w-full text-left bg-[#F9FAFB] rounded-xl px-3 py-2.5 flex items-center justify-between">
              <div><p className="font-bold text-[14px]">{o.numero_fuego}</p><p className="text-[12px] text-muted">{o.marca} {o.modelo}</p></div>
              <span className="text-[12px] text-muted">P{o.posicion_actual || "-"}</span>
            </button>
          ))}
          {filtradas.length === 0 && <p className="text-center text-muted text-sm py-6">No hay neumáticos en tránsito que coincidan.</p>}
        </div>
      </Modal>
    );
  }

  const titulo = tipo === "nuevo" ? "Montar neumático nuevo" : tipo === "transito" ? "Confirmar montaje" : "Montar recauchado";
  const disabled = !fuego || psi === "" || mm === "" || (tipo === "nuevo" && (!torqueado || !fotoUrl || subiendoFoto));

  return (
    <Modal title={titulo} onClose={onClose}>
      <div className="space-y-4">
        <Field label="N° de fuego" required hint={tipo === "nuevo" ? "Sugerido automáticamente, podés modificarlo (solo números)" : null}>
          <TextInput inputMode="numeric" value={fuego} onChange={e => setFuego(e.target.value.replace(/[^0-9]/g, ""))} className="font-extrabold" disabled={tipo === "transito"} />
        </Field>
        {tipo !== "transito" && (
          <div className="grid grid-cols-2 gap-3">
            <Field label="Marca"><MarcaSelect value={marca} onChange={setMarca} /></Field>
            <Field label="Medida"><TextInput value={medida} onChange={e => setMedida(e.target.value)} /></Field>
          </div>
        )}
        <div className="grid grid-cols-2 gap-3">
          <Field label="PSI actual" required><TextInput type="number" inputMode="numeric" value={psi} onChange={e => setPsi(e.target.value)} /></Field>
          <Field label="MM actual" required><TextInput type="number" step="0.1" value={mm} onChange={e => setMm(e.target.value)} /></Field>
        </div>
        {tipo === "nuevo" && (
          <div className="space-y-3">
            <label className="flex items-center gap-2 text-[13.5px] font-semibold"><input type="checkbox" checked={torqueado} onChange={e => setTorqueado(e.target.checked)} /> Ruedas torqueadas</label>
            <Field label="Foto de checkpoint" required hint="Obligatoria para completar el montaje">
              <label className="h-14 px-5 rounded-2xl font-bold text-[15px] bg-ink text-white flex items-center justify-center gap-2 cursor-pointer active:scale-[0.98] transition w-full">
                <span className="text-[18px]">📷</span> Tomar foto
                <input type="file" accept="image/*" capture="environment" onChange={onFotoChange} className="hidden" />
              </label>
            </Field>
            {subiendoFoto && <p className="text-[12.5px] text-muted">Subiendo foto...</p>}
            {fotoUrl && <p className="text-[12.5px] font-bold text-[#15803D]">✓ Foto subida: {fotoNombre}</p>}
            {fotoError && <p className="text-[12.5px] font-bold text-[#B91C1C]">{fotoError}</p>}
          </div>
        )}
        <Button className="w-full" disabled={disabled} onClick={() => onConfirm({ numero_fuego: fuego, marca, medida, psi, mm, fotoUrl })}>Continuar</Button>
      </div>
    </Modal>
  );
}

   PANTALLA 8 - CIERRE DEL DIA
===================================================================== */
function CierreDelDia({ user, clienteId, onCerrado }) {
  const [resumen, setResumen] = useState(null);
  const [cerrando, setCerrando] = useState(false);
  const [confirmando, setConfirmando] = useState(false);
  const [cerrado, setCerrado] = useState(false);

  useEffect(() => {
    construirResumenJornada(user.id, clienteId, todayISO()).then(({ conteos }) => setResumen(conteos)).catch(() => setResumen(null));
  }, [clienteId]);

  async function confirmarCierre() {
    setConfirmando(false);
    setCerrando(true);
    try {
      await cerrarJornadaConResumen({ user, clienteId, fecha: todayISO(), horaCierre: nowHM(), motivoSinCierre: null });
      localStorage.setItem("jornada_cerrada_hoy", "true");
      setCerrado(true);
      if (onCerrado) onCerrado();
    } catch (e) {
      console.error("No se pudo cerrar la jornada", e);
    } finally {
      setCerrando(false);
    }
  }

  if (cerrado) {
    return (

        <>
          <div className="grid grid-cols-2 gap-3 mb-4">
            {[["Auditorías", resumen.auditorias_realizadas], ["Cambios", resumen.cambios_realizados], ["Regulaciones PSI", resumen.regulaciones_psi], ["Retorqueos", resumen.retorqueos], ["Rotaciones", resumen.rotaciones], ["Reparaciones", resumen.reparaciones]].map(([l, v]) => (
              <div key={l} className="bg-[#F9FAFB] rounded-[18px] p-4">
                <p className="text-[11.5px] font-semibold text-muted mb-1">{l}</p>
                <p className="text-[22px] font-extrabold">{v}</p>

              <p className="text-[26px] font-extrabold">{resumen.pct_receta_promedio}%</p>

  );

              </div>

            </div>
            <div className="flex flex-wrap items-center gap-x-3 gap-y-1 mt-2 text-[12px] text-muted">
              {a.equipo_id && <span>{equiposMap[a.equipo_id] || "Equipo"}</span>}
