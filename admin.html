/* =====================================================================
   MOSA TIRES — kit de UI compartido (JSX). Cargado con Babel en modo
   clásico (sin módulos) antes del script propio de cada página, así que
   todo lo declarado acá (Icon, Button, Card, Modal, BottomNav, hooks...)
   queda disponible como global. Depende de React (CDN) y de
   js/supabase.js (LS, getQueue, db) ya cargados antes que este archivo.
===================================================================== */
const { useState, useEffect, useCallback, createContext, useContext } = React;

/* =====================================================================
   CONTEXTO GLOBAL
===================================================================== */
const AppCtx = createContext(null);
function useApp() { return useContext(AppCtx); }
function useOnline() {
  const [online, setOnline] = useState(navigator.onLine);
  useEffect(() => {
    const on = () => setOnline(true), off = () => setOnline(false);
    window.addEventListener("online", on); window.addEventListener("offline", off);
    return () => { window.removeEventListener("online", on); window.removeEventListener("offline", off); };
  }, []);
  return online;
}
function useQueueCount() {
  const [count, setCount] = useState(getQueue().length);
  useEffect(() => {
    const upd = () => setCount(getQueue().length);
    window.addEventListener("mosa-queue-changed", upd);
    const t = setInterval(upd, 3000);
    return () => { window.removeEventListener("mosa-queue-changed", upd); clearInterval(t); };
  }, []);
  return count;
}
function useAlertasNoLeidas(clienteId, mecanicoId) {
  const [count, setCount] = useState(0);
  const queuePending = useQueueCount();
  useEffect(() => {
    if (!clienteId || !mecanicoId) return;
    let cancel = false;
    const cargar = () => db.fetchAlertas(clienteId, mecanicoId).then(as => { if (!cancel) setCount(as.filter(a => !a.leida_mecanico).length); }).catch(() => {});
    cargar();
    window.addEventListener("mosa-alertas-changed", cargar);
    const t = setInterval(cargar, 15000);
    return () => { cancel = true; window.removeEventListener("mosa-alertas-changed", cargar); clearInterval(t); };
  }, [clienteId, mecanicoId, queuePending]);
  return count;
}

/* =====================================================================
   UI BASICOS
===================================================================== */
function Button({ variant = "primary", className = "", children, ...props }) {
  const base = "h-14 px-5 rounded-2xl font-bold text-[15px] transition active:scale-[0.98] disabled:opacity-50 disabled:active:scale-100 flex items-center justify-center gap-2";
  const variants = {
    primary: "bg-ink text-white",
    ghost: "bg-transparent text-ink border border-bdstrong",
    danger: "bg-[#FEE2E2] text-[#B91C1C]",
    subtle: "bg-[#F3F4F6] text-ink"
  };
  return <button className={cx(base, variants[variant], className)} {...props}>{children}</button>;
}
function Field({ label, required, children, hint }) {
  return (
    <label className="block">
      <span className="block text-[13px] font-semibold text-[#374151] mb-1.5">{label}{required && <span className="text-red-500"> *</span>}</span>
      {children}
      {hint && <span className="block text-xs text-muted mt-1">{hint}</span>}
    </label>
  );
}
function TextInput({ className = "", alert, warn, ...props }) {
  return <input className={cx("w-full h-[52px] px-4 rounded-2xl border bg-[#F3F4F6] border-[#E5E7EB] focus:outline-none focus:ring-2 focus:ring-ink/20 placeholder:text-muted", alert && "field-alert", warn && !alert && "field-warn", className)} {...props} />;
}
function Select({ className = "", children, ...props }) {
  return <select className={cx("w-full h-[52px] px-4 rounded-2xl border bg-[#F3F4F6] border-[#E5E7EB] focus:outline-none focus:ring-2 focus:ring-ink/20", className)} {...props}>{children}</select>;
}
function MarcaSelect({ value, onChange }) {
  const isOtra = value && !MARCAS_NEUMATICOS.slice(0, -1).includes(value);
  const [otra, setOtra] = useState(isOtra ? value : "");
  return (
    <div>
      <Select value={isOtra ? "Otra" : value} onChange={e => { if (e.target.value === "Otra") { onChange(otra); } else { onChange(e.target.value); } }}>
        <option value="">Seleccionar</option>
        {MARCAS_NEUMATICOS.map(m => <option key={m} value={m}>{m}</option>)}
      </Select>
      {isOtra && (
        <TextInput className="mt-2" placeholder="Escribí la marca" value={otra}
          onChange={e => { setOtra(e.target.value); onChange(e.target.value); }} />
      )}
    </div>
  );
}
function TextArea({ className = "", ...props }) {
  return <textarea className={cx("w-full min-h-[90px] px-4 py-3 rounded-2xl border bg-[#F3F4F6] border-[#E5E7EB] focus:outline-none focus:ring-2 focus:ring-ink/20", className)} {...props} />;
}
function Card({ className = "", children }) {
  return <div className={cx("bg-white rounded-card shadow-card border border-bd p-5", className)}>{children}</div>;
}
function Badge({ children, color = "gray" }) {
  const colors = {
    gray: "bg-[#F3F4F6] text-[#374151]", green: "bg-[#DCFCE7] text-[#15803D]",
    red: "bg-[#FEE2E2] text-[#B91C1C]", amber: "bg-[#FEF3C7] text-[#92400E]", black: "bg-ink text-white"
  };
  return <span className={cx("px-3 py-1 rounded-full text-[12px] font-bold", colors[color])}>{children}</span>;
}
function Modal({ title, onClose, children, wide, footer }) {
  return (
    <div className="fixed inset-0 z-50 flex items-end sm:items-center justify-center bg-black/40 p-0 sm:p-4" onClick={(e) => { if (e.target === e.currentTarget && onClose) onClose(); }}>
      <div className={cx("bg-white w-full sm:rounded-card rounded-t-[24px] max-h-[92vh] overflow-y-auto", wide ? "sm:max-w-2xl" : "sm:max-w-md")}>
        <div className="sticky top-0 bg-white border-b border-bd px-5 py-4 flex items-center justify-between z-10">
          <h3 className="text-lg font-extrabold">{title}</h3>
          {onClose && <button onClick={onClose} className="w-9 h-9 rounded-full hover:bg-[#F3F4F6] flex items-center justify-center text-sub"><Icon.close width="18" height="18"/></button>}
        </div>
        <div className="p-5">{children}</div>
        {footer && <div className="sticky bottom-0 bg-white border-t border-bd p-4">{footer}</div>}
      </div>
    </div>
  );
}
function Toast({ msg, onDone }) {
  useEffect(() => { const t = setTimeout(onDone, 2000); return () => clearTimeout(t); }, []);
  return (
    <div className="fixed top-4 left-1/2 -translate-x-1/2 z-[80] px-4 py-3 rounded-2xl shadow-lg text-sm font-semibold flex items-center gap-3" style={{ background: "#DCFCE7", color: "#15803D" }}>
      <span>{msg}</span>
      <button onClick={onDone} className="opacity-60">✕</button>
    </div>
  );
}
function useToasts() {
  const [toasts, setToasts] = useState([]);
  const push = useCallback((msg) => setToasts(t => [...t, { id: uuid(), msg }]), []);
  const remove = (id) => setToasts(t => t.filter(x => x.id !== id));
  const node = <div>{toasts.map(t => <Toast key={t.id} msg={t.msg} onDone={() => remove(t.id)} />)}</div>;
  return [push, node];
}
function Confirm({ title, desc, onConfirm, onCancel }) {
  return (
    <Modal title={title} onClose={onCancel}>
      <p className="text-[14px] text-[#374151] mb-5">{desc}</p>
      <div className="flex gap-3">
        <Button variant="subtle" className="flex-1" onClick={onCancel}>Cancelar</Button>
        <Button className="flex-1" onClick={onConfirm}>Confirmar</Button>
      </div>
    </Modal>
  );
}
function OfflineBadge() {
  const online = useOnline();
  const pending = useQueueCount();
  if (online && pending === 0) return null;
  return (
    <div className="px-4">
      {!online && <div className="mb-2 rounded-xl bg-[#FEE2E2] text-[#B91C1C] text-xs font-bold px-3 py-2 text-center">Sin conexión</div>}
      {pending > 0 && <div className="mb-2 rounded-xl bg-[#FEF3C7] text-[#92400E] text-xs font-bold px-3 py-2 text-center">{pending} registro{pending !== 1 ? "s" : ""} pendiente{pending !== 1 ? "s" : ""} de sincronizar</div>}
    </div>
  );
}

/* =====================================================================
   NAV
===================================================================== */
function BottomNav({ view, setView, disabledExcept, alertasNoLeidas }) {
  const items = [
    { id: "inicio", label: "Inicio", icon: Icon.home },
    { id: "cierre", label: "Cierre", icon: Icon.clipboard },
    { id: "alertas", label: "Alertas", icon: Icon.bell },
    { id: "perfil", label: "Perfil", icon: Icon.user }
  ];
  return (
    <div className="fixed bottom-0 left-0 right-0 bg-white border-t border-bd safe-bottom z-30">
      <div className="flex">
        {items.map(it => {
          const active = view === it.id;
          const disabled = disabledExcept && !disabledExcept.includes(it.id);
          return (
            <button key={it.id} disabled={disabled} onClick={() => setView(it.id)} className={cx("relative flex-1 flex flex-col items-center gap-1 py-2.5", disabled && "opacity-30")}>
              <span className="relative">
                <it.icon width="24" height="24" className={active ? "text-ink" : "text-[#B0B3B8]"} />
                {it.id === "alertas" && alertasNoLeidas > 0 && (
                  <span className="absolute -top-1 -right-2.5 min-w-[16px] h-4 px-1 rounded-full bg-[#EF4444] text-white text-[10px] font-bold flex items-center justify-center">{alertasNoLeidas > 99 ? "99+" : alertasNoLeidas}</span>
                )}
              </span>
              <span className={cx("text-[10.5px] font-semibold", active ? "text-ink" : "text-[#B0B3B8]")}>{it.label}</span>
            </button>
          );
        })}
      </div>
    </div>
  );
}

/* =====================================================================
   EMPRESA (filtro transversal a toda la app del admin)
===================================================================== */
const LS_EMPRESA_FILTRO = "empresa_filtro_admin";
function useEmpresaFiltro() {
  const [empresas, setEmpresas] = useState([]);
  const [filtro, setFiltroState] = useState(() => localStorage.getItem(LS_EMPRESA_FILTRO) || "todas");
  useEffect(() => { sb.from("clientes").select("*").eq("activo", true).order("nombre").then(({ data }) => setEmpresas(data || [])); }, []);
  function setFiltro(v) { localStorage.setItem(LS_EMPRESA_FILTRO, v); setFiltroState(v); }
  const nombreFiltro = filtro === "todas" ? "Todas" : ((empresas.find(e => e.id_cliente === filtro) || {}).nombre || filtro);
  return { empresas, filtro, setFiltro, nombreFiltro };
}
function EmpresaSelector({ empresas, filtro, setFiltro, nombreFiltro }) {
  const [open, setOpen] = useState(false);
  return (
    <div className="relative">
      <button onClick={() => setOpen(o => !o)} className="flex items-center gap-1.5 bg-[#F3F4F6] rounded-full pl-3 pr-2.5 py-2 text-[13px] font-bold">
        <Icon.building width="15" height="15" />
        <span className="max-w-[100px] truncate">{nombreFiltro}</span>
        <Icon.chevronDown width="14" height="14" />
      </button>
      {open && (
        <>
          <div className="fixed inset-0 z-40" onClick={() => setOpen(false)} />
          <div className="absolute left-0 top-full mt-2 w-56 bg-white rounded-2xl border border-bd shadow-card z-50 overflow-hidden">
            <button onClick={() => { setFiltro("todas"); setOpen(false); }} className={cx("w-full text-left px-4 py-3 text-[14px] font-semibold flex items-center gap-2", filtro === "todas" ? "bg-[#F3F4F6]" : "")}>
              <span className={cx("w-3.5 h-3.5 rounded-full border-2", filtro === "todas" ? "border-ink bg-ink" : "border-[#D1D5DB]")} />
              Todas las empresas
            </button>
            {empresas.map(e => (
              <button key={e.id_cliente} onClick={() => { setFiltro(e.id_cliente); setOpen(false); }} className={cx("w-full text-left px-4 py-3 text-[14px] font-semibold flex items-center gap-2", filtro === e.id_cliente ? "bg-[#F3F4F6]" : "")}>
                <span className={cx("w-3.5 h-3.5 rounded-full border-2", filtro === e.id_cliente ? "border-ink bg-ink" : "border-[#D1D5DB]")} />
                {e.nombre}
              </button>
            ))}
          </div>
        </>
      )}
    </div>
  );
}

function AdminShell({ view, setView, empresaCtl, alertasNoLeidas, children }) {

  const NavList = ({ onPick }) => (

        <NavList />
      </div>
      <div className="flex-1 min-w-0">

}
const ALERTA_TIPO_LABELS = {
  psi_bajo: "PSI bajo", psi_alto: "PSI alto", mm_critico: "MM crítico", mm_bajo: "MM bajo",
  rotacion_recomendada: "Rotación recomendada", neumatico_no_registrado: "Neumático no registrado",
  discrepancia_inventario: "Discrepancia de inventario", cierre_dia: "Cierre de jornada",

function AlertaRow({ a, equiposMap, onVer }) {

function AlertaDetalleModal({ alerta, onClose, onMarcarLeida }) {

function DashboardView({ empresaCtl, onAbrirMecanico }) {
  const { filtro } = empresaCtl;
  const [kpis, setKpis] = useState({ equipos: null, auditorias: null, alertas: null, pct: null });
  const [criticas, setCriticas] = useState([]);
  const [pendientes, setPendientes] = useState([]);
  const [stock, setStock] = useState(null);
  const [mecanicos, setMecanicos] = useState([]);
  const [equiposMap, setEquiposMap] = useState({});
  const [loading, setLoading] = useState(true);
  const [verAlerta, setVerAlerta] = useState(null);
  const [pushToast, toastNode] = useToasts();

  async function cargar() {
    setLoading(true);
    try {
      const [equiposCount, auditoriasCount, criticasList, pct, pend, stk, mecs] = await Promise.all([
        adminDb.countEquiposActivos(filtro), adminDb.countAuditoriasHoy(filtro),
        adminDb.fetchAlertasCriticas(filtro, true), adminDb.fetchPctInstructivoHoy(filtro),
        adminDb.fetchInstructivosPendientes(filtro), adminDb.fetchStockRapido(filtro),
        adminDb.fetchMecanicosEnJornada(filtro)
      ]);
      setKpis({ equipos: equiposCount, auditorias: auditoriasCount, alertas: criticasList.length, pct });
      setCriticas(criticasList);
      setPendientes(pend);
      setStock(stk);
      setMecanicos(mecs);
      const eqIds = [...new Set(criticasList.map(a => a.equipo_id))].filter(Boolean);
      if (eqIds.length) {
        const { data: eqs } = await sb.from("equipos").select("id_equipo,patente,numero_interno").in("id_equipo", eqIds);
        const map = {}; (eqs || []).forEach(e => { map[e.id_equipo] = e.numero_interno ? `${e.numero_interno} · ${e.patente}` : e.patente; });
        setEquiposMap(map);
      } else setEquiposMap({});
    } catch (e) { console.error("No se pudo cargar el dashboard", e); }
    setLoading(false);
  }
  useEffect(() => { cargar(); }, [filtro]);

  async function marcarLeida(a) {
    await adminDb.marcarAlertaLeida(a.id);
    setCriticas(cs => cs.filter(x => x.id !== a.id));
    setKpis(k => ({ ...k, alertas: Math.max(0, k.alertas - 1) }));
    setVerAlerta(null);
    pushToast("✓ Alerta marcada como leída");
  }

  if (loading) return <div className="flex justify-center py-16"><span className="spinner" /></div>;

  return (
    <div>
      {toastNode}
      <h1 className="text-[26px] font-extrabold mb-5">Dashboard</h1>

      <div className="grid grid-cols-2 md:grid-cols-4 gap-3 mb-6">
        <KpiCard label="Equipos activos" value={kpis.equipos} />
        <KpiCard label="Auditorías hoy" value={kpis.auditorias} />
        <KpiCard label="Alertas críticas" value={kpis.alertas} />
        <KpiCard label="% instructivo prom." value={kpis.pct != null ? kpis.pct + "%" : "—"} />
      </div>

      <p className="font-bold text-[16px] mb-3">Alertas críticas activas</p>
      <div className="space-y-2 mb-8">
        {criticas.map(a => <AlertaRow key={a.id} a={a} equiposMap={equiposMap} onVer={setVerAlerta} />)}
        {!criticas.length && <p className="text-[13.5px] text-muted py-4">Sin alertas críticas pendientes. 🎉</p>}
      </div>

      <p className="font-bold text-[16px] mb-3">Equipos con instructivo pendiente o parcial</p>
      <div className="bg-white rounded-2xl border border-bd shadow-card overflow-hidden mb-8">
        {pendientes.map((p, i) => (
          <div key={i} className={cx("flex items-center justify-between px-4 py-3", i > 0 && "border-t border-bd")}>
            <div>
              <p className="font-bold text-[14px]">{p.numero_interno ? `${p.numero_interno} · ` : ""}{p.patente}</p>
              <p className="text-[12px] text-muted">Auditoría del {p.fecha ? formatDateLong(p.fecha) : "-"} · {p.tareas_pendientes}/{p.total_tareas} tareas pendientes</p>
            </div>
            <Badge color={p.estado === "parcial" ? "amber" : "red"}>{p.estado === "parcial" ? "Parcial" : "Pendiente"}</Badge>
          </div>
        ))}
        {!pendientes.length && <p className="text-[13.5px] text-muted p-4">No hay instructivos pendientes.</p>}
      </div>

      <p className="font-bold text-[16px] mb-3">Stock rápido</p>
      <div className="grid grid-cols-2 md:grid-cols-4 gap-3 mb-8">
        <KpiCard label="Nuevos" value={stock ? stock.nuevo : null} />
        <KpiCard label="Tránsito" value={stock ? stock.transito : null} />
        <KpiCard label="Recauchados" value={stock ? stock.recauchado : null} />
        <KpiCard label="En reparar" value={stock ? stock.reparacion : null} />
      </div>

      <p className="font-bold text-[16px] mb-3">Mecánicos en jornada</p>
      <div className="bg-white rounded-2xl border border-bd shadow-card overflow-hidden">
        {mecanicos.map((m, i) => {
          const bloqueado = m.estado === "cerrado";
          const dot = m.estado === "activo" ? "🟢" : m.estado === "cerrado" ? "🔴" : "⏳";
          const detalle = m.estado === "activo" ? `Activo desde ${(m.turno.hora_inicio || "").slice(0, 5) || "—"}`
            : m.estado === "cerrado" ? `Jornada cerrada ${(m.turno.hora_cierre || "").slice(0, 5) || ""}`
            : "Sin iniciar";
          return (
            <button key={m.id} onClick={() => bloqueado && onAbrirMecanico(m)}
              className={cx("w-full flex items-center justify-between px-4 py-3 text-left", i > 0 && "border-t border-bd", !bloqueado && "cursor-default")}>
              <div className="flex items-center gap-2">
                <span>{dot}</span>
                <div>
                  <p className="font-bold text-[14px]">{m.nombre} {m.apellido || ""}</p>
                  <p className="text-[12px] text-muted">{detalle}</p>
                </div>
              </div>
              {bloqueado && <Icon.lock width="16" height="16" className="text-muted shrink-0" />}
            </button>
          );
        })}
        {!mecanicos.length && <p className="text-[13.5px] text-muted p-4">No hay mecánicos para esta empresa.</p>}
      </div>

      {verAlerta && <AlertaDetalleModal alerta={verAlerta} onClose={() => setVerAlerta(null)} onMarcarLeida={marcarLeida} />}
    </div>
  );
}

function MecanicoBloqueadoModal({ mecanico, empresas, onClose, onDone }) {
  const [modo, setModo] = useState(null); // null | "empresa"
  const [nuevaEmpresa, setNuevaEmpresa] = useState(mecanico.cliente_id);
  const [saving, setSaving] = useState(false);
  const [error, setError] = useState("");

  async function iniciarNuevoTurno() {
    setSaving(true); setError("");
    try {
      const alerta = await adminDb.fetchSolicitudesDesbloqueoPendientes("todas").then(as => as.find(a => a.mecanico_id === mecanico.id));
      await adminDb.iniciarNuevoTurno(mecanico, alerta ? alerta.id : null);
      onDone();
    } catch (e) { console.error("No se pudo iniciar el nuevo turno", e); setError("No se pudo iniciar el nuevo turno. Intentá de nuevo."); setSaving(false); }
  }
  async function cambiarEmpresa() {
    setSaving(true); setError("");
    try {
      const alerta = await adminDb.fetchSolicitudesDesbloqueoPendientes("todas").then(as => as.find(a => a.mecanico_id === mecanico.id));
      await adminDb.cambiarEmpresaMecanico(mecanico, nuevaEmpresa, alerta ? alerta.id : null);
      onDone();
    } catch (e) { console.error("No se pudo cambiar la empresa del mecánico", e); setError("No se pudo cambiar la empresa. Intentá de nuevo."); setSaving(false); }
  }

  if (modo === "empresa") {
    return (
      <Modal title="Cambiar de empresa" onClose={() => setModo(null)}>
        <p className="text-[14px] text-[#374151] mb-4">Elegí la empresa donde {mecanico.nombre} va a trabajar hoy.</p>
        <Field label="Empresa">
          <Select value={nuevaEmpresa} onChange={e => setNuevaEmpresa(e.target.value)}>
            {empresas.map(e => <option key={e.id_cliente} value={e.id_cliente}>{e.nombre}</option>)}
          </Select>
        </Field>
        {error && <p className="text-[12.5px] font-semibold text-[#B91C1C] mt-3">{error}</p>}
        <Button className="w-full mt-5" disabled={saving} onClick={cambiarEmpresa}>{saving ? <span className="spinner" /> : "Confirmar cambio de empresa"}</Button>
      </Modal>
    );
  }

  return (
    <Modal title={`${mecanico.nombre} ${mecanico.apellido || ""}`} onClose={onClose}>
      <p className="text-[14px] text-[#374151] mb-5">Esta jornada está cerrada. Elegí cómo desbloquearlo.</p>
      {error && <p className="text-[12.5px] font-semibold text-[#B91C1C] mb-3">{error}</p>}
      <div className="space-y-3">
        <Button className="w-full" disabled={saving} onClick={iniciarNuevoTurno}>{saving ? <span className="spinner" /> : "Iniciar nuevo turno"}</Button>
        <Button variant="subtle" className="w-full" disabled={saving} onClick={() => setModo("empresa")}>Cambiar empresa</Button>
      </div>
    </Modal>
  );
}

function EquiposView({ empresaCtl }) {
  const { filtro } = empresaCtl;
  const [equipos, setEquipos] = useState([]);
  const [search, setSearch] = useState("");
  const [loading, setLoading] = useState(true);
  useEffect(() => {
    setLoading(true);
    let q = sb.from("equipos").select("*").eq("activo", true).order("numero_interno");
    if (filtro !== "todas") q = q.eq("cliente_id", filtro);
    q.then(({ data }) => { setEquipos(data || []); setLoading(false); });
  }, [filtro]);
  const filtrados = equipos.filter(eq => {
    if (!search) return true;
    const s = search.toLowerCase();
    return (eq.patente || "").toLowerCase().includes(s) || (eq.numero_interno || "").toLowerCase().includes(s);
  });
  return (
    <div>
      <h1 className="text-[26px] font-extrabold mb-5">Equipos</h1>
      <TextInput placeholder="Buscar por patente o número interno" value={search} onChange={e => setSearch(e.target.value)} className="mb-4 max-w-md" />
      {loading ? <div className="flex justify-center py-10"><span className="spinner" /></div> : (
        <div className="grid sm:grid-cols-2 lg:grid-cols-3 gap-3">
          {filtrados.map(eq => (
            <Card key={eq.id_equipo}>
              <p className="font-bold text-[15px]">{eq.numero_interno ? `${eq.numero_interno} · ` : ""}{eq.patente}</p>
              <p className="text-[12.5px] text-muted mt-1">{eq.tipo === "SEMI" ? "Semirremolque" : `Tracto ${eq.configuracion_ejes || ""}`} · {eq.modelo || "-"}</p>
              <p className="text-[12px] text-muted mt-1">{eq.kilometros ? `${eq.kilometros.toLocaleString()} km` : "Sin km registrados"}</p>
            </Card>
          ))}
          {!filtrados.length && <p className="text-[13.5px] text-muted py-6 col-span-full text-center">No hay equipos que coincidan.</p>}
        </div>
      )}
    </div>
  );
}

  { label: "Traccional · Tránsito", campo: "neu_trac_transito", bodega: "transito" },
  { label: "Traccional · Por reparar", campo: "neu_trac_reparar", bodega: "reparacion" },
  { label: "Traccional · Recauchados", campo: "neu_trac_recauchado", bodega: "recauchado" }
];
const LLANTAS_ROWS = [

  { label: "Llanta americana fierro", campo: "llantas_am_fierro" },

];

function DiscrepanciaCard({ d, onResolver }) {
  const [justificacion, setJustificacion] = useState("");
  const [saving, setSaving] = useState(false);
  async function resolver(aprobar) {
    if (aprobar && !justificacion.trim()) return;
    setSaving(true);
    try { await onResolver(d, aprobar, justificacion.trim()); }
    finally { setSaving(false); }
  }
  return (
    <div className="bg-[#FFFBEB] border border-[#FDE68A] rounded-2xl p-4 space-y-3">
      <div>
        <p className="font-bold text-[14px] text-[#92400E]">⚠ Discrepancia — {d.item_detalle}</p>
        <p className="text-[13px] text-[#92400E]">Sistema: {d.valor_sistema} · Físico: {d.valor_fisico} · Diferencia: {d.diferencia > 0 ? "+" : ""}{d.diferencia}</p>
      </div>
      {d.observacion_mecanico && <p className="text-[12.5px] text-[#374151] italic">Observación del mecánico: "{d.observacion_mecanico}"</p>}
      <Field label="Justificación del Admin" required hint="Obligatoria para aprobar el ajuste">
        <TextArea value={justificacion} onChange={e => setJustificacion(e.target.value)} placeholder="Explicá por qué se aprueba o se rechaza este ajuste..." />
      </Field>
      <div className="flex gap-2">
        <Button className="flex-1 h-11 text-[13.5px]" disabled={saving || !justificacion.trim()} onClick={() => resolver(true)}>{saving ? <span className="spinner" /> : "✅ Aprobar ajuste"}</Button>
        <Button variant="danger" className="flex-1 h-11 text-[13.5px]" disabled={saving} onClick={() => resolver(false)}>❌ Rechazar</Button>
      </div>
    </div>
  );
}

function DetalleCheckModal({ mecanico, filtro, empresas, adminUser, onClose, pushToast, onResuelto }) {
  const [stock, setStock] = useState(null);
  const [herramientas, setHerramientas] = useState([]);
  const [discrepancias, setDiscrepancias] = useState([]);
  const [loading, setLoading] = useState(true);
  const check = mecanico.check;

  async function cargar() {
    setLoading(true);
    try {
      const [stk, herr, disc] = await Promise.all([
        adminDb.fetchStockRapido(filtro),
        check ? fetchHerramientasCheck(check.id) : Promise.resolve([]),
        fetchDiscrepanciasPendientes(mecanico.id, todayISO())
      ]);
      setStock(stk); setHerramientas(herr); setDiscrepancias(disc);
    } catch (e) { console.error("No se pudo cargar el detalle del check diario", e); }
    setLoading(false);
  }
  useEffect(() => { cargar(); }, []);

  async function resolver(d, aprobar, justificacion) {
    await resolverDiscrepancia(d, aprobar, justificacion, adminUser.id);
    setDiscrepancias(ds => ds.filter(x => x.id !== d.id));
    pushToast(aprobar ? "✓ Ajuste aprobado" : "✓ Discrepancia rechazada");
    onResuelto();
  }

  const empresaNombre = ((empresas || []).find(e => e.id_cliente === mecanico.cliente_id) || {}).nombre || mecanico.cliente_id;

  return (
    <Modal title={`${mecanico.nombre} ${mecanico.apellido || ""}`} onClose={onClose} wide>
      {loading ? <div className="flex justify-center py-10"><span className="spinner" /></div> : (
        <div className="space-y-6">
          <div>
            <p className="text-[13px] text-muted">Empresa: {empresaNombre}</p>
            <p className="text-[13px] text-muted">Fecha: {formatDateLong(todayISO())}{check ? ` · Hora inicio: ${(check.hora_inicio || "").slice(0, 5)}` : ""}</p>
          </div>

          {!check ? (
            <p className="text-[13.5px] text-muted">Todavía no completó el check diario de hoy.</p>
          ) : (
            <>
              <div>
                <p className="font-bold text-[14.5px] mb-2">Conteo de neumáticos</p>
                <div className="overflow-x-auto -mx-1">
                  <table className="w-full text-[13px]">
                    <thead>
                      <tr className="text-left text-muted">
                        <th className="font-semibold pb-2 px-1">Tipo</th>
                        <th className="font-semibold pb-2 px-1 text-right">Sistema</th>
                        <th className="font-semibold pb-2 px-1 text-right">Físico</th>
                        <th className="font-semibold pb-2 px-1 text-right">Diferencia</th>
                      </tr>
                    </thead>
                    <tbody>
                      {CONTEO_ROWS.map(r => {
                        const sistema = stock ? stock[r.bodega] : null;
                        const fisico = check[r.campo] != null ? check[r.campo] : 0;
                        const diff = sistema != null ? fisico - sistema : null;
                        return (
                          <tr key={r.label} className="border-t border-bd">
                            <td className="py-2 px-1 font-semibold">{r.label}</td>
                            <td className="py-2 px-1 text-right">{sistema != null ? sistema : "—"}</td>
                            <td className="py-2 px-1 text-right">{fisico}</td>
                            <td className="py-2 px-1 text-right font-bold">{diff == null ? "—" : diff === 0 ? "✅ 0" : `🔴 ${diff > 0 ? "+" : ""}${diff}`}</td>
                          </tr>
                        );
                      })}
                      {LLANTAS_ROWS.map(r => (
                        <tr key={r.label} className="border-t border-bd">
                          <td className="py-2 px-1 font-semibold">{r.label}</td>
                          <td className="py-2 px-1 text-right text-muted">—</td>
                          <td className="py-2 px-1 text-right">{check[r.campo] != null ? check[r.campo] : 0}</td>
                          <td className="py-2 px-1 text-right text-muted">—</td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </div>

              <div>
                <p className="font-bold text-[14.5px] mb-2">Checklist de herramientas</p>

                  {herramientas.filter(h => h.cantidad > 0).map(h => (
                    <div key={h.id} className="rounded-xl px-3 py-2 text-[12.5px] font-semibold flex items-center justify-between bg-[#F3F4F6] text-[#1F2937]">
                      <span>{h.herramienta}</span><span>{h.cantidad}</span>
                    </div>
                  ))}
                  {herramientas.filter(h => !h.cantidad).map(h => (
                    <div key={h.id} className="rounded-xl px-3 py-2 text-[12.5px] font-semibold flex items-center justify-between bg-[#F9FAFB] text-muted">
                      <span>{h.herramienta}</span><span>0</span>
                    </div>
                  ))}
                  {!herramientas.length && <p className="text-[13px] text-muted col-span-full">Sin checklist registrado.</p>}
                </div>
              </div>
            </>
          )}

          <div>
            <p className="font-bold text-[14.5px] mb-2">Discrepancias</p>
            {discrepancias.length === 0 ? (
              <p className="text-[13.5px] font-semibold text-[#15803D]">✅ Sin discrepancias</p>
            ) : (
              <div className="space-y-3">
                {discrepancias.map(d => <DiscrepanciaCard key={d.id} d={d} onResolver={resolver} />)}

      )}
    </Modal>
  );
}

function InicioDelDiaView({ empresaCtl, adminUser, pushToast }) {
  const { filtro, empresas } = empresaCtl;
  const [lista, setLista] = useState([]);
  const [stats, setStats] = useState({ pendientes: 0, resueltas: 0 });
  const [loading, setLoading] = useState(true);
  const [verMecanico, setVerMecanico] = useState(null);

  async function cargar() {
    setLoading(true);
    try {
      const [data, pendientes, resueltas] = await Promise.all([
        fetchInicioDelDia(filtro), countDiscrepanciasPendientes(filtro), countDiscrepanciasResueltasHoy(filtro)
      ]);
      setLista(data);
      setStats({ pendientes, resueltas });
    } catch (e) { console.error("No se pudo cargar el inicio del día", e); }
    setLoading(false);
  }
  useEffect(() => { cargar(); }, [filtro]);

  const completados = lista.filter(m => m.check && m.check.completado).length;

  if (loading) return <div className="flex justify-center py-10"><span className="spinner" /></div>;

  return (
    <div>
      <div className="bg-white rounded-2xl border border-bd shadow-card overflow-hidden mb-5">
        {lista.map((m, i) => {
          const done = m.check && m.check.completado;
          return (
            <button key={m.id} onClick={() => done && setVerMecanico(m)}
              className={cx("w-full flex items-center justify-between px-4 py-3 text-left", i > 0 && "border-t border-bd", !done && "cursor-default")}>
              <div className="flex items-center gap-2">
                <span>{done ? "✅" : "⏳"}</span>
                <div>
                  <p className="font-bold text-[14px]">{m.nombre} {m.apellido || ""}</p>
                  <p className="text-[12px] text-muted">{done ? `Completó ${(m.check.hora_inicio || "").slice(0, 5)}` : "Sin completar"}</p>
                </div>
              </div>
              {done && <span className="text-[12px] font-bold text-ink shrink-0">Ver detalle</span>}
            </button>
          );
        })}
        {!lista.length && <p className="text-[13.5px] text-muted p-4">No hay mecánicos para esta empresa.</p>}
      </div>

      <div className="grid grid-cols-3 gap-3">
        <KpiCard label={`Completaron el check`} value={`${completados}/${lista.length}`} />
        <KpiCard label="Discrepancias pendientes" value={stats.pendientes} />
        <KpiCard label="Resueltas hoy" value={stats.resueltas} />
      </div>

      {verMecanico && (
        <DetalleCheckModal mecanico={verMecanico} filtro={filtro} empresas={empresas} adminUser={adminUser}
          onClose={() => setVerMecanico(null)} pushToast={pushToast} onResuelto={cargar} />
      )}
    </div>
  );
}

function DiscrepanciaAuditoriaCard({ d, onResolver }) {
  const [justificacion, setJustificacion] = useState("");
  const [saving, setSaving] = useState(false);
  async function resolver(aprobar) {
    if (aprobar && !justificacion.trim()) return;
    setSaving(true);
    try { await onResolver(d, aprobar, justificacion.trim()); }
    finally { setSaving(false); }
  }
  return (
    <div className="bg-[#FFFBEB] border border-[#FDE68A] rounded-2xl p-4 space-y-3">
      <div>
        <p className="font-bold text-[14px] text-[#92400E]">🔴 Discrepancia — {d.equipo ? `${d.equipo.patente} (${d.equipo.numero_interno || "-"})` : "-"} — Posición {d.posicion}</p>
        <p className="text-[12.5px] text-[#92400E]">Mecánico: {d.mecanico ? `${d.mecanico.nombre} ${d.mecanico.apellido || ""}` : "-"} — {(d.creado_en || "").slice(11, 16)}</p>
      </div>
      <div className="text-[13px] text-[#374151] space-y-0.5">
        <p><span className="font-semibold">Campo:</span> {d.item_detalle}</p>
        <p><span className="font-semibold">Sistema registra:</span> {d.valor_sistema == null ? "sin registro" : d.valor_sistema}</p>
        <p><span className="font-semibold">Mecánico encontró:</span> {d.valor_fisico}</p>
      </div>
      <Field label="Justificación" required hint="Obligatoria para aprobar">
        <TextArea value={justificacion} onChange={e => setJustificacion(e.target.value)} placeholder="Explicá por qué se aprueba o se rechaza..." />
      </Field>
      <div className="flex gap-2">
        <Button className="flex-1 h-11 text-[13.5px]" disabled={saving || !justificacion.trim()} onClick={() => resolver(true)}>{saving ? <span className="spinner" /> : "✅ Aprobar"}</Button>
        <Button variant="danger" className="flex-1 h-11 text-[13.5px]" disabled={saving} onClick={() => resolver(false)}>❌ Rechazar</Button>
      </div>
    </div>
  );
}
function DiscrepanciasAuditoriaTab({ filtro, adminUser, pushToast, onCambio }) {
  const [lista, setLista] = useState([]);

const CAMBIO_TIPO_ICON = { entra: "↗", sale: "↙" };
function MovimientoRow({ m }) {
  const equipoLabel = m.equipo ? `${m.equipo.numero_interno ? m.equipo.numero_interno + " · " : ""}${m.equipo.patente}` : "-";
  const mecanicoLabel = m.mecanico ? `${m.mecanico.nombre} ${m.mecanico.apellido || ""}` : "-";
  let linea;
  if (m.kind === "intervencion") {
    const labels = { regulacion_psi: "Regulación PSI", retorqueo: "Retorqueo", reparacion: "Reparación", giro_neumatico: "Giro de neumático", checkpoint: "Checkpoint" };
    linea = <p className="text-[13.5px]">⚙ {labels[m.tipo] || m.tipo}{m.posicion != null ? ` pos ${m.posicion}` : ""}{m.psi_nuevo != null ? ` → ${m.psi_nuevo} PSI` : ""}</p>;
  } else if (m.motivo_salida === "rotacion") {
    linea = <p className="text-[13.5px]">↺ Rotación{m.posicion != null ? ` pos ${m.posicion}` : ""}: N° fuego {m.numero_fuego || "-"}</p>;
  } else if (m.tipo === "entra") {
    linea = <p className="text-[13.5px]">↗ Entrada pos {m.posicion}: N° fuego {m.numero_fuego}{m.estado ? ` (${m.estado})` : ""}</p>;
  } else {
    linea = <p className="text-[13.5px]">↙ Salida pos {m.posicion}: N° fuego {m.numero_fuego} → {m.motivo_salida || "-"}</p>;
  }
  return (
    <div className="bg-white rounded-2xl border border-bd shadow-card p-4">
      <p className="text-[11.5px] text-muted font-semibold">{(m.creado_en || "").slice(11, 16)} — {mecanicoLabel} — {equipoLabel}</p>
      {linea}
    </div>
  );
}

const MOVIMIENTOS_TABS = [
  { id: "alertas", label: "Alertas", icon: "🔴" },
  { id: "discrepancias", label: "Discrepancias", icon: "⚠" },
  { id: "instructivos", label: "Instructivos", icon: "📋" },
  { id: "cambio", label: "Hoja de cambio", icon: "🔄" }
];
function MovimientosDelDiaView({ empresaCtl, adminUser }) {
  const { filtro } = empresaCtl;
  const [tab, setTab] = useState("alertas");
  const [pushToast, toastNode] = useToasts();
  const [badges, setBadges] = useState({ alertas: null, discrepancias: null, instructivos: null, cambio: null });
  const [sinActividad, setSinActividad] = useState(false);
  const [checking, setChecking] = useState(true);

  useEffect(() => {
    setChecking(true);
    setBadges({ alertas: null, discrepancias: null, instructivos: null, cambio: null });
    (async () => {
      if (filtro && filtro !== "todas") {
        try {
          const mecs = await adminDb.fetchMecanicosEnJornada(filtro);
          setSinActividad(!mecs.some(m => m.estado !== "sin_iniciar"));
        } catch (e) { setSinActividad(false); }
      } else setSinActividad(false);
      setChecking(false);
      // Precarga los 4 badges de una para que se vean sin tener que visitar cada tab.
      try {
        const [alertas, discrepancias, instructivos, cambio] = await Promise.all([
          fetchAlertasCriticasHoy(filtro), fetchDiscrepanciasAuditoriaHoy(filtro),
          fetchInstructivosHoy(filtro), fetchMovimientosEnVivoHoy(filtro)
        ]);
        setBadges({
          alertas: alertas.length, discrepancias: discrepancias.length,
          instructivos: instructivos.filter(r => r.estado === "pendiente" || r.estado === "parcial").length,
          cambio: cambio.length
        });
      } catch (e) { console.error("No se pudieron precargar los badges de Movimientos del día", e); }
    })();
  }, [filtro]);

  function setBadge(key, list) { setBadges(b => ({ ...b, [key]: list.length })); }
  async function refrescarAlertasBadge() { try { setBadge("alertas", await fetchAlertasCriticasHoy(filtro)); } catch (e) {} }
  async function refrescarDiscrepanciasBadge() { try { setBadge("discrepancias", await fetchDiscrepanciasAuditoriaHoy(filtro)); } catch (e) {} }

  if (checking) return <div className="flex justify-center py-10"><span className="spinner" /></div>;
  if (sinActividad) return <p className="text-[13.5px] text-muted py-6 text-center">Sin actividad hoy en esta empresa</p>;

  return (
    <div>
      {toastNode}
      <div className="flex gap-2 mb-5 overflow-x-auto">
        {MOVIMIENTOS_TABS.map(t => (
          <button key={t.id} onClick={() => setTab(t.id)}
            className={cx("px-4 py-2 rounded-full text-[13px] font-bold whitespace-nowrap flex items-center gap-1.5", tab === t.id ? "bg-ink text-white" : "bg-[#F3F4F6] text-[#374151]")}>
            <span>{t.icon}</span>{t.label}
            {badges[t.id] != null && badges[t.id] > 0 && (
              <span className={cx("min-w-[18px] h-[18px] px-1 rounded-full text-[10px] font-bold flex items-center justify-center", tab === t.id ? "bg-white text-ink" : "bg-[#EF4444] text-white")}>{badges[t.id] > 99 ? "99+" : badges[t.id]}</span>
            )}
          </button>
        ))}
      </div>
      {tab === "alertas" && <AlertasCriticasTab filtro={filtro} pushToast={pushToast} onCambio={refrescarAlertasBadge} />}
      {tab === "discrepancias" && <DiscrepanciasAuditoriaTab filtro={filtro} adminUser={adminUser} pushToast={pushToast} onCambio={refrescarDiscrepanciasBadge} />}
      {tab === "instructivos" && <InstructivosTab filtro={filtro} onCambio={(data) => setBadge("instructivos", data.filter(r => r.estado === "pendiente" || r.estado === "parcial"))} />}
      {tab === "cambio" && <HojaDeCambioTab filtro={filtro} onCambio={(data) => setBadge("cambio", data)} />}
    </div>
  );
}

                  <div>
                    <p className="font-bold text-[14px]">{c.mecanico ? `${c.mecanico.nombre} ${c.mecanico.apellido || ""}` : "-"} <span className="text-muted font-semibold">· turno {c.turno || 1}</span></p>
                    <p className="text-[12px] text-muted">{c.cerrado ? `Cerrado ${(c.hora_cierre || "").slice(0, 5)}` : `Abierto desde ${(c.hora_inicio || "").slice(0, 5) || "—"}`}</p>
                  </div>
                  <Badge color={c.cerrado ? "gray" : "green"}>{c.cerrado ? "Cerrado" : "Activo"}</Badge>
                </div>
              ))}
              {!cierres.length && <p className="text-[13.5px] text-muted p-4">Sin registros de cierre hoy.</p>}
            </div>
          )}
        </>
      )}
    </div>
  );
}

/* =====================================================================
   ALERTAS (admin)
===================================================================== */
function AlertasAdminView({ empresaCtl, onAbrirMecanico, mecanicosPorId }) {
  const { filtro } = empresaCtl;
  const [alertas, setAlertas] = useState([]);
  const [filter, setFilter] = useState("noleidas");
  const [loading, setLoading] = useState(true);
  const [verAlerta, setVerAlerta] = useState(null);
  const [equiposMap, setEquiposMap] = useState({});
  const [pushToast, toastNode] = useToasts();

  async function cargar() {
    setLoading(true);
    try {
      const data = await adminDb.fetchAlertas(filtro, { soloNoLeidas: filter === "noleidas", soloCriticas: filter === "criticas" });
      setAlertas(data);
      const eqIds = [...new Set(data.map(a => a.equipo_id))].filter(Boolean);
      if (eqIds.length) {
        const { data: eqs } = await sb.from("equipos").select("id_equipo,patente,numero_interno").in("id_equipo", eqIds);
        const map = {}; (eqs || []).forEach(e => { map[e.id_equipo] = e.numero_interno ? `${e.numero_interno} · ${e.patente}` : e.patente; });
        setEquiposMap(map);
      } else setEquiposMap({});
    } catch (e) { console.error(e); }
    setLoading(false);
  }
  useEffect(() => { cargar(); }, [filtro, filter]);

  async function marcarLeida(a) {
    await adminDb.marcarAlertaLeida(a.id);
    setAlertas(as => as.map(x => x.id === a.id ? { ...x, leida_admin: true } : x));
    setVerAlerta(null);
    pushToast("✓ Alerta marcada como leída");
  }

  return (
    <div>
      {toastNode}
      <h1 className="text-[26px] font-extrabold mb-5">Alertas</h1>
      <div className="flex gap-2 mb-5">
        {[["noleidas", "No leídas"], ["criticas", "Críticas"], ["todas", "Todas"]].map(([k, l]) => (
          <button key={k} onClick={() => setFilter(k)} className={cx("px-4 py-2 rounded-full text-[13px] font-bold", filter === k ? "bg-ink text-white" : "bg-[#F3F4F6] text-[#374151]")}>{l}</button>
        ))}
      </div>
      {loading ? <div className="flex justify-center py-10"><span className="spinner" /></div> : (
        <div className="space-y-2">
          {alertas.map(a => (
            <div key={a.id} className="bg-white rounded-2xl border border-bd shadow-card p-4">
              <div className="flex items-start justify-between gap-2">
                <div className="flex-1 min-w-0">
                  <p className="font-bold text-[14px] truncate">{a.titulo}</p>
                  <p className="text-[12.5px] text-muted mt-0.5 line-clamp-2">{a.descripcion}</p>
                  <div className="flex flex-wrap items-center gap-x-3 gap-y-1 mt-2 text-[11.5px] text-muted">
                    <span>{ALERTA_TIPO_LABELS[a.tipo] || a.tipo}</span>
                    {a.equipo_id && equiposMap[a.equipo_id] && <span>{equiposMap[a.equipo_id]}</span>}
                    {a.creado_en && <span>{(a.creado_en).slice(0, 10)} · {(a.creado_en).slice(11, 16)}</span>}
                  </div>
                </div>
                <Badge color={a.severidad === "rojo" ? "red" : a.severidad === "amarillo" ? "amber" : "gray"}>{a.severidad === "rojo" ? "Alerta" : a.severidad === "amarillo" ? "Atención" : "Info"}</Badge>
              </div>
              <div className="flex items-center justify-between gap-2 mt-2.5">
                <div>{!a.leida_admin && <span className="text-[11px] font-bold text-ink">● No leída</span>}</div>
                <div className="flex gap-2">
                  {a.tipo === "solicitud_desbloqueo" && mecanicosPorId[a.mecanico_id] && (
                    <button onClick={() => onAbrirMecanico(mecanicosPorId[a.mecanico_id])} className="text-[12px] font-bold text-white px-3 py-1.5 rounded-full bg-ink">Desbloquear</button>
                  )}
                  {!a.leida_admin && <button onClick={() => marcarLeida(a)} className="text-[12px] font-bold text-ink px-3 py-1.5 rounded-full bg-[#F3F4F6]">Marcar como leída</button>}
                </div>
              </div>
            </div>
          ))}
          {!alertas.length && <p className="text-center text-muted py-10 text-sm">Sin alertas.</p>}
        </div>
      )}
      {verAlerta && <AlertaDetalleModal alerta={verAlerta} onClose={() => setVerAlerta(null)} onMarcarLeida={marcarLeida} />}
    </div>
  );
}

/* =====================================================================
   APP DEL ADMIN
===================================================================== */
function AdminApp({ user, onLogout }) {
  const empresaCtl = useEmpresaFiltro();
  const [view, setView] = useState("dashboard");
  const [mecanicoBloqueado, setMecanicoBloqueado] = useState(null);
  const [alertasNoLeidas, setAlertasNoLeidas] = useState(0);
  const [mecanicosPorId, setMecanicosPorId] = useState({});
  const [refreshToken, setRefreshToken] = useState(0);

  async function refrescarCampanita() {
    try { setAlertasNoLeidas(await adminDb.countAlertasNoLeidasTotal()); } catch (e) {}
  }
  useEffect(() => {
    refrescarCampanita();
    const t = setInterval(refrescarCampanita, 15000);
    return () => clearInterval(t);
  }, []);
  useEffect(() => {
    sb.from("usuarios").select("id,nombre,apellido,cliente_id").eq("rol", "mecanico").then(({ data }) => {
      const map = {}; (data || []).forEach(m => { map[m.id] = m; });
      setMecanicosPorId(map);
    });
  }, []);

  function handleMecanicoDesbloqueado() {
    setMecanicoBloqueado(null);
    refrescarCampanita();
    setRefreshToken(t => t + 1); // fuerza remount + refetch de la vista actual
  }

  let body;
  if (view === "equipos") body = <EquiposView key={refreshToken} empresaCtl={empresaCtl} />;
  else if (view === "jornada") body = <JornadaView key={refreshToken} empresaCtl={empresaCtl} adminUser={user} />;
  else if (view === "maestros") body = <MaestrosView />;
  else if (view === "alertas") body = <AlertasAdminView key={refreshToken} empresaCtl={empresaCtl} onAbrirMecanico={setMecanicoBloqueado} mecanicosPorId={mecanicosPorId} />;
  else if (view === "perfil") body = <PerfilAdminView user={user} onLogout={onLogout} />;
  else body = <DashboardView key={refreshToken} empresaCtl={empresaCtl} onAbrirMecanico={setMecanicoBloqueado} />;

  return (
    <AdminShell view={view} setView={setView} empresaCtl={empresaCtl} alertasNoLeidas={alertasNoLeidas}>
      {body}
      {mecanicoBloqueado && (
        <MecanicoBloqueadoModal mecanico={mecanicoBloqueado} empresas={empresaCtl.empresas}
          onClose={() => setMecanicoBloqueado(null)} onDone={handleMecanicoDesbloqueado} />
      )}
    </AdminShell>
  );
}

/* =====================================================================
   ENTRADA DE LA PAGINA — guarda de sesion (solo rol admin)
===================================================================== */
function AdminPage() {
  const [user, setUser] = useState(null);
  const [checking, setChecking] = useState(true);

  useEffect(() => {
    const cached = getSession();
    if (!cached || cached.rol !== "admin") { location.replace("index.html"); return; }
    db.fetchUsuario(cached.id).then(fresh => {
      if (!fresh || !fresh.activo || fresh.rol !== "admin") { clearSession(); location.replace("index.html"); return; }
      setSession(fresh); setUser(fresh); setChecking(false);
    }).catch(() => { setUser(cached); setChecking(false); }); // sin conexion: seguir con la sesion cacheada
  }, []);

  function handleLogout() { clearSession(); location.href = "index.html"; }

  if (checking || !user) return <div className="min-h-screen flex items-center justify-center"><span className="spinner" /></div>;
  return <AdminApp user={user} onLogout={handleLogout} />;
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<AdminPage />);

if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => { navigator.serviceWorker.register("./sw.js").catch(e => console.error("SW registration failed", e)); });
}
</script>
