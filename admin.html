/* =====================================================================
   MOSA TIRES — kit de UI compartido (JSX). Cargado con Babel en modo
   clásico (sin módulos) antes del script propio de cada página, así que
   todo lo declarado acá (Icon, Button, Card, Modal, BottomNav, hooks...)
   queda disponible como global. Depende de React (CDN) y de
   js/supabase.js (LS, getQueue, db) ya cargados antes que este archivo.
===================================================================== */
const { useState, useEffect, useCallback, createContext, useContext } = React;

/* =====================================================================
   CONTEXTO GLOBAL
===================================================================== */
const AppCtx = createContext(null);
function useApp() { return useContext(AppCtx); }
function useOnline() {
  const [online, setOnline] = useState(navigator.onLine);
  useEffect(() => {
    const on = () => setOnline(true), off = () => setOnline(false);
    window.addEventListener("online", on); window.addEventListener("offline", off);
    return () => { window.removeEventListener("online", on); window.removeEventListener("offline", off); };
  }, []);
  return online;
}
function useQueueCount() {
  const [count, setCount] = useState(getQueue().length);
  useEffect(() => {
    const upd = () => setCount(getQueue().length);
    window.addEventListener("mosa-queue-changed", upd);
    const t = setInterval(upd, 3000);
    return () => { window.removeEventListener("mosa-queue-changed", upd); clearInterval(t); };
  }, []);
  return count;
}
function useAlertasNoLeidas(clienteId, mecanicoId) {
  const [count, setCount] = useState(0);
  const queuePending = useQueueCount();
  useEffect(() => {
    if (!clienteId || !mecanicoId) return;
    let cancel = false;
    const cargar = () => db.fetchAlertas(clienteId, mecanicoId).then(as => { if (!cancel) setCount(as.filter(a => !a.leida_mecanico).length); }).catch(() => {});
    cargar();
    window.addEventListener("mosa-alertas-changed", cargar);
    const t = setInterval(cargar, 15000);
    return () => { cancel = true; window.removeEventListener("mosa-alertas-changed", cargar); clearInterval(t); };
  }, [clienteId, mecanicoId, queuePending]);
  return count;
}

/* =====================================================================
   UI BASICOS
===================================================================== */
function Button({ variant = "primary", className = "", children, ...props }) {
  const base = "h-14 px-5 rounded-2xl font-bold text-[15px] transition active:scale-[0.98] disabled:opacity-50 disabled:active:scale-100 flex items-center justify-center gap-2";
  const variants = {
    primary: "bg-ink text-white",
    ghost: "bg-transparent text-ink border border-bdstrong",
    danger: "bg-[#FEE2E2] text-[#B91C1C]",
    subtle: "bg-[#F3F4F6] text-ink"
  };
  return <button className={cx(base, variants[variant], className)} {...props}>{children}</button>;
}
function Field({ label, required, children, hint }) {
  return (
    <label className="block">
      <span className="block text-[13px] font-semibold text-[#374151] mb-1.5">{label}{required && <span className="text-red-500"> *</span>}</span>
      {children}
      {hint && <span className="block text-xs text-muted mt-1">{hint}</span>}
    </label>
  );
}
function TextInput({ className = "", alert, warn, ...props }) {
  return <input className={cx("w-full h-[52px] px-4 rounded-2xl border bg-[#F3F4F6] border-[#E5E7EB] focus:outline-none focus:ring-2 focus:ring-ink/20 placeholder:text-muted", alert && "field-alert", warn && !alert && "field-warn", className)} {...props} />;
}
function Select({ className = "", children, ...props }) {
  return <select className={cx("w-full h-[52px] px-4 rounded-2xl border bg-[#F3F4F6] border-[#E5E7EB] focus:outline-none focus:ring-2 focus:ring-ink/20", className)} {...props}>{children}</select>;
}
function MarcaSelect({ value, onChange }) {
  const isOtra = value && !MARCAS_NEUMATICOS.slice(0, -1).includes(value);
  const [otra, setOtra] = useState(isOtra ? value : "");
  return (
    <div>
      <Select value={isOtra ? "Otra" : value} onChange={e => { if (e.target.value === "Otra") { onChange(otra); } else { onChange(e.target.value); } }}>
        <option value="">Seleccionar</option>
        {MARCAS_NEUMATICOS.map(m => <option key={m} value={m}>{m}</option>)}
      </Select>
      {isOtra && (
        <TextInput className="mt-2" placeholder="Escribí la marca" value={otra}
          onChange={e => { setOtra(e.target.value); onChange(e.target.value); }} />
      )}
    </div>
  );
}
function TextArea({ className = "", ...props }) {
  return <textarea className={cx("w-full min-h-[90px] px-4 py-3 rounded-2xl border bg-[#F3F4F6] border-[#E5E7EB] focus:outline-none focus:ring-2 focus:ring-ink/20", className)} {...props} />;
}
function Card({ className = "", children }) {
  return <div className={cx("bg-white rounded-card shadow-card border border-bd p-5", className)}>{children}</div>;
}
function Badge({ children, color = "gray" }) {
  const colors = {
    gray: "bg-[#F3F4F6] text-[#374151]", green: "bg-[#DCFCE7] text-[#15803D]",
    red: "bg-[#FEE2E2] text-[#B91C1C]", amber: "bg-[#FEF3C7] text-[#92400E]", black: "bg-ink text-white"
  };
  return <span className={cx("px-3 py-1 rounded-full text-[12px] font-bold", colors[color])}>{children}</span>;
}
function Modal({ title, onClose, children, wide, footer }) {
  return (
    <div className="fixed inset-0 z-50 flex items-end sm:items-center justify-center bg-black/40 p-0 sm:p-4" onClick={(e) => { if (e.target === e.currentTarget && onClose) onClose(); }}>
      <div className={cx("bg-white w-full sm:rounded-card rounded-t-[24px] max-h-[92vh] overflow-y-auto", wide ? "sm:max-w-2xl" : "sm:max-w-md")}>
        <div className="sticky top-0 bg-white border-b border-bd px-5 py-4 flex items-center justify-between z-10">
          <h3 className="text-lg font-extrabold">{title}</h3>
          {onClose && <button onClick={onClose} className="w-9 h-9 rounded-full hover:bg-[#F3F4F6] flex items-center justify-center text-sub"><Icon.close width="18" height="18"/></button>}
        </div>
        <div className="p-5">{children}</div>
        {footer && <div className="sticky bottom-0 bg-white border-t border-bd p-4">{footer}</div>}
      </div>
    </div>
  );
}
function Toast({ msg, onDone }) {
  useEffect(() => { const t = setTimeout(onDone, 2000); return () => clearTimeout(t); }, []);
  return (
    <div className="fixed top-4 left-1/2 -translate-x-1/2 z-[80] px-4 py-3 rounded-2xl shadow-lg text-sm font-semibold flex items-center gap-3" style={{ background: "#DCFCE7", color: "#15803D" }}>
      <span>{msg}</span>
      <button onClick={onDone} className="opacity-60">✕</button>
    </div>
  );
}
function useToasts() {
  const [toasts, setToasts] = useState([]);
  const push = useCallback((msg) => setToasts(t => [...t, { id: uuid(), msg }]), []);
  const remove = (id) => setToasts(t => t.filter(x => x.id !== id));
  const node = <div>{toasts.map(t => <Toast key={t.id} msg={t.msg} onDone={() => remove(t.id)} />)}</div>;
  return [push, node];
}
function Confirm({ title, desc, onConfirm, onCancel }) {
  return (
    <Modal title={title} onClose={onCancel}>
      <p className="text-[14px] text-[#374151] mb-5">{desc}</p>
      <div className="flex gap-3">
        <Button variant="subtle" className="flex-1" onClick={onCancel}>Cancelar</Button>
        <Button className="flex-1" onClick={onConfirm}>Confirmar</Button>
      </div>
    </Modal>
  );
}
function OfflineBadge() {
  const online = useOnline();
  const pending = useQueueCount();
  if (online && pending === 0) return null;
  return (
    <div className="px-4">
      {!online && <div className="mb-2 rounded-xl bg-[#FEE2E2] text-[#B91C1C] text-xs font-bold px-3 py-2 text-center">Sin conexión</div>}
      {pending > 0 && <div className="mb-2 rounded-xl bg-[#FEF3C7] text-[#92400E] text-xs font-bold px-3 py-2 text-center">{pending} registro{pending !== 1 ? "s" : ""} pendiente{pending !== 1 ? "s" : ""} de sincronizar</div>}
    </div>
  );
}

/* =====================================================================
   NAV
===================================================================== */
function BottomNav({ view, setView, disabledExcept, alertasNoLeidas }) {
  const items = [
    { id: "inicio", label: "Inicio", icon: Icon.home },
    { id: "cierre", label: "Cierre", icon: Icon.clipboard },
    { id: "alertas", label: "Alertas", icon: Icon.bell },
    { id: "perfil", label: "Perfil", icon: Icon.user }
  ];
  return (
    <div className="fixed bottom-0 left-0 right-0 bg-white border-t border-bd safe-bottom z-30">
      <div className="flex">
        {items.map(it => {
          const active = view === it.id;
          const disabled = disabledExcept && !disabledExcept.includes(it.id);
          return (
            <button key={it.id} disabled={disabled} onClick={() => setView(it.id)} className={cx("relative flex-1 flex flex-col items-center gap-1 py-2.5", disabled && "opacity-30")}>
              <span className="relative">
                <it.icon width="24" height="24" className={active ? "text-ink" : "text-[#B0B3B8]"} />
                {it.id === "alertas" && alertasNoLeidas > 0 && (
                  <span className="absolute -top-1 -right-2.5 min-w-[16px] h-4 px-1 rounded-full bg-[#EF4444] text-white text-[10px] font-bold flex items-center justify-center">{alertasNoLeidas > 99 ? "99+" : alertasNoLeidas}</span>
                )}
              </span>
              <span className={cx("text-[10.5px] font-semibold", active ? "text-ink" : "text-[#B0B3B8]")}>{it.label}</span>
            </button>
          );
        })}
      </div>
    </div>
  );
}

/* =====================================================================
   EMPRESA (filtro transversal a toda la app del admin)
===================================================================== */
const LS_EMPRESA_FILTRO = "empresa_filtro_admin";
function useEmpresaFiltro() {
  const [empresas, setEmpresas] = useState([]);
  const [filtro, setFiltroState] = useState(() => localStorage.getItem(LS_EMPRESA_FILTRO) || "todas");
  useEffect(() => { sb.from("clientes").select("*").eq("activo", true).order("nombre").then(({ data }) => setEmpresas(data || [])); }, []);
  function setFiltro(v) { localStorage.setItem(LS_EMPRESA_FILTRO, v); setFiltroState(v); }
  const nombreFiltro = filtro === "todas" ? "Todas" : ((empresas.find(e => e.id_cliente === filtro) || {}).nombre || filtro);
  return { empresas, filtro, setFiltro, nombreFiltro };
}
function EmpresaSelector({ empresas, filtro, setFiltro, nombreFiltro }) {
  const [open, setOpen] = useState(false);
  return (
    <div className="relative">
      <button onClick={() => setOpen(o => !o)} className="flex items-center gap-1.5 bg-[#F3F4F6] rounded-full pl-3 pr-2.5 py-2 text-[13px] font-bold">
        <Icon.building width="15" height="15" />
        <span className="max-w-[100px] truncate">{nombreFiltro}</span>
        <Icon.chevronDown width="14" height="14" />
      </button>
      {open && (
        <>
          <div className="fixed inset-0 z-40" onClick={() => setOpen(false)} />
          <div className="absolute left-0 top-full mt-2 w-56 bg-white rounded-2xl border border-bd shadow-card z-50 overflow-hidden">
            <button onClick={() => { setFiltro("todas"); setOpen(false); }} className={cx("w-full text-left px-4 py-3 text-[14px] font-semibold flex items-center gap-2", filtro === "todas" ? "bg-[#F3F4F6]" : "")}>
              <span className={cx("w-3.5 h-3.5 rounded-full border-2", filtro === "todas" ? "border-ink bg-ink" : "border-[#D1D5DB]")} />
              Todas las empresas
            </button>
            {empresas.map(e => (
              <button key={e.id_cliente} onClick={() => { setFiltro(e.id_cliente); setOpen(false); }} className={cx("w-full text-left px-4 py-3 text-[14px] font-semibold flex items-center gap-2", filtro === e.id_cliente ? "bg-[#F3F4F6]" : "")}>
                <span className={cx("w-3.5 h-3.5 rounded-full border-2", filtro === e.id_cliente ? "border-ink bg-ink" : "border-[#D1D5DB]")} />
                {e.nombre}
              </button>
            ))}
          </div>
        </>
      )}
    </div>
  );
}

  const NavList = ({ onPick }) => (

      </div>
      <div className="flex-1 min-w-0">

          const detalle = m.estado === "activo" ? `Activo desde ${(m.turno.hora_inicio || "").slice(0, 5) || "—"}`

const EQUIPO_BADGE_INFO = {
  al_dia: { icon: "✅", label: "Al día", color: "green" },
  atencion: { icon: "⚠", label: "Atención", color: "amber" },
  alertas: { icon: "🔴", label: "Con alertas", color: "red" },
  sin_auditar: { icon: "⚪", label: "Sin auditar", color: "gray" }
};
async function fetchEquiposConEstado(clienteId) {
  let q = sb.from("equipos").select("*").order("numero_interno");
  if (clienteId && clienteId !== "todas") q = q.eq("cliente_id", clienteId);
  const { data: equipos, error } = await q;
  if (error) throw error;
  if (!equipos || !equipos.length) return [];
  const ids = equipos.map(e => e.id_equipo);

  const [{ data: alertas }, { data: auditorias }] = await Promise.all([
    sb.from("alertas").select("equipo_id").eq("severidad", "rojo").eq("leida_admin", false).in("equipo_id", ids),
    sb.from("auditorias").select("id_auditoria,equipo_id,fecha,creado_en").in("equipo_id", ids).order("fecha", { ascending: false }).order("creado_en", { ascending: false })
  ]);

  const alertasPorEquipo = {};
  (alertas || []).forEach(a => { alertasPorEquipo[a.equipo_id] = (alertasPorEquipo[a.equipo_id] || 0) + 1; });

  const auditoriasPorEquipo = {};
  const ultimaAuditoriaPorEquipo = {};
  (auditorias || []).forEach(a => {
    auditoriasPorEquipo[a.equipo_id] = (auditoriasPorEquipo[a.equipo_id] || 0) + 1;
    if (!ultimaAuditoriaPorEquipo[a.equipo_id]) ultimaAuditoriaPorEquipo[a.equipo_id] = a; // primero = mas reciente (orden desc)
  });

  const auditoriaIdsUltimas = Object.values(ultimaAuditoriaPorEquipo).map(a => a.id_auditoria);
  const recetaPorAuditoria = {};
  if (auditoriaIdsUltimas.length) {
    const { data: recetas } = await sb.from("auditorias_receta").select("auditoria_id,estado").in("auditoria_id", auditoriaIdsUltimas);
    (recetas || []).forEach(r => { recetaPorAuditoria[r.auditoria_id] = r.estado; });
  }

  return equipos.map(eq => {
    const alertasCount = alertasPorEquipo[eq.id_equipo] || 0;
    const auditoriasCount = auditoriasPorEquipo[eq.id_equipo] || 0;
    const ultima = ultimaAuditoriaPorEquipo[eq.id_equipo];
    const estadoInstructivo = ultima ? recetaPorAuditoria[ultima.id_auditoria] : null;
    let badge;
    if (alertasCount > 0) badge = "alertas";
    else if (estadoInstructivo === "pendiente" || estadoInstructivo === "parcial") badge = "atencion";
    else if (auditoriasCount === 0) badge = "sin_auditar";
    else badge = "al_dia";
    return { ...eq, badge };
  });
}

const EQUIPOS_FILTROS = [
  { id: "todos", label: "Todos" },
  { id: "tractos", label: "Tractos" },
  { id: "semis", label: "Semis" },
  { id: "alertas", label: "Con alertas" },
  { id: "instructivo_pendiente", label: "Instructivo pendiente" },
  { id: "sin_auditar", label: "Sin auditar" }
];
function aplicaFiltroEquipo(eq, filtroTab) {
  if (filtroTab === "todos") return true;
  if (filtroTab === "tractos") return eq.tipo !== "SEMI";
  if (filtroTab === "semis") return eq.tipo === "SEMI";
  if (filtroTab === "alertas") return eq.badge === "alertas";
  if (filtroTab === "instructivo_pendiente") return eq.badge === "atencion";
  if (filtroTab === "sin_auditar") return eq.badge === "sin_auditar";
  return true;
}

const CONFIG_EJES_OPCIONES = ["4x2", "6x2", "6x4"];
function EquipoModal({ equipo, filtro, empresas, onClose, onSaved, pushToast }) {
  const editando = !!equipo;
  const [numeroInterno, setNumeroInterno] = useState(equipo ? (equipo.numero_interno || "") : "");
  const [patente, setPatente] = useState(equipo ? (equipo.patente || "") : "");
  const [tipo, setTipo] = useState(equipo ? equipo.tipo : "TRACTO");
  const [configEjes, setConfigEjes] = useState(equipo ? (equipo.configuracion_ejes || "4x2") : "4x2");
  const [modelo, setModelo] = useState(equipo ? (equipo.modelo || "") : "");
  const [km, setKm] = useState(equipo ? (equipo.kilometros != null ? String(equipo.kilometros) : "") : "");
  const [clienteId, setClienteId] = useState(equipo ? equipo.cliente_id : (filtro !== "todas" ? filtro : ""));
  const [saving, setSaving] = useState(false);
  const [error, setError] = useState("");

  async function guardar() {
    setError("");
    if (!numeroInterno.trim() || !patente.trim()) { setError("Número interno y patente son obligatorios."); return; }
    if (!clienteId) { setError("Elegí una empresa."); return; }
    setSaving(true);
    try {
      let q = sb.from("equipos").select("id_equipo").eq("cliente_id", clienteId).eq("numero_interno", numeroInterno.trim());
      if (editando) q = q.neq("id_equipo", equipo.id_equipo);
      const { data: dup } = await q;
      if (dup && dup.length) { setError("Ya existe un equipo con ese número interno en esta empresa."); setSaving(false); return; }

      const payload = {
        numero_interno: numeroInterno.trim(), patente: patente.trim().toUpperCase(), tipo,
        configuracion_ejes: tipo === "TRACTO" ? configEjes : null,
        modelo: modelo.trim() || null, kilometros: km ? parseInt(km, 10) : 0
      };
      if (editando) {
        const { error: e } = await sb.from("equipos").update(payload).eq("id_equipo", equipo.id_equipo);
        if (e) throw e;
        pushToast("✓ Equipo actualizado");
      } else {
        const { error: e } = await sb.from("equipos").insert({ ...payload, id_equipo: uuid(), cliente_id: clienteId, activo: true });
        if (e) throw e;
        pushToast("✓ Equipo creado");
      }
      onSaved();
    } catch (e) {
      console.error("No se pudo guardar el equipo", e);
      setError(e.message && e.message.includes("duplicate") ? "Ya existe un equipo con ese número interno." : "No se pudo guardar. Intentá de nuevo.");
    }
    setSaving(false);
  }

  return (
    <Modal title={editando ? "Editar equipo" : "Nuevo equipo"} onClose={onClose}>
      <div className="space-y-4">
        {!editando && (
          <Field label="Empresa" required>
            <Select value={clienteId} onChange={e => setClienteId(e.target.value)}>
              <option value="">Seleccionar</option>
              {empresas.map(e => <option key={e.id_cliente} value={e.id_cliente}>{e.nombre}</option>)}
            </Select>
          </Field>
        )}
        <Field label="Número interno" required>
          <TextInput value={numeroInterno} onChange={e => setNumeroInterno(e.target.value)} placeholder="Ej: 119" />
        </Field>
        <Field label="Patente" required>
          <TextInput value={patente} onChange={e => setPatente(e.target.value)} placeholder="Ej: AH771HG" />
        </Field>
        <Field label="Tipo" required>
          <div className="flex gap-2">
            {["TRACTO", "SEMI"].map(t => (
              <button key={t} type="button" onClick={() => setTipo(t)}
                className={cx("flex-1 h-11 rounded-2xl text-[13.5px] font-bold", tipo === t ? "bg-ink text-white" : "bg-[#F3F4F6] text-[#374151]")}>
                {t === "TRACTO" ? "Tracto" : "Semi"}
              </button>
            ))}
          </div>
        </Field>
        {tipo === "TRACTO" && (
          <Field label="Configuración de ejes" required>
            <div className="flex gap-2">
              {CONFIG_EJES_OPCIONES.map(c => (
                <button key={c} type="button" onClick={() => setConfigEjes(c)}
                  className={cx("flex-1 h-11 rounded-2xl text-[13.5px] font-bold", configEjes === c ? "bg-ink text-white" : "bg-[#F3F4F6] text-[#374151]")}>{c}</button>
              ))}
            </div>
          </Field>
        )}
        <Field label="Modelo"><TextInput value={modelo} onChange={e => setModelo(e.target.value)} placeholder="Ej: SCANIA R500 6X4" /></Field>
        <Field label="Km iniciales"><TextInput type="number" inputMode="numeric" value={km} onChange={e => setKm(e.target.value.replace(/[^0-9]/g, ""))} placeholder="0" /></Field>
        {error && <p className="text-[12.5px] font-bold text-[#B91C1C]">{error}</p>}
        <Button className="w-full" disabled={saving} onClick={guardar}>{saving ? <span className="spinner" /> : (editando ? "Guardar cambios" : "Crear equipo")}</Button>
      </div>
    </Modal>
  );
}

  const [equipos, setEquipos] = useState([]);
  const [search, setSearch] = useState("");
  const [filtroTab, setFiltroTab] = useState("todos");
  const [loading, setLoading] = useState(true);
  const [detalle, setDetalle] = useState(null);
  const [modalEquipo, setModalEquipo] = useState(undefined); // undefined=cerrado, null=nuevo, {..}=editar
  const [pushToast, toastNode] = useToasts();
  const puedeGestionar = adminUser && (adminUser.rol === "admin" || adminUser.rol === "superadmin");

  function cargar() {
    setLoading(true);
    fetchEquiposConEstado(filtro).then(data => { setEquipos(data); setLoading(false); }).catch(e => { console.error("No se pudo cargar equipos", e); setLoading(false); });
  }
  useEffect(() => { cargar(); }, [filtro]);

  const filtrados = equipos.filter(eq => {
    if (!aplicaFiltroEquipo(eq, filtroTab)) return false;
    if (!search) return true;
    const s = search.toLowerCase();
    return (eq.patente || "").toLowerCase().includes(s) || (eq.numero_interno || "").toLowerCase().includes(s);
  });

  async function toggleActivo(eq) {
    try {
      await sb.from("equipos").update({ activo: !eq.activo }).eq("id_equipo", eq.id_equipo);
      setEquipos(es => es.map(x => x.id_equipo === eq.id_equipo ? { ...x, activo: !eq.activo } : x));
      pushToast(eq.activo ? "✓ Equipo desactivado" : "✓ Equipo activado");
    } catch (e) { console.error("No se pudo cambiar el estado del equipo", e); }
  }

  if (detalle) return <EquipoDetalleView equipo={detalle} onBack={() => setDetalle(null)} />;

  return (
    <div>
      {toastNode}
      <div className="flex items-center justify-between gap-3 mb-5 flex-wrap">
        <h1 className="text-[26px] font-extrabold">Equipos</h1>
        <Button className="h-11 px-4 text-[13.5px]" onClick={() => setModalEquipo(null)}>+ Nuevo equipo</Button>
      </div>
      <TextInput placeholder="Buscar por patente o número interno" value={search} onChange={e => setSearch(e.target.value)} className="mb-4 max-w-md" />
      <div className="flex gap-2 mb-5 overflow-x-auto">
        {EQUIPOS_FILTROS.map(f => (
          <button key={f.id} onClick={() => setFiltroTab(f.id)}
            className={cx("px-4 py-2 rounded-full text-[13px] font-bold whitespace-nowrap", filtroTab === f.id ? "bg-ink text-white" : "bg-[#F3F4F6] text-[#374151]")}>{f.label}</button>
        ))}
      </div>
      {loading ? <div className="flex justify-center py-10"><span className="spinner" /></div> : (
        <div className="grid sm:grid-cols-2 lg:grid-cols-3 gap-3">
          {filtrados.map(eq => {
            const b = !eq.activo ? { icon: "⚪", label: "Inactivo", color: "gray" } : (EQUIPO_BADGE_INFO[eq.badge] || EQUIPO_BADGE_INFO.sin_auditar);
            return (
              <Card key={eq.id_equipo} className={cx("relative h-full", !eq.activo && "opacity-60")}>
                <div className="absolute top-4 right-4"><Badge color={b.color}>{b.icon} {b.label}</Badge></div>
                <button onClick={() => setDetalle(eq)} className="text-left block w-full">
                  <p className="font-bold text-[15px] pr-28">{eq.numero_interno ? `${eq.numero_interno} · ` : ""}{eq.patente}</p>
                  <p className="text-[12.5px] text-muted mt-1">{eq.tipo === "SEMI" ? "Semirremolque" : `Tracto ${eq.configuracion_ejes || ""}`} · {eq.modelo || "-"}</p>
                  <p className="text-[12px] text-muted mt-1">{eq.kilometros ? `${eq.kilometros.toLocaleString()} km` : "Sin km registrados"}</p>
                </button>
                {puedeGestionar && (
                  <div className="flex items-center gap-2 mt-3 pt-3 border-t border-bd">
                    <button onClick={() => setModalEquipo(eq)} className="w-8 h-8 rounded-full bg-[#F3F4F6] flex items-center justify-center"><Icon.pencil width="14" height="14" /></button>
                    <button onClick={() => toggleActivo(eq)} className="text-[12px] font-bold text-ink px-3 py-1.5 rounded-full bg-[#F3F4F6] ml-auto">{eq.activo ? "Desactivar" : "Activar"}</button>
                  </div>
                )}
              </Card>
            );
          })}
          {!filtrados.length && <p className="text-[13.5px] text-muted py-6 col-span-full text-center">No hay equipos que coincidan.</p>}
        </div>
      )}
      {modalEquipo !== undefined && (
        <EquipoModal equipo={modalEquipo} filtro={filtro} empresas={empresas} pushToast={pushToast}
          onClose={() => setModalEquipo(undefined)} onSaved={() => { setModalEquipo(undefined); cargar(); }} />
      )}
    </div>
  );
}

function TireCircleReadOnly({ pos, filled, status, mm, psi, selected, onTap }) {
  const styles = {
    empty: "border-2 border-dashed border-[#D1D5DB] bg-[#F9FAFB] text-muted",
    ok: "border-2 border-[#D1D5DB] bg-white text-ink",
    atencion: "border-2 border-[#F59E0B] bg-[#FEF3C7] text-[#92400E]",
    alerta: "border-2 border-[#EF4444] bg-[#FEE2E2] text-[#B91C1C]"
  };
  const key = !filled ? "empty" : (status || "ok");
  return (
    <button type="button" disabled={!filled} onClick={onTap}
      className={cx("w-[54px] h-[54px] rounded-full flex flex-col items-center justify-center shrink-0 shadow-sm transition",
        styles[key], selected && "ring-2 ring-ink")}>
      <span className="text-[9.5px] font-bold opacity-70 leading-none">P{pos}</span>
      {filled ? (
        <>
          <span className="text-[13px] font-extrabold leading-none mt-0.5">{mm != null ? mm : "—"}</span>
          <span className="text-[8.5px] font-semibold opacity-70 leading-none">{psi ? psi + "psi" : ""}</span>
        </>
      ) : <span className="text-[11px] font-bold text-[#D1D5DB] mt-0.5">— —</span>}
    </button>

}
function AxleMapReadOnly({ cfg, porPosicion, colorDePosicion, selectedPos, onTap }) {
  return (
    <div className="space-y-6">
      {cfg.rows.map(row => (
        <div key={row.label} className={cx("relative", row.type === "auxilio" && "mt-4 pt-4 border-t border-dashed border-bdstrong")}>
          <div className="flex items-center gap-3">
            <span className="text-[12px] font-bold text-muted w-6 shrink-0">{row.label}</span>
            <div className="flex-1 relative flex items-center justify-around">
              <div className="absolute left-0 right-0 h-[1.5px] bg-[#E5E7EB]" />
              {row.positions.map(pos => {
                const n = porPosicion[pos];
                const color = colorDePosicion(pos);
                const mm = n && n.aud ? (n.aud.milimetros != null ? n.aud.milimetros : n.aud.mm_centro) : null;
                const psi = n ? (n.psi_actual != null ? n.psi_actual : (n.aud ? n.aud.psi : null)) : null;
                return (
                  <div key={pos} className="relative z-10">
                    <TireCircleReadOnly pos={pos} filled={!!n} status={color} mm={mm} psi={psi}
                      selected={selectedPos === pos} onTap={() => onTap(pos)} />
                  </div>
                );
              })}
            </div>
          </div>
        </div>
      ))}
    </div>
  );
}
function MapaEquipoTab({ equipo }) {
  const [posiciones, setPosiciones] = useState(null);
  const [verPos, setVerPos] = useState(null);

  useEffect(() => {
    let cancel = false;
    (async () => {
      const { data: neumaticos } = await sb.from("neumaticos").select("*").eq("equipo_actual", equipo.id_equipo).eq("estado_actual", "en_uso");
      const numerosFuego = (neumaticos || []).map(n => n.numero_fuego).filter(Boolean);
      const mmPorFuego = {};
      if (numerosFuego.length) {
        const { data: ultimaAud } = await sb.from("auditorias").select("id_auditoria").eq("equipo_id", equipo.id_equipo).order("fecha", { ascending: false }).order("creado_en", { ascending: false }).limit(1);
        if (ultimaAud && ultimaAud[0]) {
          const { data: posAud } = await sb.from("auditoria_posiciones").select("numero_fuego,milimetros,psi,mm_borde_izq,mm_centro,mm_borde_der").eq("auditoria_id", ultimaAud[0].id_auditoria).in("numero_fuego", numerosFuego);
          (posAud || []).forEach(p => { mmPorFuego[p.numero_fuego] = p; });
        }
      }
      if (!cancel) setPosiciones((neumaticos || []).map(n => ({ ...n, aud: mmPorFuego[n.numero_fuego] || null })));
    })();
    return () => { cancel = true; };
  }, [equipo.id_equipo]);

  if (!equipo.configuracion_ejes && equipo.tipo !== "SEMI") {
    return <p className="text-[13.5px] text-muted py-6">Configuración de ejes no definida</p>;
  }
  if (posiciones === null) return <div className="flex justify-center py-10"><span className="spinner" /></div>;

  const cfg = axleConfigFor(equipo);
  const porPosicion = {};
  posiciones.forEach(p => { porPosicion[p.posicion_actual] = p; });

  function colorDePosicion(pos) {
    const n = porPosicion[pos];
    if (!n) return "empty";
    const data = {
      psi: n.psi_actual != null ? n.psi_actual : (n.aud ? n.aud.psi : null),
      mm_borde_izq: n.aud ? n.aud.mm_borde_izq : null,
      mm_centro: n.aud ? (n.aud.mm_centro != null ? n.aud.mm_centro : n.aud.milimetros) : null,
      mm_borde_der: n.aud ? n.aud.mm_borde_der : null
    };
    const ev = evaluarPosicion(cfg, DEFAULT_CFG, pos, equipo.tipo, data);
    return ev.status;
  }

  return (
    <div>
      <Card>
        <p className="text-[12.5px] text-muted mb-4">Tocá un neumático para verlo. Solo lectura — sin arrastre.</p>
        <AxleMapReadOnly cfg={cfg} porPosicion={porPosicion} colorDePosicion={colorDePosicion}
          selectedPos={verPos} onTap={(pos) => porPosicion[pos] && setVerPos(pos)} />
      </Card>
      <div className="flex gap-4 mt-5 text-[12px] text-muted flex-wrap px-1">
        <span className="flex items-center gap-1.5"><span className="w-3 h-3 rounded-full border-2 border-[#D1D5DB] bg-white inline-block" /> En rango</span>
        <span className="flex items-center gap-1.5"><span className="w-3 h-3 rounded-full border-2 border-[#F59E0B] bg-[#FEF3C7] inline-block" /> Atención</span>
        <span className="flex items-center gap-1.5"><span className="w-3 h-3 rounded-full border-2 border-[#EF4444] bg-[#FEE2E2] inline-block" /> Crítico</span>
        <span className="flex items-center gap-1.5"><span className="w-3 h-3 rounded-full border-2 border-dashed border-[#D1D5DB] bg-[#F9FAFB] inline-block" /> Sin neumático</span>
      </div>
      {verPos != null && porPosicion[verPos] && <PosicionDetalleModal n={porPosicion[verPos]} pos={verPos} onClose={() => setVerPos(null)} />}
    </div>
  );
}

function InstructivoEquipoTab({ receta }) {

        {extras.map((t, i) => <p key={i} className={cx("text-[13.5px]", t.done ? "text-[#15803D]" : "text-[#92400E]")}>➕ {t.texto} {t.done ? "✅" : "⏳"} <span className="text-muted">(extra)</span></p>)}

const HISTORIAL_ICONS = { auditoria: "📋", cambio: "🔄", intervencion: "⚙" };
function HistorialEquipoTab({ equipo }) {
  const [items, setItems] = useState(null);

  useEffect(() => {
    let cancel = false;
    (async () => {
      const [{ data: auds }, { data: cams }, { data: ivs }] = await Promise.all([
        sb.from("auditorias").select("id_auditoria,fecha,numero_auditoria,creado_en").eq("equipo_id", equipo.id_equipo),
        sb.from("cambios_neumaticos").select("id_cambio,fecha,numero_cambio,creado_en").eq("equipo_id", equipo.id_equipo),
        sb.from("intervenciones").select("id,fecha,tipo,posicion,creado_en").eq("equipo_id", equipo.id_equipo)
      ]);
      const rows = [
        ...(auds || []).map(a => ({ tipo: "auditoria", fecha: a.fecha, desc: `Auditoría N°${a.numero_auditoria}`, creado_en: a.creado_en })),
        ...(cams || []).map(c => ({ tipo: "cambio", fecha: c.fecha, desc: `Hoja de cambio N°${c.numero_cambio}`, creado_en: c.creado_en })),
        ...(ivs || []).map(v => ({ tipo: "intervencion", fecha: v.fecha, desc: `${v.tipo}${v.posicion != null ? " pos " + v.posicion : ""}`, creado_en: v.creado_en }))
      ].sort((a, b) => (b.creado_en || "").localeCompare(a.creado_en || "")).slice(0, 20);
      if (!cancel) setItems(rows);
    })();
    return () => { cancel = true; };
  }, [equipo.id_equipo]);

  function exportarExcel() {
    const filas = (items || []).map(it => ({
      Tipo: it.tipo === "auditoria" ? "Auditoría" : it.tipo === "cambio" ? "Hoja de cambio" : "Intervención",
      Fecha: it.fecha || "", Descripción: it.desc, "Fecha y hora": it.creado_en || ""
    }));
    const ws = XLSX.utils.json_to_sheet(filas);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Historial");
    XLSX.writeFile(wb, `historial_${(equipo.patente || equipo.id_equipo)}.xlsx`);
  }

  if (items === null) return <div className="flex justify-center py-10"><span className="spinner" /></div>;

  return (
    <div>
      <div className="flex justify-end mb-4">
        <Button variant="subtle" className="h-10 px-4 text-[13px]" disabled={!items.length} onClick={exportarExcel}>📊 Exportar a Excel</Button>
      </div>
      <div className="space-y-0">
        {items.map((it, i) => (
          <div key={i} className="flex gap-3">
            <div className="flex flex-col items-center">
              <div className="w-8 h-8 rounded-full bg-[#F3F4F6] flex items-center justify-center shrink-0 text-[14px]">{HISTORIAL_ICONS[it.tipo] || "•"}</div>
              {i < items.length - 1 && <div className="w-px flex-1 bg-bd" />}
            </div>
            <div className="flex-1 pb-4">
              <p className="font-semibold text-[13.5px]">{it.desc}</p>
              <p className="text-[11.5px] text-muted mt-0.5">{it.fecha ? formatDateLong(it.fecha) : ""}{it.creado_en ? ` · ${it.creado_en.slice(11, 16)}` : ""}</p>
            </div>
          </div>
        ))}
        {!items.length && <p className="text-[13.5px] text-muted py-6 text-center">Sin historial registrado.</p>}
      </div>
    </div>
  );
}

const EQUIPO_DETALLE_TABS_BASE = [
  { id: "info", label: "Info" },
  { id: "mapa", label: "Mapa" },
  { id: "historial", label: "Historial" }
];
function EquipoDetalleView({ equipo, onBack }) {
  const [tab, setTab] = useState("info");
  const [ultimaAuditoria, setUltimaAuditoria] = useState(undefined); // undefined=cargando, null=sin auditorías
  const [instructivoPendiente, setInstructivoPendiente] = useState(undefined);

  useEffect(() => {
    let cancel = false;
    sb.from("auditorias").select("id_auditoria,fecha,numero_auditoria,creado_en").eq("equipo_id", equipo.id_equipo)
      .order("fecha", { ascending: false }).order("creado_en", { ascending: false }).limit(1)
      .then(({ data }) => { if (!cancel) setUltimaAuditoria((data && data[0]) || null); });
    return () => { cancel = true; };
  }, [equipo.id_equipo]);

  useEffect(() => {
    let cancel = false;
    (async () => {
      const { data: auds } = await sb.from("auditorias").select("id_auditoria,fecha").eq("equipo_id", equipo.id_equipo).order("fecha", { ascending: false });
      if (!auds || !auds.length) { if (!cancel) setInstructivoPendiente(null); return; }
      const ids = auds.map(a => a.id_auditoria);
      const { data: recetas } = await sb.from("auditorias_receta").select("*").in("auditoria_id", ids).in("estado", ["pendiente", "parcial"]);
      if (!recetas || !recetas.length) { if (!cancel) setInstructivoPendiente(null); return; }
      const audMap = {}; auds.forEach(a => { audMap[a.id_auditoria] = a; });
      recetas.sort((a, b) => ((audMap[b.auditoria_id] || {}).fecha || "").localeCompare((audMap[a.auditoria_id] || {}).fecha || ""));
      const top = recetas[0];
      if (!cancel) setInstructivoPendiente({ ...top, fecha: audMap[top.auditoria_id] ? audMap[top.auditoria_id].fecha : null });
    })();
    return () => { cancel = true; };
  }, [equipo.id_equipo]);

  const tabs = [...EQUIPO_DETALLE_TABS_BASE];
  if (instructivoPendiente) tabs.splice(2, 0, { id: "instructivo", label: "Instructivo" });

  return (
    <div>
      <button onClick={onBack} className="flex items-center gap-2 text-[13.5px] font-bold text-muted mb-4"><Icon.back width="15" height="15" /> Equipos</button>
      <h1 className="text-[26px] font-extrabold mb-1">{equipo.numero_interno ? `${equipo.numero_interno} · ` : ""}{equipo.patente}</h1>
      <p className="text-[13px] text-muted mb-5">{equipo.tipo === "SEMI" ? "Semirremolque" : `Tracto ${equipo.configuracion_ejes || ""}`} · {equipo.modelo || "-"}</p>

      <div className="flex gap-2 mb-5 overflow-x-auto">
        {tabs.map(t => (
          <button key={t.id} onClick={() => setTab(t.id)}
            className={cx("px-4 py-2 rounded-full text-[13px] font-bold whitespace-nowrap", tab === t.id ? "bg-ink text-white" : "bg-[#F3F4F6] text-[#374151]")}>{t.label}</button>
        ))}
      </div>

      {tab === "info" && <InfoEquipoTab equipo={equipo} ultimaAuditoria={ultimaAuditoria} />}
      {tab === "mapa" && <MapaEquipoTab equipo={equipo} />}
      {tab === "instructivo" && instructivoPendiente && <InstructivoEquipoTab receta={instructivoPendiente} />}
      {tab === "historial" && <HistorialEquipoTab equipo={equipo} />}
    </div>
  );
}

    setLoading(true);

        check ? fetchHerramientasCheck(check.id) : Promise.resolve([]),
        fetchDiscrepanciasPendientes(mecanico.id, todayISO())
      ]);
      setStock(stk); setHerramientas(herr); setDiscrepancias(disc);
    } catch (e) { console.error("No se pudo cargar el detalle del check diario", e); }
    setLoading(false);

    await resolverDiscrepancia(d, aprobar, justificacion, adminUser.id);
    setDiscrepancias(ds => ds.filter(x => x.id !== d.id));

          <div>
            <p className="text-[13px] text-muted">Empresa: {empresaNombre}</p>
            <p className="text-[13px] text-muted">Fecha: {formatDateLong(todayISO())}{check ? ` · Hora inicio: ${(check.hora_inicio || "").slice(0, 5)}` : ""}</p>

            <p className="text-[13.5px] text-muted">Todavía no completó el check diario de hoy.</p>

              <div>
                <p className="font-bold text-[14.5px] mb-2">Conteo de neumáticos</p>
                <div className="overflow-x-auto -mx-1">

                    <thead>

                        <th className="font-semibold pb-2 px-1">Tipo</th>
                        <th className="font-semibold pb-2 px-1 text-right">Sistema</th>
                        <th className="font-semibold pb-2 px-1 text-right">Físico</th>
                        <th className="font-semibold pb-2 px-1 text-right">Diferencia</th>
                      </tr>
                    </thead>
                    <tbody>
                      {CONTEO_ROWS.map(r => {
                        const sistema = stock ? stock[r.bodega] : null;
                        const fisico = check[r.campo] != null ? check[r.campo] : 0;
                        const diff = sistema != null ? fisico - sistema : null;
                        return (
                          <tr key={r.label} className="border-t border-bd">
                            <td className="py-2 px-1 font-semibold">{r.label}</td>
                            <td className="py-2 px-1 text-right">{sistema != null ? sistema : "—"}</td>
                            <td className="py-2 px-1 text-right">{fisico}</td>
                            <td className="py-2 px-1 text-right font-bold">{diff == null ? "—" : diff === 0 ? "✅ 0" : `🔴 ${diff > 0 ? "+" : ""}${diff}`}</td>

                        <tr key={r.label} className="border-t border-bd">
                          <td className="py-2 px-1 font-semibold">{r.label}</td>
                          <td className="py-2 px-1 text-right text-muted">—</td>
                          <td className="py-2 px-1 text-right">{check[r.campo] != null ? check[r.campo] : 0}</td>

function InicioDelDiaView({ empresaCtl, adminUser, pushToast }) {
  const { filtro, empresas } = empresaCtl;
  const [lista, setLista] = useState([]);
  const [stats, setStats] = useState({ pendientes: 0, resueltas: 0 });
  const [loading, setLoading] = useState(true);
  const [verMecanico, setVerMecanico] = useState(null);

  async function cargar() {
    setLoading(true);
    try {
      const [data, pendientes, resueltas] = await Promise.all([
        fetchInicioDelDia(filtro), countDiscrepanciasPendientes(filtro), countDiscrepanciasResueltasHoy(filtro)
      ]);
      setLista(data);
      setStats({ pendientes, resueltas });
    } catch (e) { console.error("No se pudo cargar el inicio del día", e); }
    setLoading(false);
  }
  useEffect(() => { cargar(); }, [filtro]);

  const completados = lista.filter(m => m.check && m.check.completado).length;

  if (loading) return <div className="flex justify-center py-10"><span className="spinner" /></div>;

  return (
    <div>
      <div className="bg-white rounded-2xl border border-bd shadow-card overflow-hidden mb-5">
        {lista.map((m, i) => {
          const done = m.check && m.check.completado;
          return (
            <button key={m.id} onClick={() => done && setVerMecanico(m)}
              className={cx("w-full flex items-center justify-between px-4 py-3 text-left", i > 0 && "border-t border-bd", !done && "cursor-default")}>
              <div className="flex items-center gap-2">
                <span>{done ? "✅" : "⏳"}</span>
                <div>
                  <p className="font-bold text-[14px]">{m.nombre} {m.apellido || ""}</p>
                  <p className="text-[12px] text-muted">{done ? `Completó ${(m.check.hora_inicio || "").slice(0, 5)}` : "Sin completar"}</p>
                </div>
              </div>
              {done && <span className="text-[12px] font-bold text-ink shrink-0">Ver detalle</span>}
            </button>
          );
        })}
        {!lista.length && <p className="text-[13.5px] text-muted p-4">No hay mecánicos para esta empresa.</p>}
      </div>

      <div className="grid grid-cols-3 gap-3">
        <KpiCard label={`Completaron el check`} value={`${completados}/${lista.length}`} />
        <KpiCard label="Discrepancias pendientes" value={stats.pendientes} />
        <KpiCard label="Resueltas hoy" value={stats.resueltas} />
      </div>

      {verMecanico && (
        <DetalleCheckModal mecanico={verMecanico} filtro={filtro} empresas={empresas} adminUser={adminUser}
          onClose={() => setVerMecanico(null)} pushToast={pushToast} onResuelto={cargar} />
      )}
    </div>
  );
}

        const [alertas, discrepancias, instructivos, cambio] = await Promise.all([
          fetchAlertasCriticasHoy(filtro), fetchDiscrepanciasAuditoriaHoy(filtro),
          fetchInstructivosHoy(filtro), fetchMovimientosEnVivoHoy(filtro)
        ]);
        setBadges({
          alertas: alertas.length, discrepancias: discrepancias.length,
          instructivos: instructivos.filter(r => r.estado === "pendiente" || r.estado === "parcial").length,
          cambio: cambio.length
        });
      } catch (e) { console.error("No se pudieron precargar los badges de Movimientos del día", e); }
    })();
  }, [filtro]);

  function setBadge(key, list) { setBadges(b => ({ ...b, [key]: list.length })); }
  async function refrescarAlertasBadge() { try { setBadge("alertas", await fetchAlertasCriticasHoy(filtro)); } catch (e) {} }
  async function refrescarDiscrepanciasBadge() { try { setBadge("discrepancias", await fetchDiscrepanciasAuditoriaHoy(filtro)); } catch (e) {} }

  if (checking) return <div className="flex justify-center py-10"><span className="spinner" /></div>;
  if (sinActividad) return <p className="text-[13.5px] text-muted py-6 text-center">Sin actividad hoy en esta empresa</p>;

  return (
    <div>
      {toastNode}
      <div className="flex gap-2 mb-5 overflow-x-auto">
        {MOVIMIENTOS_TABS.map(t => (
          <button key={t.id} onClick={() => setTab(t.id)}
            className={cx("px-4 py-2 rounded-full text-[13px] font-bold whitespace-nowrap flex items-center gap-1.5", tab === t.id ? "bg-ink text-white" : "bg-[#F3F4F6] text-[#374151]")}>
            <span>{t.icon}</span>{t.label}
            {badges[t.id] != null && badges[t.id] > 0 && (
              <span className={cx("min-w-[18px] h-[18px] px-1 rounded-full text-[10px] font-bold flex items-center justify-center", tab === t.id ? "bg-white text-ink" : "bg-[#EF4444] text-white")}>{badges[t.id] > 99 ? "99+" : badges[t.id]}</span>
            )}
          </button>
        ))}
      </div>
      {tab === "alertas" && <AlertasCriticasTab filtro={filtro} pushToast={pushToast} onCambio={refrescarAlertasBadge} />}
      {tab === "discrepancias" && <DiscrepanciasAuditoriaTab filtro={filtro} adminUser={adminUser} pushToast={pushToast} onCambio={refrescarDiscrepanciasBadge} />}
      {tab === "instructivos" && <InstructivosTab filtro={filtro} onCambio={(data) => setBadge("instructivos", data.filter(r => r.estado === "pendiente" || r.estado === "parcial"))} />}
      {tab === "cambio" && <HojaDeCambioTab filtro={filtro} onCambio={(data) => setBadge("cambio", data)} />}
    </div>
  );
}

/* =====================================================================
   JORNADA (3 bloques: inicio del dia, movimientos del dia, cierre del dia)
===================================================================== */
function monthStartISO() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}-01`;
}
async function fetchStatsCierreMes(clienteId) {
  let q = sb.from("cierre_dia").select("cerrado,motivo_sin_cierre").gte("fecha", monthStartISO()).lte("fecha", todayISO());
  q = filtroCliente(q, clienteId);
  const { data, error } = await q;
  if (error) throw error;
  const total = (data || []).length;
  const correctos = (data || []).filter(c => c.cerrado && !c.motivo_sin_cierre).length;
  return { total, correctos, pct: total ? Math.round((correctos / total) * 100) : 0 };
}
function calcDuracion(inicio, cierre) {
  if (!inicio || !cierre) return "—";
  const [h1, m1] = inicio.split(":").map(Number);
  const [h2, m2] = cierre.split(":").map(Number);
  let mins = (h2 * 60 + m2) - (h1 * 60 + m1);
  if (mins < 0) mins += 24 * 60;
  return `${Math.floor(mins / 60)}h ${mins % 60}min`;
}
function CierreEstadoInfo(c) {
  if (!c.cerrado) return { icon: "⏳", label: `Jornada abierta${c.hora_inicio ? ` desde ${c.hora_inicio.slice(0, 5)}` : ""}` };
  if (c.motivo_sin_cierre === "olvido_cierre") return { icon: "✅", label: `Cerró ${(c.hora_cierre || "").slice(0, 5)}`, badge: "Cerró al día siguiente" };
  if (c.motivo_sin_cierre) return { icon: "⚠", label: `Cerró sin completar check (${c.motivo_sin_cierre})` };
  return { icon: "✅", label: `Cerró ${(c.hora_cierre || "").slice(0, 5)}` };
}

function MecanicoMaestroModal({ mecanico, filtro, empresas, onClose, onSaved, pushToast }) {
  const editando = !!mecanico;
  const [nombre, setNombre] = useState(mecanico ? (mecanico.nombre || "") : "");
  const [apellido, setApellido] = useState(mecanico ? (mecanico.apellido || "") : "");
  const [telefono, setTelefono] = useState(mecanico ? (mecanico.telefono || "") : "");
  const [email, setEmail] = useState(mecanico ? (mecanico.email || "") : "");
  const [usuario, setUsuario] = useState(mecanico ? (mecanico.usuario || "") : "");
  const [password, setPassword] = useState("");
  const [clienteId, setClienteId] = useState(mecanico ? mecanico.cliente_id : (filtro !== "todas" ? filtro : ""));
  const [saving, setSaving] = useState(false);
  const [error, setError] = useState("");

  async function guardar() {
    setError("");
    if (!nombre.trim() || !usuario.trim()) { setError("Nombre y usuario son obligatorios."); return; }
    if (!editando && !password.trim()) { setError("La contraseña es obligatoria al crear un mecánico."); return; }
    if (!clienteId) { setError("Elegí una empresa."); return; }
    setSaving(true);
    try {
      let q = sb.from("usuarios").select("id").eq("usuario", usuario.trim());
      if (editando) q = q.neq("id", mecanico.id);
      const { data: dup } = await q;
      if (dup && dup.length) { setError("Ya existe un usuario con ese nombre de usuario."); setSaving(false); return; }

      const payload = { nombre: nombre.trim(), apellido: apellido.trim() || null, telefono: telefono.trim() || null, email: email.trim() || null, usuario: usuario.trim(), cliente_id: clienteId };
      if (password.trim()) payload.password_hash = await sha256Hex(password.trim());
      if (editando) {
        const { error: e } = await sb.from("usuarios").update(payload).eq("id", mecanico.id);
        if (e) throw e;
        pushToast("✓ Mecánico actualizado");
      } else {
        const { error: e } = await sb.from("usuarios").insert({ ...payload, id: uuid(), rol: "mecanico", activo: true });
        if (e) throw e;
        pushToast("✓ Mecánico creado");
      }
      onSaved();
    } catch (e) { console.error("No se pudo guardar el mecánico", e); setError("No se pudo guardar. Intentá de nuevo."); }
    setSaving(false);
  }

  return (
    <Modal title={editando ? "Editar mecánico" : "Nuevo mecánico"} onClose={onClose}>

    if (!cant || cant <= 0) { setError("La cantidad debe ser mayor a 0."); return; }
    if (!numeroDoc.trim()) { setError("El N° de documento es obligatorio."); return; }
    if (!filtro || filtro === "todas") { setError("Elegí una empresa específica en el selector de arriba."); return; }
    setSaving(true);
    try {
      const loteId = uuid();
      const pu = precioUnit ? parseFloat(precioUnit) : 0;
      const pt = precioTotal ? parseFloat(precioTotal) : pu * cant;
      const { error: e1 } = await sb.from("lotes_inventario").insert({
        id: loteId, cliente_id: filtro, categoria: "neumatico", marca: marca.trim(), modelo: modelo.trim() || null, medida: medida.trim() || null,
        tipo, cantidad_inicial: cant, cantidad_actual: cant, precio_unitario: pu, precio_total: pt,
        proveedor_id: proveedorId || null, numero_documento: numeroDoc.trim(), fecha_ingreso: fecha
      });
      if (e1) throw e1;
      const bodegaDestino = estadoInicial === "recauchado" ? "recauchado" : "nuevo";
      // numero_fuego es NOT NULL en la base real (la spec original decia dejarlo
      // vacio "a asignar en campo", pero la tabla no lo permite) — se genera un
      // provisorio unico por neumatico que el mecanico puede corregir en terreno.
      const lotePrefijo = "PEND" + Date.now().toString(36).toUpperCase();
      const filas = Array.from({ length: cant }).map((_, i) => ({
        id_neumatico: uuid(), numero_fuego: `${lotePrefijo}${i + 1}`, cliente_id: filtro, marca: marca.trim(), modelo: modelo.trim() || null,
        medida: medida.trim() || null, tipo, estado_actual: estadoInicial, bodega: bodegaDestino, fecha_ingreso: fecha, activo: true
      }));
      const { error: e2 } = await sb.from("neumaticos").insert(filas);
      if (e2) throw e2;
      await sb.from("movimientos_bodega").insert({
        id: uuid(), cliente_id: filtro, fecha, categoria: "neumatico", tipo: "entrada", origen: "compra",
        precio_unitario: pu, precio_total: pt,
        numero_documento: numeroDoc.trim(), lote_id: loteId, cantidad: cant
      });
      pushToast(`✓ ${cant} neumáticos agregados al inventario (N° de fuego provisorio ${lotePrefijo}1..${cant} — corregir en terreno)`);
      onSaved();
    } catch (e) { console.error("No se pudo cargar el lote de neumáticos", e); setError("No se pudo guardar. Verificá los datos e intentá de nuevo."); }
    setSaving(false);
  }

  return (
    <Modal title="Entrada de neumáticos (carga valorizada)" onClose={onClose} wide>
      <div className="space-y-4">
        <div className="grid grid-cols-2 gap-3">
          <Field label="Marca" required><TextInput value={marca} onChange={e => setMarca(e.target.value)} /></Field>
          <Field label="Modelo"><TextInput value={modelo} onChange={e => setModelo(e.target.value)} /></Field>
        </div>
        <Field label="Medida" hint="Ej: 295/80R22.5"><TextInput value={medida} onChange={e => setMedida(e.target.value)} /></Field>
        <Field label="Tipo" required>
          <div className="flex gap-2 flex-wrap">
            {NEUMATICO_TIPOS.map(t => (
              <button key={t.id} type="button" onClick={() => setTipo(t.id)} className={cx("px-3.5 h-10 rounded-2xl text-[13px] font-bold", tipo === t.id ? "bg-ink text-white" : "bg-[#F3F4F6] text-[#374151]")}>{t.label}</button>
            ))}
          </div>
        </Field>
        <Field label="Estado inicial" required>
          <div className="flex gap-2">
            {[["nuevo", "Nuevo"], ["recauchado", "Recauchado"]].map(([id, l]) => (

            ))}

        </Field>
        <Field label="Cantidad" required><TextInput type="number" inputMode="numeric" value={cantidad} onChange={e => onCant(e.target.value)} /></Field>
        <div className="grid grid-cols-2 gap-3">
          <Field label="Precio unitario"><TextInput type="number" value={precioUnit} onChange={e => onPU(e.target.value)} /></Field>
          <Field label="Precio total del lote"><TextInput type="number" value={precioTotal} onChange={e => onPT(e.target.value)} /></Field>
        </div>
        <Field label="Proveedor">
          <Select value={proveedorId} onChange={e => setProveedorId(e.target.value)}>
            <option value="">Sin especificar</option>
            {proveedores.map(p => <option key={p.id} value={p.id}>{p.nombre}</option>)}

        </div>
        {error && <p className="text-[12.5px] font-bold text-[#B91C1C]">{error}</p>}
        <Button className="w-full" disabled={saving} onClick={guardar}>{saving ? <span className="spinner" /> : "Agregar al inventario"}</Button>
      </div>

}

function PaseRepararRecauchadoSeccion({ filtro, pushToast, onCambio }) {
  const [lista, setLista] = useState([]);
  const [diasAlerta, setDiasAlerta] = useState(30);
  const [sel, setSel] = useState({});
  const [loading, setLoading] = useState(true);
  const [confirmando, setConfirmando] = useState(false);
  const [saving, setSaving] = useState(false);

  async function cargar() {
    setLoading(true);
    let q = sb.from("neumaticos").select("*").eq("bodega", "reparacion").eq("activo", true);
    q = filtroCliente(q, filtro);
    const { data } = await q;
    let dias = 30;
    if (filtro && filtro !== "todas") {
      const { data: cfg } = await sb.from("config_cliente").select("valor").eq("cliente_id", filtro).eq("clave", "dias_alerta_recauchado").maybeSingle();
      if (cfg && cfg.valor) dias = parseInt(cfg.valor, 10) || 30;
    }
    setDiasAlerta(dias);
    setLista(data || []); setSel({}); setLoading(false);
  }
  useEffect(() => { cargar(); }, [filtro]);

  function diasEnReparar(n) {
    if (!n.fecha_ingreso) return null;
    const ms = Date.now() - new Date(n.fecha_ingreso + "T00:00:00").getTime();
    return Math.floor(ms / 86400000);
  }
  const seleccionados = Object.keys(sel).filter(k => sel[k]);

  async function confirmar() {
    setSaving(true);
    try {
      await sb.from("neumaticos").update({ bodega: "recauchado", estado_actual: "recauchado" }).in("id_neumatico", seleccionados);
      await sb.from("movimientos_bodega").insert(seleccionados.map(id => {
        const n = lista.find(x => x.id_neumatico === id);
        return { id: uuid(), cliente_id: filtro, fecha: todayISO(), categoria: "neumatico", tipo: "salida", origen: "pase_recauchado", numero_fuego: n ? n.numero_fuego : null };
      }));
      pushToast(`✓ ${seleccionados.length} neumáticos pasados a recauchado`);
      setConfirmando(false);
      cargar(); onCambio && onCambio();
    } catch (e) { console.error("No se pudo confirmar el pase a recauchado", e); }
    setSaving(false);
  }

  if (loading) return <div className="flex justify-center py-10"><span className="spinner" /></div>;
  return (
    <div>
      <div className="bg-white rounded-2xl border border-bd shadow-card overflow-x-auto mb-4">
        <table className="w-full text-[13.5px] min-w-[480px]">
          <thead><tr className="text-left text-muted border-b border-bd">
            <th className="py-3 px-4"></th><th className="font-semibold py-3 px-4">N° fuego</th><th className="font-semibold py-3 px-4">Marca</th><th className="font-semibold py-3 px-4">Días en reparar</th>
          </tr></thead>
          <tbody>
            {lista.map(n => {
              const dias = diasEnReparar(n);
              const destacado = dias != null && dias > diasAlerta;
              return (
                <tr key={n.id_neumatico} className={cx("border-b border-bd last:border-0", destacado && "bg-[#FFFBEB]")}>
                  <td className="py-2.5 px-4"><input type="checkbox" checked={!!sel[n.id_neumatico]} onChange={e => setSel(s => ({ ...s, [n.id_neumatico]: e.target.checked }))} /></td>
                  <td className="py-2.5 px-4 font-bold">{n.numero_fuego || "-"}</td><td className="py-2.5 px-4">{n.marca || "-"}</td>
                  <td className="py-2.5 px-4">{dias != null ? `${dias} días${destacado ? " ⚠" : ""}` : "-"}</td>
                </tr>
              );
            })}
            {!lista.length && <tr><td colSpan="4" className="text-center text-muted py-8">No hay neumáticos en reparación.</td></tr>}
          </tbody>
        </table>
      </div>
      <Button disabled={!seleccionados.length} onClick={() => setConfirmando(true)}>Confirmar pase a recauchado ({seleccionados.length})</Button>
      {confirmando && (
        <Confirm title="Pase a recauchado" desc={`Vas a pasar ${seleccionados.length} neumáticos de reparación a recauchado. ¿Confirmar?`}
          onCancel={() => setConfirmando(false)} onConfirm={confirmar} />
      )}
    </div>
  );
}

    setSaving(true);
    try {
      const payload = {
        nombre: nombre.trim(), descripcion: descripcion.trim() || null, cantidad: cantidad ? parseInt(cantidad, 10) : 0,
        precio_unitario: precioUnit ? parseFloat(precioUnit) : null, empresa_costo: empresaCosto, proveedor_id: proveedorId || null,

        <Field label="Descripción"><TextArea value={descripcion} onChange={e => setDescripcion(e.target.value)} /></Field>
        <div className="grid grid-cols-2 gap-3">
          <Field label="Cantidad"><TextInput type="number" inputMode="numeric" value={cantidad} onChange={e => setCantidad(e.target.value)} /></Field>
          <Field label="Precio unitario"><TextInput type="number" value={precioUnit} onChange={e => setPrecioUnit(e.target.value)} /></Field>
        </div>

          <div className="flex gap-2">

const ALERTA_TIPO_GRUPOS = [
  { id: "todas", label: "Todas", tipos: null },
  { id: "psi", label: "PSI", tipos: ["psi_bajo", "psi_alto"] },
  { id: "mm", label: "MM", tipos: ["mm_critico", "mm_bajo"] },
  { id: "discrepancias", label: "Discrepancias", tipos: ["discrepancia_inventario", "neumatico_no_registrado"] },
  { id: "instructivos", label: "Instructivos", tipos: ["instructivo"] },
  { id: "cierres", label: "Cierres", tipos: ["cierre_dia"] },
  { id: "desbloqueos", label: "Desbloqueos", tipos: ["solicitud_desbloqueo", "desbloqueo_aprobado"] }
];
const SEVERIDAD_RANK = { rojo: 0, amarillo: 1, info: 2 };
function ordenarAlertas(lista) {
  // Las criticas (rojo) siempre primero; cierre_dia/instructivo (severidad
  // info) van al fondo, sin importar el filtro de fecha.
  return [...lista].sort((a, b) => {
    const ra = SEVERIDAD_RANK[a.severidad] != null ? SEVERIDAD_RANK[a.severidad] : 1;
    const rb = SEVERIDAD_RANK[b.severidad] != null ? SEVERIDAD_RANK[b.severidad] : 1;
    if (ra !== rb) return ra - rb;
    return (b.creado_en || "").localeCompare(a.creado_en || "");
  });
}
function timeAgoCorto(iso) {
  if (!iso) return "";
  const diffMs = Date.now() - new Date(iso).getTime();
  const mins = Math.floor(diffMs / 60000);
  if (mins < 1) return "ahora";
  if (mins < 60) return `hace ${mins}m`;
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return `hace ${hrs}h`;
  const dias = Math.floor(hrs / 24);
  if (dias < 7) return `hace ${dias}d`;
  return iso.slice(0, 10);
}
async function fetchAlertasCompletas(clienteId) {
  let q = sb.from("alertas").select("*").order("creado_en", { ascending: false }).limit(300);
  q = filtroCliente(q, clienteId);
  const { data, error } = await q;
  if (error) throw error;
  const eqIds = [...new Set((data || []).map(a => a.equipo_id))].filter(Boolean);
  const mecIds = [...new Set((data || []).map(a => a.mecanico_id))].filter(Boolean);
  const [{ data: eqs }, { data: mecs }] = await Promise.all([
    eqIds.length ? sb.from("equipos").select("id_equipo,patente,numero_interno").in("id_equipo", eqIds) : Promise.resolve({ data: [] }),
    mecIds.length ? sb.from("usuarios").select("id,nombre,apellido,cliente_id").in("id", mecIds) : Promise.resolve({ data: [] })
  ]);
  const eqMap = {}; (eqs || []).forEach(e => { eqMap[e.id_equipo] = e; });
  const mecMap = {}; (mecs || []).forEach(m => { mecMap[m.id] = m; });
  return (data || []).map(a => ({ ...a, equipo: eqMap[a.equipo_id] || null, mecanico: mecMap[a.mecanico_id] || null }));
}
async function fetchStatsAlertas(clienteId) {
  const hoy = todayISO();
  let qa = sb.from("alertas").select("creado_en,severidad,leida_admin"); qa = filtroCliente(qa, clienteId);
  let qd = sb.from("discrepancias_inventario").select("creado_en,resuelto_en,resuelta,fecha"); qd = filtroCliente(qd, clienteId);
  const [{ data: als }, { data: discs }] = await Promise.all([qa, qd]);
  const totalHoy = (als || []).filter(a => (a.creado_en || "").slice(0, 10) === hoy).length;
  const criticasSinResolver = (als || []).filter(a => a.severidad === "rojo" && !a.leida_admin).length;
  const resueltasHoy = (discs || []).filter(d => d.fecha === hoy && d.resuelta && d.resuelto_en);
  let tiempoProm = null;
  if (resueltasHoy.length) {
    const totalHoras = resueltasHoy.reduce((sum, d) => sum + (new Date(d.resuelto_en) - new Date(d.creado_en)) / 3600000, 0);
    tiempoProm = totalHoras / resueltasHoy.length;
  }
  return { totalHoy, criticasSinResolver, tiempoProm };
}

    if (search.trim()) {
      const s = search.trim().toLowerCase();
      const eqTxt = a.equipo ? `${a.equipo.patente} ${a.equipo.numero_interno || ""}`.toLowerCase() : "";
      const mecTxt = a.mecanico ? `${a.mecanico.nombre} ${a.mecanico.apellido || ""}`.toLowerCase() : "";
      if (!eqTxt.includes(s) && !mecTxt.includes(s)) return false;
    }
    return true;
  }));

  async function marcarLeida(a) {
    await adminDb.marcarAlertaLeida(a.id);
    setAlertas(as => as.map(x => x.id === a.id ? { ...x, leida_admin: true } : x));
    pushToast("✓ Alerta marcada como leída");
  }
  async function marcarTodasLeidas() {
    let q = sb.from("alertas").update({ leida_admin: true }).eq("leida_admin", false);
    q = filtroCliente(q, filtro);
    await q;
    pushToast("✓ Todas las alertas marcadas como leídas");
    cargar();
  }
  function empresaLabel(a) {
    if (filtro !== "todas") return null;
    return (empresas.find(e => e.id_cliente === a.cliente_id) || {}).nombre || a.cliente_id;
  }
  function verDetalleAlerta(a) {
    if (a.tipo === "neumatico_no_registrado") setVerDetalle({ alerta: a, tipo: "discNeu" });
    else if (a.tipo === "discrepancia_inventario") setVerDetalle({ alerta: a, tipo: "discInv" });
    else if (a.tipo === "cierre_dia") setVerDetalle({ alerta: a, tipo: "cierre" });
  }
  function abrirMecanico(a, modo) {
    if (!a.mecanico) return;
    setMecanicoAccion({ mecanico: a.mecanico, initialModo: modo === "empresa" ? "empresa" : null });
  }
  async function ignorarDesbloqueo(a) {
    await adminDb.marcarAlertaLeida(a.id);
    setAlertas(as => as.map(x => x.id === a.id ? { ...x, leida_admin: true } : x));
    pushToast("✓ Solicitud ignorada — el mecánico sigue bloqueado");
  }
  function handleMecanicoDone() {
    setMecanicoAccion(null);
    cargar();
  }

  return (
    <div>
      {toastNode}
      <div className="flex items-center justify-between gap-3 mb-5 flex-wrap">
        <h1 className="text-[26px] font-extrabold">🔔 Alertas</h1>
        <Button variant="subtle" className="h-10 px-4 text-[13px]" onClick={marcarTodasLeidas}>Marcar todas como leídas</Button>
      </div>

      <TextInput placeholder="Buscar por equipo o mecánico" value={search} onChange={e => setSearch(e.target.value)} className="mb-4 max-w-md" />

      <div className="flex gap-2 mb-3 overflow-x-auto">
        {[["todas", "Todas"], ["noleidas", "No leídas"], ["leidas", "Leídas"]].map(([k, l]) => (
          <button key={k} onClick={() => setFiltroEstado(k)} className={cx("px-4 py-2 rounded-full text-[13px] font-bold whitespace-nowrap", filtroEstado === k ? "bg-ink text-white" : "bg-[#F3F4F6] text-[#374151]")}>{l}</button>
        ))}
      </div>
      <div className="flex gap-2 mb-3 overflow-x-auto">
        {[["todas", "Todas"], ["rojo", "🔴 Críticas"], ["amarillo", "🟡 Atención"], ["info", "ℹ️ Informativas"]].map(([k, l]) => (
          <button key={k} onClick={() => setFiltroSeveridad(k)} className={cx("px-4 py-2 rounded-full text-[13px] font-bold whitespace-nowrap", filtroSeveridad === k ? "bg-ink text-white" : "bg-[#F3F4F6] text-[#374151]")}>{l}</button>
        ))}
      </div>
      <div className="flex gap-2 mb-5 overflow-x-auto">
        {ALERTA_TIPO_GRUPOS.map(g => (
          <button key={g.id} onClick={() => setFiltroTipo(g.id)} className={cx("px-4 py-2 rounded-full text-[13px] font-bold whitespace-nowrap", filtroTipo === g.id ? "bg-ink text-white" : "bg-[#F3F4F6] text-[#374151]")}>{g.label}</button>
        ))}
      </div>

      {loading ? <div className="flex justify-center py-10"><span className="spinner" /></div> : (
        <div className="space-y-2 mb-6">
          {filtradas.map(a => (
            <AlertaCard key={a.id} a={a} empresaLabel={empresaLabel(a)} onVer={verDetalleAlerta}
              onMarcarLeida={marcarLeida} onIgnorar={ignorarDesbloqueo} onAbrirMecanico={abrirMecanico} />
          ))}
          {!filtradas.length && <p className="text-center text-muted py-10 text-sm">Sin alertas que coincidan.</p>}
        </div>
      )}

      {stats && (
        <div className="grid grid-cols-3 gap-3">
          <KpiCard label="Total alertas hoy" value={stats.totalHoy} />
          <KpiCard label="Críticas sin resolver" value={stats.criticasSinResolver} />
          <KpiCard label="Tiempo prom. resolución" value={stats.tiempoProm != null ? `${stats.tiempoProm.toFixed(1)}h` : "—"} />
        </div>
      )}

      {verDetalle && verDetalle.tipo === "discNeu" && (
        <DiscrepanciaNeumaticoDetalleModal alerta={verDetalle.alerta} adminUser={adminUser} pushToast={pushToast}
          onClose={() => setVerDetalle(null)} onResuelto={() => { setVerDetalle(null); cargar(); }} />
      )}
      {verDetalle && verDetalle.tipo === "discInv" && (
        <DiscrepanciaInventarioDetalleModal alerta={verDetalle.alerta} adminUser={adminUser} pushToast={pushToast}
          onClose={() => setVerDetalle(null)} onResuelto={() => cargar()} />
      )}
      {verDetalle && verDetalle.tipo === "cierre" && (
        <ReporteCierreDetalleModal alerta={verDetalle.alerta} empresas={empresas} onClose={() => setVerDetalle(null)} />
      )}
      {mecanicoAccion && (
        <MecanicoBloqueadoModal mecanico={mecanicoAccion.mecanico} empresas={empresas} initialModo={mecanicoAccion.initialModo}
          onClose={() => setMecanicoAccion(null)} onDone={handleMecanicoDone} />
      )}
    </div>
  );
}

function CambiarPasswordModal({ user, onClose, pushToast }) {
  const [actual, setActual] = useState("");
  const [nueva, setNueva] = useState("");
  const [confirmar, setConfirmar] = useState("");
  const [saving, setSaving] = useState(false);
  const [error, setError] = useState("");

  async function guardar() {
    setError("");
    if (!actual || !nueva || !confirmar) { setError("Completá los 3 campos."); return; }
    if (nueva.length < 4) { setError("La nueva contraseña debe tener al menos 4 caracteres."); return; }
    if (nueva !== confirmar) { setError("La confirmación no coincide con la nueva contraseña."); return; }
    setSaving(true);
    try {
      const hashActual = await sha256Hex(actual);
      if (hashActual !== user.password_hash) { setError("La contraseña actual es incorrecta."); setSaving(false); return; }
      const hashNueva = await sha256Hex(nueva);
      const { error: e } = await sb.from("usuarios").update({ password_hash: hashNueva }).eq("id", user.id);
      if (e) throw e;
      pushToast("✓ Contraseña actualizada");
      onClose();
    } catch (e) { console.error("No se pudo cambiar la contraseña", e); setError("No se pudo guardar. Intentá de nuevo."); }
    setSaving(false);
  }

  return (
    <Modal title="Cambiar contraseña" onClose={onClose}>
      <div className="space-y-4">
        <Field label="Contraseña actual" required><TextInput type="password" value={actual} onChange={e => setActual(e.target.value)} /></Field>
        <Field label="Nueva contraseña" required><TextInput type="password" value={nueva} onChange={e => setNueva(e.target.value)} /></Field>
        <Field label="Confirmar nueva contraseña" required><TextInput type="password" value={confirmar} onChange={e => setConfirmar(e.target.value)} /></Field>
        {error && <p className="text-[12.5px] font-bold text-[#B91C1C]">{error}</p>}
        <Button className="w-full" disabled={saving} onClick={guardar}>{saving ? <span className="spinner" /> : "Cambiar contraseña"}</Button>
      </div>
    </Modal>
  );
}

function ConfiguracionEmpresaView({ filtro, pushToast }) {
  const [config, setConfig] = useState(null);
  const [loading, setLoading] = useState(true);
  const [proximos, setProximos] = useState({ auditoria: null, cambio: null, fuego: null });
  const [restaurando, setRestaurando] = useState(false);
  const esLaPortada = filtro === "la_portada";

  function cargar() {
    setLoading(true);
    db.fetchConfig(filtro).then(async cfg => {
      setConfig(cfg);
      const inicioAud = parseInt(cfg.numero_auditoria_inicio || 1, 10);
      const inicioCam = parseInt(cfg.numero_cambio_inicio || 1, 10);
      const inicioFuego = parseInt(cfg.numero_fuego_inicio || 1, 10);
      const [{ data: auds }, { data: cams }, { data: neus }] = await Promise.all([
        sb.from("auditorias").select("numero_auditoria").eq("cliente_id", filtro),
        sb.from("cambios_neumaticos").select("numero_cambio"),
        sb.from("neumaticos").select("numero_fuego").eq("cliente_id", filtro)
      ]);
      const maxNum = (rows, campo) => {
        let max = null;
        (rows || []).forEach(r => { const n = parseInt(r[campo], 10); if (!isNaN(n) && (max === null || n > max)) max = n; });
        return max;
      };
      const maxAud = maxNum(auds, "numero_auditoria");
      const maxCam = maxNum(cams, "numero_cambio");
      const maxFuego = maxNum(neus, "numero_fuego");
      setProximos({
        auditoria: maxAud === null ? inicioAud : maxAud + 1,
        cambio: maxCam === null ? inicioCam : maxCam + 1,
        fuego: maxFuego === null ? inicioFuego : maxFuego + 1
      });
    }).catch(e => console.error("No se pudo cargar la configuración", e)).finally(() => setLoading(false));
  }
  useEffect(() => { cargar(); }, [filtro]);

  async function guardarValor(clave, valor) {
    await db.setConfigValor(filtro, clave, valor);
    setConfig(c => ({ ...c, [clave]: valor }));
    if (clave === "numero_auditoria_inicio" || clave === "numero_cambio_inicio" || clave === "numero_fuego_inicio") {
      pushToast("✓ Correlativo actualizado — aplicará a partir del próximo registro");
      cargar();
    } else {
      pushToast("✓ Parámetro actualizado");
    }
  }

  async function restaurarDefaults() {
    await Promise.all(Object.entries(CONFIG_DEFAULTS_COMPLETO)
      .filter(([clave]) => clave !== "formula_marca_fuego")
      .map(([clave, valor]) => db.setConfigValor(filtro, clave, valor)));
    pushToast("✓ Valores por defecto restaurados");
    setRestaurando(false);
    cargar();
  }

  if (loading || !config) return <div className="flex justify-center py-10"><span className="spinner" /></div>;

  return (
    <div>
      <p className="font-bold text-[15px] mb-2">Parámetros de la receta</p>
      <div className="bg-white rounded-2xl border border-bd shadow-card overflow-hidden mb-6">
        {CONFIG_RECETA_FIELDS.map(f => <ConfigRow key={f.clave} clave={f.clave} label={f.label} valor={config[f.clave]} onGuardar={guardarValor} />)}
      </div>

      <p className="font-bold text-[15px] mb-2">Stock mínimos</p>
      <div className="bg-white rounded-2xl border border-bd shadow-card overflow-hidden mb-6">
        {CONFIG_STOCK_FIELDS.map(f => <ConfigRow key={f.clave} clave={f.clave} label={f.label} valor={config[f.clave] != null ? config[f.clave] : 0} onGuardar={guardarValor} />)}
      </div>

      <p className="font-bold text-[15px] mb-2">Alertas automáticas</p>
      <div className="bg-white rounded-2xl border border-bd shadow-card overflow-hidden mb-6">
        {CONFIG_ALERTA_FIELDS.map(f => <ConfigRow key={f.clave} clave={f.clave} label={f.label} valor={config[f.clave] != null ? config[f.clave] : 0} onGuardar={guardarValor} />)}
      </div>

      <p className="font-bold text-[15px] mb-2">Correlativos</p>
      <CorrelativoCard titulo="Auditorías" claveInicio="numero_auditoria_inicio" valorInicio={config.numero_auditoria_inicio} proximo={proximos.auditoria} onGuardar={guardarValor} />
      <CorrelativoCard titulo="Hojas de cambio" claveInicio="numero_cambio_inicio" valorInicio={config.numero_cambio_inicio} proximo={proximos.cambio} onGuardar={guardarValor} />
      {!esLaPortada && (
        <CorrelativoCard titulo="Número de fuego" claveInicio="numero_fuego_inicio" valorInicio={config.numero_fuego_inicio != null ? config.numero_fuego_inicio : 1} proximo={proximos.fuego} onGuardar={guardarValor} />
      )}

      <p className="font-bold text-[15px] mb-2 mt-6">Fórmula marca de fuego</p>
      <Card className="mb-6">
        {esLaPortada ? (
          <div>
            <p className="text-[13px] text-muted mb-1">🔒 Fórmula LP (La Portada)</p>
            <p className="font-bold text-[14px]">interno + semana + año + posición</p>
            <p className="text-[12.5px] text-sub mt-2">Ejemplo: interno=308, semana=29, año=26, pos=1 → 30829261</p>
            <p className="text-[11.5px] text-muted mt-2">Campo no editable — es la fórmula exclusiva de La Portada.</p>
          </div>
        ) : (
          <div>
            <p className="text-[13px] text-muted mb-1">🔒 Tipo de numeración</p>
            <p className="font-bold text-[14px]">Correlativo secuencial</p>
            <p className="text-[12.5px] text-sub mt-2">Los números de fuego se asignan automáticamente en secuencia desde el número inicial configurado en Correlativos.</p>
            <p className="text-[11.5px] text-muted mt-2">Campo no editable.</p>
          </div>
        )}
      </Card>

      <Button variant="danger" className="w-full max-w-md" onClick={() => setRestaurando(true)}>Restaurar valores por defecto</Button>
      {restaurando && (
        <Confirm title="Restaurar valores por defecto" desc="Se van a reemplazar todos los parámetros de esta empresa por los valores por defecto del sistema. ¿Confirmar?"
          onCancel={() => setRestaurando(false)} onConfirm={restaurarDefaults} />
      )}
    </div>
  );
}

function AdminApp({ user, onLogout }) {
  const empresaCtl = useEmpresaFiltro();
  const [view, setView] = useState("dashboard");
  const [mecanicoBloqueado, setMecanicoBloqueado] = useState(null);
  const [alertasNoLeidas, setAlertasNoLeidas] = useState(0);
  const [refreshToken, setRefreshToken] = useState(0);

  async function refrescarCampanita() {
    try { setAlertasNoLeidas(await adminDb.countAlertasNoLeidasTotal()); } catch (e) {}
  }
  useEffect(() => {
    refrescarCampanita();
    const t = setInterval(refrescarCampanita, 15000);
    return () => clearInterval(t);
  }, []);

  function handleMecanicoDesbloqueado() {
    setMecanicoBloqueado(null);
    refrescarCampanita();
    setRefreshToken(t => t + 1); // fuerza remount + refetch de la vista actual
  }

  let body;
  if (view === "equipos") body = <EquiposView key={refreshToken} empresaCtl={empresaCtl} adminUser={user} />;
  else if (view === "jornada") body = <JornadaView key={refreshToken} empresaCtl={empresaCtl} adminUser={user} />;
  else if (view === "maestros") body = <MaestrosView key={refreshToken} empresaCtl={empresaCtl} />;
  else if (view === "alertas") body = <AlertasAdminView key={refreshToken} empresaCtl={empresaCtl} adminUser={user} />;
  else if (view === "perfil") body = <PerfilAdminView user={user} onLogout={onLogout} empresaCtl={empresaCtl} />;
  else body = <DashboardView key={refreshToken} empresaCtl={empresaCtl} onAbrirMecanico={setMecanicoBloqueado} />;

  return (
    <AdminShell view={view} setView={setView} empresaCtl={empresaCtl} alertasNoLeidas={alertasNoLeidas}>
      {body}
      {mecanicoBloqueado && (
        <MecanicoBloqueadoModal mecanico={mecanicoBloqueado} empresas={empresaCtl.empresas}
          onClose={() => setMecanicoBloqueado(null)} onDone={handleMecanicoDesbloqueado} />
      )}
    </AdminShell>
  );
}

/* =====================================================================
   ENTRADA DE LA PAGINA — guarda de sesion (solo rol admin)
===================================================================== */
function AdminPage() {
  const [user, setUser] = useState(null);
  const [checking, setChecking] = useState(true);

  useEffect(() => {
    const cached = getSession();
    if (!cached || cached.rol !== "admin") { location.replace("index.html"); return; }
    db.fetchUsuario(cached.id).then(fresh => {
      if (!fresh || !fresh.activo || fresh.rol !== "admin") { clearSession(); location.replace("index.html"); return; }
      setSession(fresh); setUser(fresh); setChecking(false);
    }).catch(() => { setUser(cached); setChecking(false); }); // sin conexion: seguir con la sesion cacheada
  }, []);

  function handleLogout() { clearSession(); location.href = "index.html"; }

  if (checking || !user) return <div className="min-h-screen flex items-center justify-center"><span className="spinner" /></div>;
  return <AdminApp user={user} onLogout={handleLogout} />;
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<AdminPage />);

if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => { navigator.serviceWorker.register("./sw.js").catch(e => console.error("SW registration failed", e)); });
}
</script>
</body>
