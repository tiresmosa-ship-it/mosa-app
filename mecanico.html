===================================================================== */
function CierreDelDia({ user, clienteId, onCerrado }) {
  const [resumen, setResumen] = useState(null);
  const [cerrando, setCerrando] = useState(false);
  const [confirmando, setConfirmando] = useState(false);
  const [cerrado, setCerrado] = useState(false);

  useEffect(() => {
    construirResumenJornada(user.id, clienteId, todayISO()).then(({ conteos }) => setResumen(conteos)).catch(() => setResumen(null));
  }, [clienteId]);

  async function confirmarCierre() {
    setConfirmando(false);
    setCerrando(true);
    try {
      await cerrarJornadaConResumen({ user, clienteId, fecha: todayISO(), horaCierre: nowHM(), motivoSinCierre: null });
      localStorage.setItem("jornada_cerrada_hoy", "true");
      setCerrado(true);
      if (onCerrado) onCerrado();
    } catch (e) {
      console.error("No se pudo cerrar la jornada", e);
    } finally {
      setCerrando(false);
    }
  }

  if (cerrado) {
    return (
      <div className="min-h-screen flex flex-col items-center justify-center px-8 text-center">
        <div className="w-14 h-14 rounded-2xl bg-[#DCFCE7] flex items-center justify-center mb-5"><Icon.check width="26" height="26" className="text-[#15803D]" /></div>
        <p className="text-[22px] font-extrabold mb-2">¡Jornada cerrada!</p>
        <p className="text-[15px] text-sub">Hasta mañana, {user.nombre}</p>
      </div>
    );
  }

  return (
    <div className="min-h-screen pb-24 px-5 pt-14 safe-top">
      <h1 className="text-[30px] font-extrabold mb-6">Cierre del día</h1>
      {!resumen ? <div className="flex justify-center py-10"><span className="spinner" /></div> : (
        <>
          <div className="grid grid-cols-2 gap-3 mb-4">
            {[["Auditorías", resumen.auditorias_realizadas], ["Cambios", resumen.cambios_realizados], ["Regulaciones PSI", resumen.regulaciones_psi], ["Retorqueos", resumen.retorqueos], ["Rotaciones", resumen.rotaciones], ["Reparaciones", resumen.reparaciones]].map(([l, v]) => (
              <div key={l} className="bg-[#F9FAFB] rounded-[18px] p-4">
                <p className="text-[11.5px] font-semibold text-muted mb-1">{l}</p>
                <p className="text-[22px] font-extrabold">{v}</p>
              </div>
            ))}
          </div>
          {resumen.pct_receta_promedio != null && (
            <Card className="mb-6">
              <p className="text-[13px] font-semibold text-sub mb-1">% promedio de instructivo seguido</p>
              <p className="text-[26px] font-extrabold">{resumen.pct_receta_promedio}%</p>
            </Card>
          )}
          <Button className="w-full" disabled={cerrando} onClick={() => setConfirmando(true)}>{cerrando ? <span className="spinner" /> : "Cerrar jornada"}</Button>
        </>
      )}
      {confirmando && (
        <Confirm title="Cerrar jornada" desc="¿Estás seguro que querés cerrar la jornada de hoy?"
          onConfirm={confirmarCierre} onCancel={() => setConfirmando(false)} />
      )}
    </div>
  );
}

/* =====================================================================
   ALERTAS
===================================================================== */
function AlertasScreen({ user, clienteId }) {
  const [remotas, setRemotas] = useState([]);
  const [loading, setLoading] = useState(true);
  const [filter, setFilter] = useState("todas");
  const [equiposMap, setEquiposMap] = useState({});
  const pendientesCount = useQueueCount();

  useEffect(() => {
    db.fetchAlertas(clienteId, user.id).then(setRemotas).catch(() => {}).finally(() => setLoading(false));
  }, [clienteId, user.id, pendientesCount]);

  useEffect(() => {
    db.fetchEquipos(clienteId).then(eqs => {
      const map = {};
      (eqs || []).forEach(e => { map[e.id_equipo] = e.numero_interno ? `${e.numero_interno} · ${e.patente}` : e.patente; });
      setEquiposMap(map);
    }).catch(() => {});
  }, [clienteId]);

  // Alertas propias pendientes de sincronizar (aun en la cola offline) tambien
  // son del mecanico actual, ya que se generan siempre con mecanico_id=user.id.
  const pendientes = getQueue().filter(q => q.tipo === "alerta" && q.clienteId === clienteId && q.data.mecanico_id === user.id && q.data.tipo !== "discrepancia_inventario").map(q => ({ ...q.data, __pendiente: true }));
  const alertas = [...pendientes, ...remotas.filter(r => !pendientes.some(p => p.id === r.id))]
    .sort((a, b) => (b.creado_en || "").localeCompare(a.creado_en || ""));

  async function marcarLeida(a) {
    if (a.__pendiente || a.leida_mecanico) return;
    setRemotas(as => as.map(x => x.id === a.id ? { ...x, leida_mecanico: true } : x));
    await sb.from("alertas").update({ leida_mecanico: true }).eq("id", a.id);
    window.dispatchEvent(new Event("mosa-alertas-changed"));
  }

  const filtradas = alertas.filter(a => filter === "todas" ? true : filter === "noleidas" ? !a.leida_mecanico : true);

  return (
    <div className="min-h-screen pb-24 px-5 pt-14 safe-top">
      <h1 className="text-[30px] font-extrabold mb-4">Alertas</h1>
      <div className="flex gap-2 mb-5">
        {[["todas", "Todas"], ["noleidas", "No leídas"]].map(([k, l]) => (
          <button key={k} onClick={() => setFilter(k)} className={cx("px-4 py-2 rounded-full text-[13px] font-bold", filter === k ? "bg-ink text-white" : "bg-[#F3F4F6] text-[#374151]")}>{l}</button>
        ))}
      </div>
      {loading && <div className="flex justify-center py-10"><span className="spinner" /></div>}
      <div className="space-y-3">
        {filtradas.map(a => (
          <div key={a.id} className="w-full text-left bg-white rounded-2xl border border-bd shadow-card p-4">
            <div className="flex items-start justify-between gap-2">
              <div className="flex-1">
                <p className="font-bold text-[14.5px]">{a.titulo}</p>
                <p className="text-[12.5px] text-muted mt-0.5">{a.descripcion}</p>
              </div>
              <Badge color={a.severidad === "rojo" ? "red" : a.severidad === "amarillo" ? "amber" : "gray"}>{a.severidad === "rojo" ? "Alerta" : a.severidad === "amarillo" ? "Atención" : "Info"}</Badge>
            </div>
            <div className="flex flex-wrap items-center gap-x-3 gap-y-1 mt-2 text-[12px] text-muted">
              {a.equipo_id && <span>{equiposMap[a.equipo_id] || "Equipo"}</span>}
              {a.posicion != null && <span>P{a.posicion}</span>}
              {a.creado_en && <span>{(a.creado_en).slice(0, 10)} · {(a.creado_en).slice(11, 16)}</span>}
            </div>
            <div className="flex items-center justify-between gap-2 mt-2.5">
              <div className="flex items-center gap-2">
                {!a.leida_mecanico && <span className="text-[11px] font-bold text-ink">● No leída</span>}
                {a.__pendiente && <span className="text-[11px] font-bold text-[#92400E]">Sincronizando...</span>}
              </div>
              {!a.leida_mecanico && !a.__pendiente && (
                <button onClick={() => marcarLeida(a)} className="text-[12px] font-bold text-ink px-3 py-1.5 rounded-full bg-[#F3F4F6]">Marcar como leída</button>
              )}
            </div>
          </div>
        ))}
        {!loading && filtradas.length === 0 && <p className="text-center text-muted py-10 text-sm">Sin alertas.</p>}
      </div>
    </div>
  );
}

/* =====================================================================
   APP DEL MECANICO
===================================================================== */
function MecanicoApp({ user }) {
  const [clienteId, setClienteId] = useState(null);
  const [empresaConfirmada, setEmpresaConfirmada] = useState(false);
  const [checkDone, setCheckDone] = useState(false);
  const [cfg, setCfg] = useState(DEFAULT_CFG);
  const [tab, setTab] = useState("inicio");
  const [flow, setFlow] = useState(null);
  const [pushToast, toastNode] = useToasts();
  const alertasNoLeidas = useAlertasNoLeidas(clienteId, user.id);
  // Bloqueo tras cerrar jornada: solo se levanta con un login nuevo (MecanicoGate
  // reevalua desde la DB). En esta misma sesion, solo queda accesible Alertas.
  const [jornadaCerrada, setJornadaCerrada] = useState(() => {
    const t = getTurno();
    return localStorage.getItem("jornada_cerrada_hoy") === "true" && !!t && t.fecha === todayISO();
  });

  useEffect(() => {
    const turno = getTurno();
    if (turno && turno.fecha === todayISO()) {
      setClienteId(turno.clienteId); setEmpresaConfirmada(true); setCheckDone(!!turno.checkDone);
    }
  }, []);
  useEffect(() => { if (clienteId) db.fetchConfig(clienteId).then(setCfg).catch(() => setCfg(getCache(LS.cfg(clienteId), DEFAULT_CFG))); }, [clienteId]);

  if (!empresaConfirmada) {
    return <SeleccionEmpresa user={user} onConfirm={(cid) => { setClienteId(cid); setEmpresaConfirmada(true); setTurno({ clienteId: cid, fecha: todayISO(), checkDone: false }); }} />;
  }
  if (!checkDone) {
    return <CheckDiario user={user} clienteId={clienteId} onDone={() => setCheckDone(true)} />;
  }

  let body;
  if (jornadaCerrada && tab !== "alertas" && tab !== "perfil") {
    body = (
      <div className="min-h-screen flex flex-col items-center justify-center px-8 text-center">
        <div className="w-14 h-14 rounded-2xl bg-[#DCFCE7] flex items-center justify-center mb-5"><Icon.check width="26" height="26" className="text-[#15803D]" /></div>
        <p className="text-[22px] font-extrabold mb-2">¡Jornada cerrada!</p>
        <p className="text-[15px] text-sub">Hasta mañana, {user.nombre}</p>
      </div>
    );
  } else if (flow && flow.stage === "accion") {
    body = (
      <>
        <SeleccionEquipo clienteId={clienteId} onPick={(eq) => setFlow({ stage: "accion", equipo: eq })} />
        <AccionEquipo equipo={flow.equipo} onClose={() => setFlow(null)}
          onAuditoria={() => setFlow({ stage: "auditoria", equipo: flow.equipo })}
          onCambio={async () => {
            const pd = await construirPosDataDesdeEquipo(flow.equipo.id_equipo);
            let pend = null;
            try { pend = await buscarInstructivoPendiente(flow.equipo.id_equipo); } catch (e) { console.error("No se pudo buscar instructivo pendiente", e); }
            setFlow({ stage: "cambio", equipo: flow.equipo, axleCfg: axleConfigFor(flow.equipo), posData: pd, checklist: [], pendiente: pend });
          }} />
      </>
    );
  } else if (flow && flow.stage === "auditoria") {
    body = (
      <AuditoriaForm user={user} clienteId={clienteId} equipo={flow.equipo} cfg={cfg}
        onCancel={() => setFlow(null)}
        onGenerarInstructivo={async (posData, axleCfg, km, startedAt) => {
          const recsInfo = generarRecomendaciones(posData, axleCfg, flow.equipo.tipo, cfg);
          const checklist = recsInfo.recs.map(r => ({ id: r.id, texto: r.texto, done: false, extra: false }));
          let discrepanciasNeumaticos = [];
          try { discrepanciasNeumaticos = await compararNeumaticosAuditoria(clienteId, flow.equipo.id_equipo, posData); }
          catch (e) { console.error("No se pudo comparar neumáticos contra el sistema", e); }
          setFlow({ stage: "instructivo", equipo: flow.equipo, posData, axleCfg, km, recsInfo, checklist, discrepanciasNeumaticos });
        }} />
    );
  } else if (flow && flow.stage === "instructivo") {
    body = (
      <Instructivo equipo={flow.equipo} axleCfg={flow.axleCfg} posData={flow.posData} recsInfo={flow.recsInfo}
        checklist={flow.checklist} setChecklist={(fn) => setFlow(f => ({ ...f, checklist: typeof fn === "function" ? fn(f.checklist) : fn }))}
        discrepancias={flow.discrepanciasNeumaticos}
        onContinuar={async () => {
          const res = await construirYGuardarAuditoria({ user, clienteId, equipo: flow.equipo, cfg, posData: flow.posData, axleCfg: flow.axleCfg, km: flow.km, checklist: flow.checklist, recsInfo: flow.recsInfo, discrepanciasNeumaticos: flow.discrepanciasNeumaticos, recetaEstado: "en_proceso" });
          const n = res.alertas;
          pushToast(n > 0 ? `✓ Auditoría guardada · ${n} alerta${n !== 1 ? "s" : ""} generada${n !== 1 ? "s" : ""}` : "✓ Auditoría guardada");
          setFlow({ stage: "cambio", equipo: flow.equipo, axleCfg: flow.axleCfg, posData: flow.posData, checklist: flow.checklist, kmInicial: flow.km, recetaIdInicial: res.recetaId });
        }}
        onCerrar={async () => {
          const res = await construirYGuardarAuditoria({ user, clienteId, equipo: flow.equipo, cfg, posData: flow.posData, axleCfg: flow.axleCfg, km: flow.km, checklist: flow.checklist, recsInfo: flow.recsInfo, discrepanciasNeumaticos: flow.discrepanciasNeumaticos, recetaEstado: "pendiente" });
          const n = res.alertas;
          pushToast(n > 0 ? `✓ Auditoría guardada · ${n} alerta${n !== 1 ? "s" : ""} generada${n !== 1 ? "s" : ""}` : "✓ Auditoría guardada");
          setFlow(null);
        }} />
    );
  } else if (flow && flow.stage === "cambio") {
    body = (
      <CambioForm user={user} clienteId={clienteId} equipo={flow.equipo} cfg={cfg} axleCfg={flow.axleCfg}
        posDataInicial={flow.posData} checklistInicial={flow.checklist} kmInicial={flow.kmInicial}
        recetaIdInicial={flow.recetaIdInicial} pendiente={flow.pendiente}
        onCancel={() => setFlow(null)} onFinish={() => setFlow(null)} />
    );
  } else if (tab === "cierre") {
    body = <CierreDelDia user={user} clienteId={clienteId} onCerrado={() => setJornadaCerrada(true)} />;
  } else if (tab === "alertas") {
    body = <AlertasScreen user={user} clienteId={clienteId} />;
  } else if (tab === "perfil") {
    body = <PerfilScreen user={user} />;
  } else {
    body = <SeleccionEquipo clienteId={clienteId} onPick={(eq) => setFlow({ stage: "accion", equipo: eq })} />;
  }

  const showBottomNav = !flow || flow.stage === "accion";

  return (
    <div>
      <div className="fixed top-2 left-0 right-0 z-40"><OfflineBadge /></div>
      {toastNode}
      {body}
      {showBottomNav && <BottomNav view={tab} setView={(t) => { setTab(t); setFlow(null); }} disabledExcept={jornadaCerrada ? ["alertas", "perfil"] : null} alertasNoLeidas={alertasNoLeidas} />}
    </div>
  );
}

function PerfilScreen({ user }) {
  const [confirming, setConfirming] = useState(false);
  return (
    <div className="min-h-screen pb-24 px-5 pt-14 safe-top">
      <h1 className="text-[30px] font-extrabold mb-6">Perfil</h1>
      <Card className="mb-6">
        <div className="flex items-center gap-3">
          <div className="w-12 h-12 rounded-full bg-[#F3F4F6] flex items-center justify-center"><Icon.user width="22" height="22" /></div>
          <div>
            <p className="font-bold text-[16px]">{user.nombre} {user.apellido || ""}</p>
            <p className="text-[12.5px] text-muted">Usuario: {user.usuario} · Rol: {user.rol}</p>
          </div>
        </div>
      </Card>
      <Button variant="danger" className="w-full" onClick={() => setConfirming(true)}>Cerrar sesión</Button>
      {confirming && (
        <Confirm title="Cerrar sesión" desc="¿Seguro que querés cerrar tu sesión?"
          onCancel={() => setConfirming(false)}
          onConfirm={() => { clearSession(); location.href = "index.html"; }} />
      )}
    </div>
  );
}

/* =====================================================================
   ENTRADA DE LA PAGINA
   Guarda de sesion: solo mecanicos con sesion valida llegan a MecanicoApp;
   cualquier otro caso (sin sesion, rol distinto, usuario desactivado)
   redirige a index.html.
===================================================================== */
function MecanicoPage() {
  const [user, setUser] = useState(null);
  const [checking, setChecking] = useState(true);

  useEffect(() => {
    const cached = getSession();
    if (!cached || cached.rol !== "mecanico") { location.replace("index.html"); return; }
    db.fetchUsuario(cached.id).then(fresh => {
      if (!fresh || !fresh.activo || fresh.rol !== "mecanico") { clearSession(); location.replace("index.html"); return; }
      setSession(fresh); setUser(fresh); setChecking(false);
    }).catch(() => { setUser(cached); setChecking(false); }); // sin conexion: seguir con la sesion cacheada
  }, []);

  if (checking || !user) return <div className="min-h-screen flex items-center justify-center"><span className="spinner" /></div>;
  return <MecanicoApp user={user} key={user.id} />;
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<MecanicoPage />);

if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => { navigator.serviceWorker.register("./sw.js").catch(e => console.error("SW registration failed", e)); });
}
</script>
</body>
</html>
