/* =====================================================================
   MOSA TIRES — cliente-gerencia.html
   Panel para el subtipo "dueno" del rol cliente: vista ejecutiva de
   negocio (Resumen + Costos, copiados de la vista [Numeros] del Dashboard
   y de la seccion Costos de superadmin.html) mas Flota (vista simplificada
   sin datos tecnicos exactos) y gestion de usuarios operativos de su
   propia empresa. Todo escrito para un solo cliente_id fijo (tomado de la
   sesion) — sin selector de empresa en ningun lado.

const { useState, useEffect, useCallback } = React;

/* =====================================================================

const Icon = {
  home: (p) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M3 11l9-8 9 8"/><path d="M5 10v10h14V10"/></svg>,

  back: (p) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M15 18l-6-6 6-6"/></svg>,

  gauge: (p) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M12 15l3-3"/><circle cx="12" cy="14" r="8"/><path d="M6 8l1.5 1.5M18 8l-1.5 1.5M4 14h2M18 14h2M12 5v2"/></svg>,
  pencil: (p) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 013 3L7 19l-4 1 1-4z"/></svg>,
};

/* =====================================================================
   UI BASICOS (mismo kit que el resto de la app)
===================================================================== */
function Button({ variant = "primary", className = "", children, ...props }) {
  const base = "h-14 px-5 rounded-2xl font-bold text-[15px] transition active:scale-[0.98] disabled:opacity-50 disabled:active:scale-100 flex items-center justify-center gap-2";
  const variants = {
    primary: "bg-ink text-white",
    ghost: "bg-transparent text-ink border border-bdstrong",
    danger: "bg-[#FEE2E2] text-[#B91C1C]",
    subtle: "bg-[#F3F4F6] text-ink"
  };
  return <button className={cx(base, variants[variant], className)} {...props}>{children}</button>;
}
function Field({ label, required, children, hint }) {
  return (
    <label className="block">
      <span className="block text-[13px] font-semibold text-[#374151] mb-1.5">{label}{required && <span className="text-red-500"> *</span>}</span>
      {children}
      {hint && <span className="block text-xs text-muted mt-1">{hint}</span>}
    </label>
  );
}
function TextInput({ className = "", ...props }) {
  return <input className={cx("w-full h-[52px] px-4 rounded-2xl border bg-[#F3F4F6] border-[#E5E7EB] focus:outline-none focus:ring-2 focus:ring-ink/20 placeholder:text-muted", className)} {...props} />;
}
function Select({ className = "", children, ...props }) {
  return <select className={cx("w-full h-[52px] px-4 rounded-2xl border bg-[#F3F4F6] border-[#E5E7EB] focus:outline-none focus:ring-2 focus:ring-ink/20", className)} {...props}>{children}</select>;
}
function Card({ className = "", children }) {
  return <div className={cx("bg-white rounded-card shadow-card border border-bd p-5", className)}>{children}</div>;
}
function Badge({ children, color = "gray" }) {
  const colors = {
    gray: "bg-[#F3F4F6] text-[#374151]", green: "bg-[#DCFCE7] text-[#15803D]",
    red: "bg-[#FEE2E2] text-[#B91C1C]", amber: "bg-[#FEF3C7] text-[#92400E]", black: "bg-ink text-white"
  };
  return <span className={cx("px-3 py-1 rounded-full text-[12px] font-bold", colors[color])}>{children}</span>;
}
function Modal({ title, onClose, children, wide, footer }) {
  return (
    <div className="fixed inset-0 z-50 flex items-end sm:items-center justify-center bg-black/40 p-0 sm:p-4" onClick={(e) => { if (e.target === e.currentTarget && onClose) onClose(); }}>
      <div className={cx("bg-white w-full sm:rounded-card rounded-t-[24px] max-h-[92vh] overflow-y-auto", wide ? "sm:max-w-2xl" : "sm:max-w-md")}>
        <div className="sticky top-0 bg-white border-b border-bd px-5 py-4 flex items-center justify-between z-10">
          <h3 className="text-lg font-extrabold">{title}</h3>
          {onClose && <button onClick={onClose} className="w-9 h-9 rounded-full hover:bg-[#F3F4F6] flex items-center justify-center text-sub"><Icon.close width="18" height="18"/></button>}
        </div>
        <div className="p-5">{children}</div>
        {footer && <div className="sticky bottom-0 bg-white border-t border-bd p-4">{footer}</div>}
      </div>
    </div>
  );
}
function Toast({ msg, onDone }) {
  useEffect(() => { const t = setTimeout(onDone, 2000); return () => clearTimeout(t); }, []);
  return (
    <div className="fixed top-4 left-1/2 -translate-x-1/2 z-[80] px-4 py-3 rounded-2xl shadow-lg text-sm font-semibold flex items-center gap-3" style={{ background: "#DCFCE7", color: "#15803D" }}>
      <span>{msg}</span>
      <button onClick={onDone} className="opacity-60">✕</button>
    </div>
  );
}
function useToasts() {
  const [toasts, setToasts] = useState([]);
  const push = useCallback((msg) => setToasts(t => [...t, { id: uuid(), msg }]), []);
  const remove = (id) => setToasts(t => t.filter(x => x.id !== id));
  const node = <div>{toasts.map(t => <Toast key={t.id} msg={t.msg} onDone={() => remove(t.id)} />)}</div>;
  return [push, node];
}
function Confirm({ title, desc, onConfirm, onCancel }) {
  return (
    <Modal title={title} onClose={onCancel}>
      <p className="text-[14px] text-[#374151] mb-5">{desc}</p>
      <div className="flex gap-3">
        <Button variant="subtle" className="flex-1" onClick={onCancel}>Cancelar</Button>
        <Button className="flex-1" onClick={onConfirm}>Confirmar</Button>
      </div>
    </Modal>
  );
}
function Toggle({ checked, onChange }) {
  return (
    <button onClick={() => onChange(!checked)} className={cx("w-11 h-6 rounded-full relative transition shrink-0", checked ? "bg-ink" : "bg-[#E5E7EB]")}>
      <span className="absolute top-0.5 w-5 h-5 rounded-full bg-white transition-all" style={{ left: checked ? "22px" : "2px" }} />
    </button>
  );
}

/* =====================================================================
   COSTOS / NUMEROS — copiado exacto de superadmin.html (mismos helpers y
   mismo objeto costosDb), unica diferencia: en vez de un `filtro` variable
   elegido por selector de empresa, todas las llamadas de esta pagina usan
   siempre `clienteId` (fijo, de la sesion). Ver notas originales en
   superadmin.html sobre cada estimacion.
===================================================================== */
function monedaSimbolo(moneda) {
  const m = moneda || "CLP";
  return m === "USD" ? "US$" : m === "ARS" ? "AR$" : "$";
}
function formatMoney(n, moneda) {
  if (n == null || isNaN(n)) return "—";
  const m = moneda || "CLP";
  if (m === "USD") return "US$" + Number(n).toLocaleString("en-US", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  if (m === "ARS") return "AR$" + Math.round(n).toLocaleString("es-AR");
  return "$" + Math.round(n).toLocaleString("es-CL");
}
function formatMoneyDecimal(n, moneda) {
  if (n == null || isNaN(n)) return "—";
  return monedaSimbolo(moneda) + Number(n).toFixed(2);
}
function sumPorMoneda(filas, campo) {
  const acc = {};
  (filas || []).forEach(f => {
    const mon = f.moneda || "CLP";
    const v = typeof campo === "function" ? campo(f) : f[campo];
    if (v == null || isNaN(v)) return;
    acc[mon] = (acc[mon] || 0) + Number(v);
  });
  const orden = ["CLP", "ARS", "USD"];
  return Object.keys(acc).sort((a, b) => orden.indexOf(a) - orden.indexOf(b)).map(moneda => ({ moneda, total: acc[moneda] }));
}
function formatMoneyGrouped(grupos) {
  if (!grupos || !grupos.length) return "—";
  return grupos.map(g => formatMoney(g.total, g.moneda)).join(" · ");
}
function MoneyGroupedStack({ grupos, className }) {
  if (!grupos || !grupos.length) return <span className={className}>—</span>;
  return (
    <span className={className}>
      {grupos.map((g, i) => <span key={g.moneda} className={i > 0 ? "block" : ""}>{formatMoney(g.total, g.moneda)}</span>)}
    </span>
  );
}
function rangoPeriodo(periodo) {
  const hoy = new Date();
  let desde;
  if (periodo === "trimestre") desde = new Date(hoy.getFullYear(), hoy.getMonth() - 2, 1);
  else if (periodo === "anio") desde = new Date(hoy.getFullYear(), 0, 1);
  else desde = new Date(hoy.getFullYear(), hoy.getMonth(), 1);
  return { desde: desde.toISOString().slice(0, 10), hasta: todayISO() };
}
function fetchPrecioPorMarcaAcc(data) {
  const acc = {};
  let sumaGlobal = 0, nGlobal = 0;
  const monedasGlobal = {};
  (data || []).forEach(l => {
    if (l.precio_unitario == null) return;
    const marca = l.marca || "Sin marca registrada";
    const mon = l.moneda || "CLP";
    if (!acc[marca]) acc[marca] = { suma: 0, n: 0, monedas: {} };
    acc[marca].suma += l.precio_unitario; acc[marca].n++;
    acc[marca].monedas[mon] = (acc[marca].monedas[mon] || 0) + 1;
    sumaGlobal += l.precio_unitario; nGlobal++;
    monedasGlobal[mon] = (monedasGlobal[mon] || 0) + 1;
  });
  const modaMoneda = (monedas) => Object.keys(monedas).sort((a, b) => monedas[b] - monedas[a])[0] || "CLP";
  const promedios = {};
  Object.keys(acc).forEach(m => { promedios[m] = { precio: acc[m].suma / acc[m].n, moneda: modaMoneda(acc[m].monedas) }; });
  promedios.__global = { precio: nGlobal ? sumaGlobal / nGlobal : 0, moneda: modaMoneda(monedasGlobal) };
  return promedios;
}
async function fetchPrecioPorMarca(clienteId) {
  let q = sb.from("lotes_inventario").select("marca,precio_unitario,moneda").eq("categoria", "neumatico");
  q = filtroCliente(q, clienteId);
  const { data } = await q;
  return fetchPrecioPorMarcaAcc(data);
}
function precioDeMarca(promedios, marca) {
  const key = marca || "Sin marca registrada";
  return promedios[key] != null ? promedios[key] : (promedios.__global || { precio: 0, moneda: "CLP" });
}
async function fetchPrecioPorFuego(clienteIds) {
  if (!clienteIds || !clienteIds.length) return {};
  const { data: entradas } = await sb.from("movimientos_bodega").select("cliente_id,numero_fuego,precio_unitario,moneda").eq("categoria", "neumatico").eq("tipo", "entrada").in("cliente_id", clienteIds).not("numero_fuego", "is", null);
  const map = {};
  (entradas || []).forEach(e => { if (e.precio_unitario != null) map[e.cliente_id + "|" + e.numero_fuego] = { precio: e.precio_unitario, moneda: e.moneda || "CLP" }; });
  return map;
}
const costosDb = {
  async fetchValorInventarioPorEmpresa(empresas) {
    const [{ data: lotes }, { data: insumosData }] = await Promise.all([
      sb.from("lotes_inventario").select("cliente_id,precio_unitario,cantidad_actual,moneda").eq("categoria", "neumatico"),
      sb.from("insumos").select("cliente_id,precio,cantidad,moneda").eq("activo", true)
    ]);
    const porCliente = {};
    (empresas || []).forEach(e => { porCliente[e.id_cliente] = { id: e.id_cliente, nombre: e.nombre, neumaticosFilas: [], insumosFilas: [] }; });
    (lotes || []).forEach(l => {
      if (!porCliente[l.cliente_id]) porCliente[l.cliente_id] = { id: l.cliente_id, nombre: l.cliente_id, neumaticosFilas: [], insumosFilas: [] };
      porCliente[l.cliente_id].neumaticosFilas.push({ moneda: l.moneda, valor: (l.precio_unitario || 0) * (l.cantidad_actual || 0) });
    });
    (insumosData || []).forEach(i => {
      if (!porCliente[i.cliente_id]) porCliente[i.cliente_id] = { id: i.cliente_id, nombre: i.cliente_id, neumaticosFilas: [], insumosFilas: [] };
      porCliente[i.cliente_id].insumosFilas.push({ moneda: i.moneda, valor: (i.precio || 0) * (i.cantidad || 0) });
    });
    return Object.values(porCliente).map(f => {
      const neumaticos = sumPorMoneda(f.neumaticosFilas, "valor");
      const insumos = sumPorMoneda(f.insumosFilas, "valor");
      const total = sumPorMoneda([...f.neumaticosFilas, ...f.insumosFilas], "valor");
      return { id: f.id, nombre: f.nombre, neumaticos, insumos, total };
    }).sort((a, b) => (a.nombre || "").localeCompare(b.nombre || ""));
  },
  async fetchConsumoPeriodo(clienteId, desde, hasta) {
    let q = sb.from("movimientos_bodega").select("cliente_id,fecha,origen,numero_fuego").eq("categoria", "neumatico").eq("tipo", "salida").gte("fecha", desde).lte("fecha", hasta).like("origen", "baja_%");
    q = filtroCliente(q, clienteId);
    const { data } = await q;
    const bajas = data || [];
    if (!bajas.length) return { filas: [], totalBajas: 0, totalMontoGrupos: [], desgaste: 0, dano: 0 };
    const precioPorFuego = await fetchPrecioPorFuego([...new Set(bajas.map(b => b.cliente_id))]);
    const porCliente = {};
    const montoFilasGlobal = [];
    bajas.forEach(b => {
      if (!porCliente[b.cliente_id]) porCliente[b.cliente_id] = { id: b.cliente_id, bajas: 0, montoFilas: [], desgaste: 0, dano: 0 };
      const c = porCliente[b.cliente_id];
      c.bajas++;
      if (b.origen === "baja_desgaste_normal") c.desgaste++; else c.dano++;
      const entry = b.numero_fuego ? precioPorFuego[b.cliente_id + "|" + b.numero_fuego] : null;
      if (entry != null) { c.montoFilas.push(entry); montoFilasGlobal.push(entry); }
    });
    const filas = Object.values(porCliente).map(c => ({ ...c, montoGrupos: sumPorMoneda(c.montoFilas, "precio") }));
    return {
      filas, totalBajas: bajas.length,
      totalMontoGrupos: sumPorMoneda(montoFilasGlobal, "precio"),
      desgaste: filas.reduce((a, f) => a + f.desgaste, 0),
      dano: filas.reduce((a, f) => a + f.dano, 0)
    };
  },
  async fetchCpkPromedio(clienteId) {
    let qInv = sb.from("movimientos_bodega").select("precio_total,moneda").eq("categoria", "neumatico").eq("tipo", "entrada");
    qInv = filtroCliente(qInv, clienteId);
    let qEq = sb.from("equipos").select("kilometros").eq("activo", true);
    qEq = filtroCliente(qEq, clienteId);
    const [{ data: entradas }, { data: equipos }] = await Promise.all([qInv, qEq]);
    const km = (equipos || []).reduce((a, e) => a + (e.kilometros || 0), 0);
    const inversionGrupos = sumPorMoneda(entradas, "precio_total");
    if (km <= 0) return [];
    return inversionGrupos.map(g => ({ moneda: g.moneda, cpk: g.total / km }));
  },
  async fetchPctInstructivoPromedio(clienteId) {
    let q = sb.from("auditorias_receta").select("pct_receta_seguida");
    q = filtroCliente(q, clienteId);
    const { data } = await q;
    const vals = (data || []).map(r => r.pct_receta_seguida).filter(v => v != null);
    return vals.length ? Math.round(vals.reduce((a, b) => a + b, 0) / vals.length) : null;
  },
  async fetchCpkPorMarca(clienteId) {
    let qN = sb.from("neumaticos").select("marca,modelo,equipo_actual").eq("activo", true).not("equipo_actual", "is", null);
    qN = filtroCliente(qN, clienteId);
    const { data: neumaticos } = await qN;
    if (!neumaticos || !neumaticos.length) return [];
    const equipoIds = [...new Set(neumaticos.map(n => n.equipo_actual))];
    const { data: equipos } = await sb.from("equipos").select("id_equipo,kilometros").in("id_equipo", equipoIds);
    const kmPorEquipo = {}; (equipos || []).forEach(e => { kmPorEquipo[e.id_equipo] = e.kilometros || 0; });
    const precios = await fetchPrecioPorMarca(clienteId);
    const grupos = {};
    neumaticos.forEach(n => {
      const key = (n.marca || "Sin marca registrada") + " / " + (n.modelo || "-");
      const p = precioDeMarca(precios, n.marca);
      if (!grupos[key]) grupos[key] = { marca: n.marca || "Sin marca registrada", modelo: n.modelo || "-", cantidad: 0, inversion: 0, moneda: p.moneda, km: 0 };
      const g = grupos[key];
      g.cantidad++;
      g.inversion += p.precio;
      g.km += kmPorEquipo[n.equipo_actual] || 0;
    });
    return Object.values(grupos).map(g => ({ ...g, cpk: g.km > 0 ? g.inversion / g.km : null })).sort((a, b) => b.inversion - a.inversion);
  },
  async fetchBajasPorMes(clienteId, meses) {
    const hoy = new Date();
    const desdeISO = new Date(hoy.getFullYear(), hoy.getMonth() - (meses - 1), 1).toISOString().slice(0, 10);
    let q = sb.from("movimientos_bodega").select("cliente_id,fecha,origen,numero_fuego").eq("categoria", "neumatico").eq("tipo", "salida").gte("fecha", desdeISO).like("origen", "baja_%");
    q = filtroCliente(q, clienteId);
    const { data } = await q;
    const bajas = data || [];
    const precioPorFuego = await fetchPrecioPorFuego([...new Set(bajas.map(b => b.cliente_id))]);
    const porMes = {};
    for (let i = 0; i < meses; i++) {
      const key = new Date(hoy.getFullYear(), hoy.getMonth() - (meses - 1 - i), 1).toISOString().slice(0, 7);
      porMes[key] = { mes: key, desgaste: 0, dano: 0, perdidaFilas: [] };
    }
    bajas.forEach(b => {
      const key = (b.fecha || "").slice(0, 7);
      if (!porMes[key]) return;
      if (b.origen === "baja_desgaste_normal") porMes[key].desgaste++; else porMes[key].dano++;
      const entry = b.numero_fuego ? precioPorFuego[b.cliente_id + "|" + b.numero_fuego] : null;
      if (entry != null) porMes[key].perdidaFilas.push(entry);
    });
    return Object.values(porMes).map(m => ({ mes: m.mes, desgaste: m.desgaste, dano: m.dano, perdidaGrupos: sumPorMoneda(m.perdidaFilas, "precio") }));
  },
  async fetchTopEquiposCostosos(clienteId, n) {
    let qN = sb.from("neumaticos").select("marca,equipo_actual").eq("activo", true).not("equipo_actual", "is", null);
    qN = filtroCliente(qN, clienteId);
    const { data: neumaticos } = await qN;
    if (!neumaticos || !neumaticos.length) return [];
    const equipoIds = [...new Set(neumaticos.map(x => x.equipo_actual))];
    const { data: equipos } = await sb.from("equipos").select("id_equipo,patente,numero_interno,kilometros").in("id_equipo", equipoIds);
    const equiposMap = {}; (equipos || []).forEach(e => { equiposMap[e.id_equipo] = e; });
    const precios = await fetchPrecioPorMarca(clienteId);
    const porEquipo = {};
    neumaticos.forEach(nn => {
      const p = precioDeMarca(precios, nn.marca);
      if (!porEquipo[nn.equipo_actual]) porEquipo[nn.equipo_actual] = { equipoId: nn.equipo_actual, inversion: 0, moneda: p.moneda };
      porEquipo[nn.equipo_actual].inversion += p.precio;
    });
    return Object.values(porEquipo).map(e => {
      const eq = equiposMap[e.equipoId] || {};
      const km = eq.kilometros || 0;
      return { equipoId: e.equipoId, patente: eq.patente || "-", numero_interno: eq.numero_interno || null, inversion: e.inversion, moneda: e.moneda, km, cpk: km > 0 ? e.inversion / km : null };
    }).sort((a, b) => b.inversion - a.inversion).slice(0, n || 5);
  },
  async fetchValorInventarioPorBodega(clienteId) {
    let q = sb.from("neumaticos").select("marca,bodega,equipo_actual").eq("activo", true);
    q = filtroCliente(q, clienteId);
    const { data } = await q;
    const precios = await fetchPrecioPorMarca(clienteId);
    const labels = { nuevo: "Nuevo", transito: "Tránsito", recauchado: "Recauchado", reparacion: "En reparación", en_equipos: "En equipos", baja: "En baja", salidas: "Salida definitiva", otro: "Otro / sin bodega" };
    const filas = { nuevo: [], transito: [], recauchado: [], reparacion: [], en_equipos: [], baja: [], salidas: [], otro: [] };
    const cantidad = { nuevo: 0, transito: 0, recauchado: 0, reparacion: 0, en_equipos: 0, baja: 0, salidas: 0, otro: 0 };
    (data || []).forEach(n => {
      const key = n.equipo_actual ? "en_equipos" : (filas[n.bodega] !== undefined ? n.bodega : "otro");
      const p = precioDeMarca(precios, n.marca);
      filas[key].push({ moneda: p.moneda, valor: p.precio });
      cantidad[key]++;
    });
    return Object.keys(labels).map(k => ({ bodega: k, label: labels[k], cantidad: cantidad[k], valorGrupos: sumPorMoneda(filas[k], "valor") }));
  },
  async fetchCpkEquipo(equipo) {
    const { data: neumaticos } = await sb.from("neumaticos").select("marca").eq("equipo_actual", equipo.id_equipo).eq("activo", true);
    const precios = await fetchPrecioPorMarca(equipo.cliente_id);
    const precioFilas = (neumaticos || []).map(n => { const p = precioDeMarca(precios, n.marca); return { moneda: p.moneda, valor: p.precio }; });
    const inversionGrupos = sumPorMoneda(precioFilas, "valor");
    const grupoPrincipal = inversionGrupos[0] || { moneda: "CLP", total: 0 };
    const km = equipo.kilometros || 0;
    return { inversion: grupoPrincipal.total, moneda: grupoPrincipal.moneda, inversionGrupos, km, cpk: km > 0 ? grupoPrincipal.total / km : null, cantidadNeumaticos: (neumaticos || []).length };
  }
};

const PERIODOS_CONSUMO = [

function BajasPorMesChart({ datos }) {
  const canvasRef = React.useRef(null);
  const chartRef = React.useRef(null);
  useEffect(() => {
    if (!window.Chart || !canvasRef.current) return;
    if (chartRef.current) { chartRef.current.destroy(); chartRef.current = null; }
    chartRef.current = new window.Chart(canvasRef.current.getContext("2d"), {
      type: "bar",
      data: {
        labels: datos.map(d => d.mes),
        datasets: [
          { label: "Desgaste normal", data: datos.map(d => d.desgaste), backgroundColor: "#9CA3AF", stack: "s" },
          { label: "Daño / otro", data: datos.map(d => d.dano), backgroundColor: "#EF4444", stack: "s" }
        ]
      },
      options: { responsive: true, scales: { x: { stacked: true }, y: { stacked: true, beginAtZero: true } }, plugins: { legend: { position: "bottom" } } }
    });
    return () => { if (chartRef.current) { chartRef.current.destroy(); chartRef.current = null; } };
  }, [datos]);
  if (!window.Chart) return <p className="text-[12.5px] text-muted py-4">Chart.js no está disponible — mostrando solo la tabla de detalle.</p>;
  return <div className="relative" style={{ height: 260 }}><canvas ref={canvasRef} /></div>;
}

/* =====================================================================
   SECCION 3 — FLOTA (vista ejecutiva, sin detalle tecnico exacto)
===================================================================== */
const FLOTA_BADGE_INFO = {
  verde: { icon: "🟢", label: "Operativo", color: "green" },
  amarillo: { icon: "🟡", label: "Requiere atención", color: "amber" },
  rojo: { icon: "🔴", label: "Requiere intervención", color: "red" }
};
async function fetchFlotaEstado(clienteId) {
  const { data: equipos, error } = await sb.from("equipos").select("*").eq("cliente_id", clienteId).eq("activo", true).order("numero_interno");
  if (error) throw error;
  if (!equipos || !equipos.length) return [];
  const ids = equipos.map(e => e.id_equipo);

  const [{ data: alertas }, { data: auditorias }] = await Promise.all([
    sb.from("alertas").select("equipo_id").eq("severidad", "rojo").eq("leida_admin", false).in("equipo_id", ids),
    sb.from("auditorias").select("id_auditoria,equipo_id,fecha,creado_en").in("equipo_id", ids).order("fecha", { ascending: false }).order("creado_en", { ascending: false })
  ]);

  const alertasPorEquipo = {};
  (alertas || []).forEach(a => { alertasPorEquipo[a.equipo_id] = (alertasPorEquipo[a.equipo_id] || 0) + 1; });

  const ultimaAuditoriaPorEquipo = {};
  (auditorias || []).forEach(a => { if (!ultimaAuditoriaPorEquipo[a.equipo_id]) ultimaAuditoriaPorEquipo[a.equipo_id] = a; });

  const auditoriaIdsUltimas = Object.values(ultimaAuditoriaPorEquipo).map(a => a.id_auditoria);
  const recetaPorAuditoria = {};
  if (auditoriaIdsUltimas.length) {
    const { data: recetas } = await sb.from("auditorias_receta").select("auditoria_id,estado").in("auditoria_id", auditoriaIdsUltimas);
    (recetas || []).forEach(r => { recetaPorAuditoria[r.auditoria_id] = r.estado; });
  }

  return equipos.map(eq => {
    const alertasCount = alertasPorEquipo[eq.id_equipo] || 0;
    const ultima = ultimaAuditoriaPorEquipo[eq.id_equipo];
    const estadoInstructivo = ultima ? recetaPorAuditoria[ultima.id_auditoria] : null;
    let badge;
    if (alertasCount > 0) badge = "rojo";
    else if (estadoInstructivo === "pendiente" || estadoInstructivo === "parcial") badge = "amarillo";
    else badge = "verde";

function FlotaMapaTab({ equipo }) {
  const [posiciones, setPosiciones] = useState(null);

  useEffect(() => {
    let cancel = false;
    (async () => {
      const { data: neumaticos } = await sb.from("neumaticos").select("*").eq("equipo_actual", equipo.id_equipo).eq("estado_actual", "en_uso");
      const numerosFuego = (neumaticos || []).map(n => n.numero_fuego).filter(Boolean);
      const mmPorFuego = {};
      if (numerosFuego.length) {
        const { data: ultimaAud } = await sb.from("auditorias").select("id_auditoria").eq("equipo_id", equipo.id_equipo).order("fecha", { ascending: false }).order("creado_en", { ascending: false }).limit(1);
        if (ultimaAud && ultimaAud[0]) {
          const { data: posAud } = await sb.from("auditoria_posiciones").select("numero_fuego,milimetros,psi,mm_borde_izq,mm_centro,mm_borde_der").eq("auditoria_id", ultimaAud[0].id_auditoria).in("numero_fuego", numerosFuego);
          (posAud || []).forEach(p => { mmPorFuego[p.numero_fuego] = p; });
        }
      }
      if (!cancel) setPosiciones((neumaticos || []).map(n => ({ ...n, aud: mmPorFuego[n.numero_fuego] || null })));
    })();
    return () => { cancel = true; };
  }, [equipo.id_equipo]);

  if (!equipo.configuracion_ejes && equipo.tipo !== "SEMI") {
    return <p className="text-[13.5px] text-muted py-6">Configuración de ejes no definida</p>;
  }
  if (posiciones === null) return <div className="flex justify-center py-10"><span className="spinner" /></div>;

  const cfg = axleConfigFor(equipo);
  const porPosicion = {};
  posiciones.forEach(p => { porPosicion[p.posicion_actual] = p; });

  function evaluar(pos) {
    const n = porPosicion[pos];
    if (!n) return null;
    const data = {
      psi: n.psi_actual != null ? n.psi_actual : (n.aud ? n.aud.psi : null),
      mm_borde_izq: n.aud ? n.aud.mm_borde_izq : null,
      mm_centro: n.aud ? (n.aud.mm_centro != null ? n.aud.mm_centro : n.aud.milimetros) : null,
      mm_borde_der: n.aud ? n.aud.mm_borde_der : null
    };
    return evaluarPosicion(cfg, DEFAULT_CFG, pos, equipo.tipo, data);
  }
  function colorDePosicion(pos) {
    const ev = evaluar(pos);
    return ev ? ev.status : "empty";
  }
  const posicionesAtencion = cfg.rows.flatMap(r => r.positions).filter(pos => {
    const ev = evaluar(pos);
    return ev && (ev.status === "atencion" || ev.status === "alerta");
  });

  return (
    <div>
      {posicionesAtencion.length > 0 && (
        <div className="mb-4 rounded-2xl bg-[#FEF3C7] text-[#92400E] text-[13px] font-bold px-4 py-3">
          ⚠ {posicionesAtencion.length} posición{posicionesAtencion.length !== 1 ? "es" : ""} requiere{posicionesAtencion.length !== 1 ? "n" : ""} atención
        </div>
      )}
      <Card>
        <MapaSimplificado cfg={cfg} porPosicion={porPosicion} colorDePosicion={colorDePosicion} />
      </Card>
      <div className="flex gap-4 mt-5 text-[12px] text-muted flex-wrap px-1">
        <span className="flex items-center gap-1.5"><span className="w-3 h-3 rounded-full border-2 border-[#D1D5DB] bg-[#DCFCE7] inline-block" /> Verde</span>
        <span className="flex items-center gap-1.5"><span className="w-3 h-3 rounded-full border-2 border-[#F59E0B] bg-[#FEF3C7] inline-block" /> Amarillo</span>
        <span className="flex items-center gap-1.5"><span className="w-3 h-3 rounded-full border-2 border-[#EF4444] bg-[#FEE2E2] inline-block" /> Rojo</span>
      </div>
    </div>
  );
}
// Resultado general de una auditoria (peor estado entre sus posiciones), sin
// exponer PSI/mm/N° fuego — solo ok/atencion/alerta, para la vista ejecutiva.
async function fetchUltimasAuditoriasResumen(equipo) {
  const { data: auds } = await sb.from("auditorias").select("id_auditoria,fecha,numero_auditoria,bultero_id,creado_en").eq("equipo_id", equipo.id_equipo)
    .order("fecha", { ascending: false }).order("creado_en", { ascending: false }).limit(3);
  if (!auds || !auds.length) return [];
  const cfg = axleConfigFor(equipo);
  const mecanicoIds = [...new Set(auds.map(a => a.bultero_id).filter(Boolean))];
  const mecanicosMap = {};
  if (mecanicoIds.length) {
    const { data: mecs } = await sb.from("usuarios").select("id,nombre,apellido").in("id", mecanicoIds);
    (mecs || []).forEach(m => { mecanicosMap[m.id] = m; });
  }
  const resultados = await Promise.all(auds.map(async a => {
    const { data: pos } = await sb.from("auditoria_posiciones").select("posicion,psi,milimetros,mm_borde_izq,mm_centro,mm_borde_der").eq("auditoria_id", a.id_auditoria);
    let peor = "ok";
    (pos || []).forEach(p => {
      const ev = evaluarPosicion(cfg, DEFAULT_CFG, p.posicion, equipo.tipo, p);
      if (ev.status === "alerta") peor = "alerta";
      else if (ev.status === "atencion" && peor !== "alerta") peor = "atencion";
    });
    const mec = mecanicosMap[a.bultero_id];
    return { ...a, resultado: peor, mecanicoNombre: mec ? `${mec.nombre} ${mec.apellido || ""}`.trim() : "-" };
  }));
  return resultados;
}
const RESULTADO_AUDITORIA_INFO = { ok: { label: "OK", color: "green" }, atencion: { label: "Atención", color: "amber" }, alerta: { label: "Alerta", color: "red" } };

const SUBTIPO_LABELS = { dueno: "Gerencia", operativo: "Operativo" };
function UsuarioOperativoModal({ usuario, clienteId, onClose, onSaved, pushToast, usuariosExistentes }) {
  const editando = !!usuario;
  const [nombre, setNombre] = useState(usuario ? usuario.nombre : "");
  const [apellido, setApellido] = useState(usuario ? (usuario.apellido || "") : "");
  const [email, setEmail] = useState(usuario ? (usuario.email || "") : "");
  const [usuarioLogin, setUsuarioLogin] = useState(usuario ? usuario.usuario : "");
  const [password, setPassword] = useState("");
  const [saving, setSaving] = useState(false);
  const [error, setError] = useState("");

  async function guardar() {
    setError("");
    if (!nombre.trim()) { setError("El nombre es obligatorio."); return; }
    const usuarioTrim = usuarioLogin.trim();
    if (!usuarioTrim) { setError("El usuario es obligatorio."); return; }
    if (usuariosExistentes.some(u => u.usuario === usuarioTrim && (!editando || u.id !== usuario.id))) {
      setError("Ya existe un usuario con ese nombre de usuario."); return;
    }
    if (!editando && !password) { setError("La contraseña es obligatoria."); return; }
    setSaving(true);
    try {
      const payload = {
        nombre: nombre.trim(), apellido: apellido.trim() || null, email: email.trim() || null,
        usuario: usuarioTrim, rol: "cliente", subtipo: "operativo", cliente_id: clienteId
      };
      if (password) payload.password_hash = await sha256Hex(password);
      if (editando) {
        const { error: e1 } = await sb.from("usuarios").update(payload).eq("id", usuario.id);
        if (e1) throw e1;
        pushToast("✓ Usuario actualizado");
      } else {
        const { error: e1 } = await sb.from("usuarios").insert({ id: uuid(), ...payload, activo: true });
        if (e1) throw e1;
        pushToast("✓ Usuario operativo creado");
      }
      onSaved();
    } catch (e) {
      console.error("No se pudo guardar el usuario operativo", e);
      setError(e.message || "No se pudo guardar el usuario.");
    }
    setSaving(false);
  }

  return (
    <Modal title={editando ? "Editar usuario operativo" : "Nuevo usuario operativo"} onClose={onClose}>
      <div className="space-y-4">
        <Field label="Nombre" required><TextInput value={nombre} onChange={e => setNombre(e.target.value)} /></Field>
        <Field label="Apellido"><TextInput value={apellido} onChange={e => setApellido(e.target.value)} /></Field>
        <Field label="Email"><TextInput type="email" value={email} onChange={e => setEmail(e.target.value)} /></Field>
        <Field label="Usuario" required><TextInput value={usuarioLogin} onChange={e => setUsuarioLogin(e.target.value)} /></Field>
        <Field label="Contraseña" required={!editando} hint={editando ? "Dejar vacío para no cambiarla." : ""}>
          <TextInput type="password" value={password} onChange={e => setPassword(e.target.value)} />
        </Field>
        {error && <p className="text-[13px] text-red-600 font-semibold">{error}</p>}
        <Button className="w-full" disabled={saving} onClick={guardar}>{saving ? "Guardando…" : "Guardar"}</Button>
      </div>
    </Modal>
  );
}

function CambiarPasswordModal({ user, onClose, pushToast }) {
  const [actual, setActual] = useState("");
  const [nueva, setNueva] = useState("");
  const [confirmar, setConfirmar] = useState("");
  const [saving, setSaving] = useState(false);
  const [error, setError] = useState("");

  async function guardar() {
    setError("");
    if (!actual || !nueva || !confirmar) { setError("Completá los 3 campos."); return; }
    if (nueva.length < 4) { setError("La nueva contraseña debe tener al menos 4 caracteres."); return; }
    if (nueva !== confirmar) { setError("La confirmación no coincide con la nueva contraseña."); return; }
    setSaving(true);
    try {
      const hashActual = await sha256Hex(actual);
      if (hashActual !== user.password_hash) { setError("La contraseña actual es incorrecta."); setSaving(false); return; }
      const hashNueva = await sha256Hex(nueva);
      const { error: e } = await sb.from("usuarios").update({ password_hash: hashNueva }).eq("id", user.id);
      if (e) throw e;
      pushToast("✓ Contraseña actualizada");
      onClose();
    } catch (e) { console.error("No se pudo cambiar la contraseña", e); setError("No se pudo guardar. Intentá de nuevo."); }
    setSaving(false);
  }

  return (
    <Modal title="Cambiar contraseña" onClose={onClose}>
      <div className="space-y-4">
        <Field label="Contraseña actual" required><TextInput type="password" value={actual} onChange={e => setActual(e.target.value)} /></Field>
        <Field label="Nueva contraseña" required><TextInput type="password" value={nueva} onChange={e => setNueva(e.target.value)} /></Field>
        <Field label="Confirmar nueva contraseña" required><TextInput type="password" value={confirmar} onChange={e => setConfirmar(e.target.value)} /></Field>
        {error && <p className="text-[12.5px] font-bold text-[#B91C1C]">{error}</p>}
        <Button className="w-full" disabled={saving} onClick={guardar}>{saving ? <span className="spinner" /> : "Cambiar contraseña"}</Button>
      </div>
    </Modal>
  );
}

          <div>
            <p className="font-bold text-[16px]">{user.nombre} {user.apellido || ""}</p>
            <p className="text-[12.5px] text-muted">{user.email || "Sin email registrado"}</p>
            <p className="text-[12.5px] text-muted">Usuario: {user.usuario}</p>
          </div>
        </div>
      </Card>
      <Button variant="subtle" className="w-full max-w-md mb-4" onClick={() => setCambiarPassword(true)}>Cambiar contraseña</Button>
      <Button variant="danger" className="w-full max-w-md" onClick={() => setConfirming(true)}>Cerrar sesión</Button>

      {confirming && (
        <Confirm title="Cerrar sesión" desc="¿Seguro que querés cerrar tu sesión?"
          onCancel={() => setConfirming(false)} onConfirm={onLogout} />
      )}
      {cambiarPassword && <CambiarPasswordModal user={user} pushToast={pushToast} onClose={() => setCambiarPassword(false)} />}
    </div>
  );
}

/* =====================================================================
   NAV / SHELL
===================================================================== */
const CLIENTE_NAV = [
  { id: "resumen", label: "Resumen", icon: Icon.home },
  { id: "costos", label: "Costos", icon: Icon.dollar },
  { id: "flota", label: "Flota", icon: Icon.truck },
  { id: "usuarios", label: "Usuarios", icon: Icon.users },
  { id: "perfil", label: "Perfil", icon: Icon.user }
];
function ClienteShell({ view, setView, empresaNombre, children }) {
  const [menuOpen, setMenuOpen] = useState(false);
  const NavList = ({ onPick }) => (
    <nav className="space-y-1">
      {CLIENTE_NAV.map(it => (
        <button key={it.id} onClick={() => { setView(it.id); if (onPick) onPick(); }}
          className={cx("w-full flex items-center gap-3 px-4 py-3 rounded-2xl text-[14.5px] font-bold text-left", view === it.id ? "bg-ink text-white" : "text-[#374151] hover:bg-[#F3F4F6]")}>
          <it.icon width="19" height="19" />
          {it.label}
        </button>
      ))}
    </nav>
  );
  return (
    <div className="min-h-screen md:flex">
      <div className="hidden md:flex md:flex-col md:w-64 md:shrink-0 border-r border-bd p-5 sticky top-0 h-screen">
        <div className="flex items-center gap-2 mb-1 px-1">
          <div className="w-9 h-9 rounded-xl bg-ink flex items-center justify-center"><Icon.gauge width="18" height="18" className="text-white" /></div>
          <span className="font-extrabold text-[16px]">MOSA TIRES</span>
        </div>
        <p className="text-[12px] text-muted px-1 mb-7">{empresaNombre || ""}</p>
        <NavList />
      </div>
      <div className="flex-1 min-w-0 pb-20 md:pb-0">
        <div className="sticky top-0 z-30 bg-white/90 backdrop-blur border-b border-bd px-5 py-3 flex items-center justify-between safe-top md:hidden">
          <button className="w-9 h-9 rounded-full bg-[#F3F4F6] flex items-center justify-center" onClick={() => setMenuOpen(true)}><Icon.menu width="18" height="18" /></button>
          <span className="font-extrabold text-[15px]">{empresaNombre || "MOSA TIRES"}</span>
          <button onClick={() => setView("perfil")} className="w-9 h-9 rounded-full bg-[#F3F4F6] flex items-center justify-center"><Icon.user width="16" height="16" /></button>
        </div>
        <div className="px-5 py-6">{children}</div>
      </div>
      <div className="fixed bottom-0 left-0 right-0 bg-white border-t border-bd safe-bottom z-30 md:hidden">
        <div className="flex">
          {CLIENTE_NAV.map(it => {
            const active = view === it.id;
            return (
              <button key={it.id} onClick={() => setView(it.id)} className="flex-1 flex flex-col items-center gap-1 py-2.5">
                <it.icon width="22" height="22" className={active ? "text-ink" : "text-[#B0B3B8]"} />
                <span className={cx("text-[10px] font-semibold", active ? "text-ink" : "text-[#B0B3B8]")}>{it.label}</span>
              </button>
            );
          })}
        </div>
      </div>
      {menuOpen && (
        <div className="fixed inset-0 z-50 md:hidden">
          <div className="absolute inset-0 bg-black/40" onClick={() => setMenuOpen(false)} />
          <div className="absolute left-0 top-0 bottom-0 w-72 bg-white p-5 safe-top">
            <div className="flex items-center justify-between mb-8">
              <span className="font-extrabold text-[16px]">MOSA TIRES</span>
              <button onClick={() => setMenuOpen(false)} className="w-9 h-9 rounded-full bg-[#F3F4F6] flex items-center justify-center"><Icon.close width="16" height="16" /></button>
            </div>
            <NavList onPick={() => setMenuOpen(false)} />
          </div>
        </div>
      )}
    </div>
  );
}

/* =====================================================================
   APP CLIENTE GERENCIA
===================================================================== */
function ClienteGerenciaApp({ user, onLogout }) {
  const [view, setView] = useState("resumen");
  const [empresa, setEmpresa] = useState(null);

  useEffect(() => { db.fetchCliente(user.cliente_id).then(setEmpresa).catch(() => {}); }, [user.cliente_id]);

  let body;
  if (view === "costos") body = <CostosView clienteId={user.cliente_id} />;
  else if (view === "flota") body = <FlotaView clienteId={user.cliente_id} />;
  else if (view === "usuarios") body = <UsuariosGerenciaView clienteId={user.cliente_id} currentUserId={user.id} />;
  else if (view === "perfil") body = <PerfilView user={user} onLogout={onLogout} />;
  else body = <ResumenView clienteId={user.cliente_id} empresaNombre={empresa ? empresa.nombre : ""} />;

  return (
    <ClienteShell view={view} setView={setView} empresaNombre={empresa ? empresa.nombre : ""}>
      {body}
    </ClienteShell>
  );
}

/* =====================================================================
   ENTRADA DE LA PAGINA — guarda de sesion (rol cliente + subtipo dueno)
===================================================================== */
function ClienteGerenciaPage() {
  const [user, setUser] = useState(null);
  const [checking, setChecking] = useState(true);

  useEffect(() => {
    const cached = getSession();
    if (!cached || cached.rol !== "cliente" || cached.subtipo !== "dueno") { location.replace("index.html"); return; }
    db.fetchUsuario(cached.id).then(fresh => {
      if (!fresh || !fresh.activo || fresh.rol !== "cliente" || fresh.subtipo !== "dueno") { clearSession(); location.replace("index.html"); return; }
      setSession(fresh); setUser(fresh); setChecking(false);
    }).catch(() => { setUser(cached); setChecking(false); }); // sin conexion: seguir con la sesion cacheada
  }, []);

  function handleLogout() { clearSession(); location.href = "index.html"; }

  if (checking || !user) return <div className="min-h-screen flex items-center justify-center"><span className="spinner" /></div>;
  return <ClienteGerenciaApp user={user} onLogout={handleLogout} />;
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<ClienteGerenciaPage />);

if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => { navigator.serviceWorker.register("./sw.js").catch(e => console.error("SW registration failed", e)); });
}
</script>
</body>
